<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; color: #fff; font-family: sans-serif; }
body { display: flex; flex-direction: column; }
main {
  flex: 1;
  display: flex;
  align-items: center;

  overflow: hidden;

<main id="stage"></main>
<footer>"Andy Warhol eating a Hamburger SVGs by AI models" by <a href="https://y-a-v-a.org" style="color:inherit">y-a-v-a.org</a> and <a href="https://ax710.org" style="color:inherit">ax710.org</a> CC BY-SA 4.0 <a href="https://creativecommons.org/licenses/by-sa/4.0"><img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" style="height: 1em; margin-left: 3px; vertical-align: text-bottom;"><img src="https://mirrors.creativecommons.org/presskit/icons/by.svg" style="height: 1em; margin-left: 3px; vertical-align: text-bottom;"><img src="https://mirrors.creativecommons.org/presskit/icons/sa.svg" style="height: 1em; margin-left: 3px; vertical-align: text-bottom;"></a></footer>
<script>
const svgs = [
  "chatgpt-andy-warhol-hamburger.svg",
  "claude-warhol-hamburger.svg",
  "deepseek-v3_2.svg",
  "devstral-2-123b-instruct-2512.svg",
  "haiku-warhol-hamburger.svg",
  "kimi-andy_warhol_hamburger.svg",
  "meta-llama-3_1-70b-instruct.svg",
  "nemotron-3-nano-30b-a3b.svg",
  "nvidia-nemotron-nano-9b-v2.svg",
  "sonnet-warhol-hamburger.svg",
  "z-ai-glm4_7.svg",
];
for (let i = svgs.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [svgs[i], svgs[j]] = [svgs[j], svgs[i]];
}
const stage = document.getElementById('stage');
if (!svgs.length) { stage.textContent = 'No SVGs found.'; }
else {
  let i = 0;
  function show() {
    stage.innerHTML = `<object data="assets/${svgs[i]}" type="image/svg+xml"></object>`;
    i = (i + 1) % svgs.length;
  }
  show();
  if (svgs.length > 1) setInterval(show, 17000);
}
</script>
