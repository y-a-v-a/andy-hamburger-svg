<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andy Warhol Eating a Hamburger</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; color: #fff; font-family: sans-serif; }
body { display: flex; flex-direction: column; }
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 1rem;
}
main object {
  max-width: 100%;
  max-height: 100%;
}
footer {
  text-align: center;
  padding: 0.5rem;
  font-size: 0.75rem;
  opacity: 0.5;
}
</style>
</head>
<body>
<main id="stage"></main>
<footer>&copy; Vincent Bruijn 2026</footer>
<script>
const svgs = [
  "claude-warhol-hamburger,svg.svg",
  "chatgpt-andy-warhol-hamburger.svg"
];
const stage = document.getElementById('stage');
if (!svgs.length) { stage.textContent = 'No SVGs found.'; }
else {
  let i = 0;
  function show() {
    stage.innerHTML = `<object data="assets/${svgs[i]}" type="image/svg+xml"></object>`;
    i = (i + 1) % svgs.length;
  }
  show();
  if (svgs.length > 1) setInterval(show, 17000);
}
</script>
</body>
</html>
