<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Andy Warhol's head and face -->
  <circle cx="100" cy="70" r="25" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="100" cy="70" r="20" fill="black"/>
  <circle cx="90" cy="60" r="5" fill="white"/>
  <circle cx="110" cy="60" r="5" fill="white"/>
  <path d="M90,80 Q100,100 110,80" stroke="black" stroke-width="2" fill="transparent" />
  
  <!-- Hair -->
  <path d="M75,50 Q100,40 125,50" stroke="black" stroke-width="2" fill="transparent"/>
  <path d="M125,50 Q150,40 175,50" stroke="black" stroke-width="2" fill="transparent"/>
  
  <!-- Body -->
  <rect x="70" y="100" width="60" height="50" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Hands -->
  <rect x="30" y="140" width="20" height="20" fill="white" stroke="black" stroke-width="2"/>
  <rect x="150" y="140" width="20" height="20" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Hamburger -->
  <rect x="50" y="120" width="100" height="20" fill="red" stroke="black"/>
  <rect x="50" y="125" width="100" height="20" fill="white" stroke="black"/>
  <rect x="50" y="130" width="100" height="20" fill="red" stroke="black"/>
  
  <!-- Cheeks -->
  <ellipse cx="80" cy="70" rx="5" ry="10" fill="red"/>
  <ellipse cx="120" cy="70" rx="5" ry="10" fill="red"/>
</svg>