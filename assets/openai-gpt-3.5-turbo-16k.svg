<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#f0f0f0"/>

  <!-- Hair: inspired by Warhol's famous silver/grey hair -->
  <ellipse cx="150" cy="85" rx="70" ry="50" fill="#C0C0C0"/>
  <ellipse cx="150" cy="80" rx="70" ry="50" fill="url(#hairGradient)"/>
  <defs>
    <radialGradient id="hairGradient" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </radialGradient>
  </defs>

  <!-- Face -->
  <circle cx="150" cy="140" r="60" fill="#fddac5" stroke="#aaa" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="120" cy="135" r="10" fill="#000"/>
  <circle cx="180" cy="135" r="10" fill="#000"/>
  <circle cx="120" cy="135" r="5" fill="#fff"/>
  <circle cx="180" cy="135" r="5" fill="#fff"/>

  <!-- Glasses -->
  <rect x="105" y="120" width="30" height="25" rx="8" ry="8" fill="none" stroke="#555" stroke-width="3"/>
  <rect x="165" y="120" width="30" height="25" rx="8" ry="8" fill="none" stroke="#555" stroke-width="3"/>
  <line x1="135" y1="132" x2="165" y2="132" stroke="#555" stroke-width="3"/>

  <!-- Nose -->
  <path d="M150 145 Q145 160 150 160 Q155 160 150 145" fill="#f0c0a0" stroke="#cc9766" stroke-width="1"/>

  <!-- Mouth slightly open -->
  <ellipse cx="150" cy="185" rx="30" ry="15" fill="#d44" />
  <ellipse cx="150" cy="185" rx="30" ry="7" fill="#f88" />

  <!-- Hand holding hamburger -->
  <circle cx="210" cy="210" r="45" fill="#fddac5" stroke="#aaa" stroke-width="1"/>
  <!-- Fingers simplified -->
  <ellipse cx="180" cy="210" rx="10" ry="25" fill="#fddac5" />
  <ellipse cx="160" cy="195" rx="15" ry="10" fill="#fddac5" />
  <ellipse cx="165" cy="235" rx="15" ry="10" fill="#fddac5" />

  <!-- Hamburger -->
  <ellipse cx="210" cy="210" rx="40" ry="25" fill="#8B4513"/>
  <ellipse cx="210" cy="200" rx="40" ry="10" fill="#E2B66B" /> <!-- bun top -->
  <ellipse cx="210" cy="220" rx="40" ry="10" fill="#E2B66B" /> <!-- bun bottom -->

  <!-- Lettuce -->
  <path d="M170 210 Q185 190 235 190 Q240 200 170 210 Z" fill="#4CAF50" />
  <!-- Tomato -->
  <ellipse cx="210" cy="205" rx="15" ry="7" fill="#E94B3C" />
  <!-- Burger patty -->
  <ellipse cx="210" cy="215" rx="35" ry="12" fill="#603913" />

  <!-- Arm -->
  <rect x="170" y="210" width="40" height="25" fill="#fddac5" rx="10" ry="10" />

  <!-- Shirt collar -->
  <circle cx="150" cy="230" r="50" fill="#ADD8E6" />
  <ellipse cx="150" cy="250" rx="50" ry="25" fill="#6495ED" />

  <!-- Signature glasses shine (small highlight) -->
  <circle cx="125" cy="130" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="185" cy="130" r="3" fill="#fff" opacity="0.7"/>

</svg>