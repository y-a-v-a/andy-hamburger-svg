<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Andy Warhol -->
  <circle cx="100" cy="100" r="80" fill="black"/>
  <circle cx="100" cy="100" r="70" fill="white" opacity="0.5"/>
  <!-- Hamburger -->
