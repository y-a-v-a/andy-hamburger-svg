<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Andy Warhol's head -->
  <circle cx="100" cy="50" r="25" fill="red" />
  <!-- eyes -->
  <circle cx="80" cy="65" r="5" fill="black" />
  <circle cx="120" cy="65" r="5" fill="black" />
  <!-- smile -->
  <path d="M 80 80 A 10 10 0 0 1 120 80" stroke="black" stroke-width="2" fill="none" />

  <!-- Hamburger -->
  <rect x="50" y="120" width="100" height="50" fill="brown" />
  <!-- Hamburger patty -->
  <rect x="55" y="125" width="80" height="20" fill="gray" />
  <!-- Hamburger bun -->
  <rect x="40" y="100" width="90" height="20" fill="yellow" />
  <!--املガス -->
  <line x1="55" y1="120" x2="85" y2="145" stroke="black" stroke-width="2" />
  <!-- sauvé -->
  <line x1="85" y1="145" x2="55" y2="170" stroke="black" stroke-width="2" />
  <!-- Andy Warhol's face on the hamburger -->
  <!-- (You'll need to decide how to place this) -->
</svg>