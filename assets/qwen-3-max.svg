<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#FF6B6B"/>
  
  <!-- Warhol's Head (simplified geometric style) -->
  <circle cx="250" cy="200" r="80" fill="#FFD166"/>
  
  <!-- Eyes -->
  <circle cx="220" cy="180" r="10" fill="#1A1A1A"/>
  <circle cx="280" cy="180" r="10" fill="#1A1A1A"/>
  
  <!-- Eyebrows -->
  <rect x="210" y="160" width="25" height="5" fill="#333" rx="2"/>
  <rect x="265" y="160" width="25" height="5" fill="#333" rx="2"/>
  
  <!-- Nose -->
  <path d="M240,200 Q250,220 260,200" stroke="#333" stroke-width="5" fill="none"/>
  
  <!-- Mouth -->
  <path d="M230,240 Q250,260 270,240" stroke="#333" stroke-width="4" fill="none"/>
  
  <!-- Glasses -->
  <circle cx="220" cy="180" r="18" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="280" cy="180" r="18" fill="none" stroke="#333" stroke-width="4"/>
  <rect x="238" y="170" width="24" height="20" fill="#333"/>
  
  <!-- Silver Hair -->
  <path d="M170,120 Q250,80 330,120 Q340,150 330,180 Q250,200 170,180 Q160,150 170,120" 
        fill="#C0C0C0" stroke="#888" stroke-width="2"/>
  
  <!-- Hamburger (being held near mouth) -->
  <!-- Top Bun -->
  <ellipse cx="300" cy="230" rx="30" ry="12" fill="#D4A574"/>
  <ellipse cx="300" cy="232" rx="25" ry="8" fill="#E0B060"/>
  
  <!-- Lettuce -->
  <path d="M275,240 Q285,235 290,242 Q300,238 310,245 Q315,240 325,242" 
        fill="none" stroke="#4CAF50" stroke-width="3"/>
  
  <!-- Tomato -->
  <ellipse cx="300" cy="250" rx="25" ry="6" fill="#FF5252"/>
  
  <!-- Cheese -->
  <path d="M270,255 L330,255 L325,260 L275,260 Z" fill="#FFD54F"/>
  
  <!-- Patty -->
  <rect x="270" y="260" width="60" height="10" rx="5" fill="#5D4037"/>
  
  <!-- Bottom Bun -->
  <ellipse cx="300" cy="275" rx="30" ry="12" fill="#D4A574"/>
  <ellipse cx="300" cy="273" rx="25" ry="8" fill="#E0B060"/>
  
  <!-- Hands (simplified) -->
  <ellipse cx="260" cy="280" rx="15" ry="10" fill="#FFD166" transform="rotate(-20 260 280)"/>
  <ellipse cx="340" cy="280" rx="15" ry="10" fill="#FFD166" transform="rotate(20 340 280)"/>
  
  <!-- Pop Art Dots -->
  <circle cx="150" cy="100" r="15" fill="#118AB2"/>
  <circle cx="350" cy="100" r="15" fill="#118AB2"/>
  <circle cx="150" cy="300" r="15" fill="#EF476F"/>
  <circle cx="350" cy="300" r="15" fill="#EF476F"/>
  
  <!-- Warhol Signature -->
  <text x="20" y="480" font-family="Arial" font-size="16" fill="#333">Andy Warhol</text>
  <text x="20" y="495" font-family="Arial" font-size="12" fill="#666">Eat Me (1962)</text>
</svg>