<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4fa3"/>
      <stop offset="100%" stop-color="#ffd84d"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Pop-art circles -->
  <circle cx="120" cy="100" r="60" fill="#00d1ff" opacity="0.7"/>
  <circle cx="700" cy="120" r="80" fill="#ff2b2b" opacity="0.6"/>
  <circle cx="680" cy="500" r="90" fill="#00ff88" opacity="0.5"/>

  <!-- Andy-style hair -->
  <path d="M290 160
           C270 90, 390 60, 450 120
           C510 80, 560 130, 530 190
           C560 210, 560 260, 520 280
           C490 250, 430 240, 370 250
           C310 260, 260 230, 290 160Z"
        fill="#f5f5f5"
        stroke="#111"
        stroke-width="4"
        filter="url(#shadow)"/>

  <!-- Face -->
  <ellipse cx="410" cy="280" rx="120" ry="145"
           fill="#ffe0c4"
           stroke="#111"
           stroke-width="4"
           filter="url(#shadow)"/>

  <!-- Sunglasses -->
  <rect x="330" y="240" width="70" height="40" rx="10"
        fill="#111"/>
  <rect x="420" y="240" width="70" height="40" rx="10"
        fill="#111"/>
  <rect x="398" y="255" width="24" height="8" fill="#111"/>

  <!-- Nose -->
  <path d="M410 285 Q400 320 418 328"
        stroke="#111"
        stroke-width="4"
        fill="none"/>

  <!-- Mouth -->
  <path d="M375 360 Q410 390 445 360"
        stroke="#d22"
        stroke-width="5"
        fill="none"/>

  <!-- Neck -->
  <rect x="385" y="395" width="50" height="50" fill="#ffe0c4"/>

  <!-- Black turtleneck -->
  <path d="M300 520
           Q410 430 520 520
           L520 620
           L300 620Z"
        fill="#111"/>

  <!-- Hand holding burger -->
  <ellipse cx="560" cy="390" rx="42" ry="34"
           fill="#ffe0c4"
           stroke="#111"
           stroke-width="3"/>

  <!-- Burger -->
  <g transform="translate(520,320) rotate(-8)">
    <!-- Top bun -->
    <path d="M0 40 Q60 -10 120 40"
          fill="#d89b3c"
          stroke="#111"
          stroke-width="3"/>

    <!-- Sesame seeds -->
    <ellipse cx="25" cy="20" rx="4" ry="2" fill="#fff7d6"/>
    <ellipse cx="50" cy="12" rx="4" ry="2" fill="#fff7d6"/>
    <ellipse cx="80" cy="18" rx="4" ry="2" fill="#fff7d6"/>
    <ellipse cx="100" cy="24" rx="4" ry="2" fill="#fff7d6"/>

    <!-- Lettuce -->
    <path d="M5 45
             Q15 55 25 45
             Q35 55 45 45
             Q55 55 65 45
             Q75 55 85 45
             Q95 55 105 45
             Q115 55 120 45"
          fill="#3ddc5a"/>

    <!-- Patty -->
    <rect x="8" y="48" width="104" height="18"
          rx="5"
          fill="#5b2d16"/>

    <!-- Bottom bun -->
    <rect x="0" y="66" width="120" height="24"
          rx="12"
          fill="#d89b3c"
          stroke="#111"
          stroke-width="3"/>
  </g>

  <!-- Arm -->
  <path d="M510 470 Q560 430 580 390"
        stroke="#111"
        stroke-width="20"
        stroke-linecap="round"
        fill="none"/>

  <!-- Title -->
  <text x="400" y="70"
        text-anchor="middle"
        font-size="42"
        font-family="Arial Black, sans-serif"
        fill="#111">
    POP BURGER
  </text>
</svg>