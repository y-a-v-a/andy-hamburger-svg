<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <title>Stylized Andy Warhol eating a hamburger</title>
  <desc>Minimal vector illustration: a recognizable pop-art-inspired portrait with a silver wig and a hamburger held to the mouth.</desc>

  <!-- Background -->
  <rect width="900" height="600" fill="#f6f3ff"/>
  <circle cx="150" cy="120" r="90" fill="#ffe36e" opacity="0.55"/>
  <circle cx="780" cy="90" r="120" fill="#7be0ff" opacity="0.35"/>
  <circle cx="760" cy="520" r="160" fill="#ff7bd1" opacity="0.25"/>

  <!-- Subtle halftone dots (pop-ish) -->
  <g opacity="0.16" fill="#2b2b2b">
    <circle cx="70" cy="270" r="4"/><circle cx="95" cy="270" r="4"/><circle cx="120" cy="270" r="4"/>
    <circle cx="70" cy="295" r="4"/><circle cx="95" cy="295" r="4"/><circle cx="120" cy="295" r="4"/>
    <circle cx="70" cy="320" r="4"/><circle cx="95" cy="320" r="4"/><circle cx="120" cy="320" r="4"/>
    <circle cx="790" cy="255" r="4"/><circle cx="815" cy="255" r="4"/><circle cx="840" cy="255" r="4"/>
    <circle cx="790" cy="280" r="4"/><circle cx="815" cy="280" r="4"/><circle cx="840" cy="280" r="4"/>
    <circle cx="790" cy="305" r="4"/><circle cx="815" cy="305" r="4"/><circle cx="840" cy="305" r="4"/>
  </g>

  <!-- Portrait group -->
  <g id="portrait" transform="translate(120,70)">
    <!-- Neck -->
    <path d="M305 340 C300 385, 310 420, 345 445
             C370 465, 420 465, 445 445
             C480 420, 490 385, 485 340"
          fill="#f2c7a8" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>

    <!-- Shirt / jacket -->
    <path d="M235 455 C270 420, 305 410, 345 440
             C385 470, 425 470, 465 440
             C505 410, 540 420, 575 455
             L600 540
             C540 565, 475 575, 395 575
             C315 575, 250 565, 210 540 Z"
          fill="#111111" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>

    <!-- Collar -->
    <path d="M315 455 L355 500 L395 460 L435 500 L475 455"
          fill="#ffffff" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>

    <!-- Head -->
    <path d="M260 170
             C255 90, 315 40, 395 40
             C475 40, 535 90, 530 170
             C535 265, 485 335, 395 340
             C305 335, 255 265, 260 170 Z"
          fill="#f2c7a8" stroke="#1e1e1e" stroke-width="5" stroke-linejoin="round"/>

    <!-- Silver wig / hair -->
    <path d="M260 170
             C245 95, 310 20, 395 20
             C480 20, 545 95, 530 170
             C520 120, 490 95, 455 85
             C430 78, 415 85, 395 92
             C365 102, 335 95, 315 85
             C285 70, 270 110, 260 170 Z"
          fill="#d9d9df" stroke="#1e1e1e" stroke-width="5" stroke-linejoin="round"/>

    <!-- Hair texture lines -->
    <g stroke="#1e1e1e" stroke-width="3" opacity="0.35">
      <path d="M300 92 C330 70, 360 70, 390 92"/>
      <path d="M330 60 C360 45, 410 45, 445 75"/>
      <path d="M455 92 C485 85, 505 100, 515 130"/>
      <path d="M285 135 C300 115, 320 110, 340 120"/>
    </g>

    <!-- Eyes (simple) -->
    <path d="M320 185 C340 170, 370 170, 390 185" fill="none" stroke="#1e1e1e" stroke-width="4" stroke-linecap="round"/>
    <path d="M400 185 C420 170, 450 170, 470 185" fill="none" stroke="#1e1e1e" stroke-width="4" stroke-linecap="round"/>
    <circle cx="355" cy="192" r="5" fill="#1e1e1e"/>
    <circle cx="435" cy="192" r="5" fill="#1e1e1e"/>

    <!-- Nose -->
    <path d="M395 198 C385 225, 390 245, 410 255"
          fill="none" stroke="#1e1e1e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Mouth (open slightly as biting) -->
    <path d="M345 285
             C365 302, 385 310, 405 308
             C425 306, 445 296, 460 282"
          fill="none" stroke="#1e1e1e" stroke-width="5" stroke-linecap="round"/>
    <path d="M355 292
             C375 305, 410 305, 445 290"
          fill="none" stroke="#a33b3b" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

    <!-- Simple cheek shadow -->
    <path d="M280 240 C300 270, 315 290, 335 305" fill="none" stroke="#c89f86" stroke-width="10" opacity="0.35" stroke-linecap="round"/>

    <!-- Arm/hand holding burger -->
    <g id="hand" transform="translate(0,0)">
      <!-- Sleeve -->
      <path d="M560 430
               C600 440, 640 470, 655 515
               C660 530, 650 545, 632 545
               C605 545, 585 520, 570 505
               C555 490, 540 480, 520 475 Z"
            fill="#111111" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>
      <!-- Hand -->
      <path d="M515 450
               C540 430, 575 430, 600 450
               C620 465, 625 490, 612 510
               C600 528, 572 535, 548 525
               C528 517, 510 495, 505 475
               C502 465, 505 457, 515 450 Z"
            fill="#f2c7a8" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>
      <!-- Finger lines -->
      <g stroke="#1e1e1e" stroke-width="3" opacity="0.35" stroke-linecap="round">
        <path d="M540 470 C555 462, 573 462, 590 472"/>
        <path d="M535 490 C555 482, 580 483, 600 497"/>
      </g>
    </g>

    <!-- Burger near mouth -->
    <g id="burger" transform="translate(430,245) rotate(-8)">
      <!-- Top bun -->
      <path d="M40 40
               C55 10, 120 0, 170 20
               C200 32, 210 55, 200 80
               C160 95, 95 98, 45 85
               C30 72, 28 55, 40 40 Z"
            fill="#f2b26b" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>
      <!-- Sesame seeds -->
      <g fill="#fff4d6" opacity="0.9">
        <ellipse cx="75" cy="40" rx="6" ry="3"/>
        <ellipse cx="95" cy="28" rx="6" ry="3"/>
        <ellipse cx="120" cy="35" rx="6" ry="3"/>
        <ellipse cx="145" cy="30" rx="6" ry="3"/>
        <ellipse cx="165" cy="45" rx="6" ry="3"/>
        <ellipse cx="110" cy="55" rx="6" ry="3"/>
      </g>

      <!-- Lettuce -->
      <path d="M45 88
               C60 78, 75 98, 90 88
               C105 78, 120 100, 135 90
               C150 80, 170 100, 190 90
               L190 110
               C160 120, 85 122, 45 112 Z"
            fill="#45c06a" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>

      <!-- Cheese -->
      <path d="M65 112 L165 112 L150 135 L80 135 Z"
            fill="#ffd44d" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>

      <!-- Patty -->
      <path d="M45 135
               C80 155, 150 155, 190 138
               C200 155, 192 175, 175 185
               C145 200, 90 200, 60 185
               C40 175, 35 155, 45 135 Z"
            fill="#6b3b2a" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>

      <!-- Bottom bun -->
      <path d="M55 185
               C90 210, 150 210, 182 188
               C190 205, 180 225, 155 235
               C125 248, 90 248, 65 235
               C45 223, 42 205, 55 185 Z"
            fill="#eaa85f" stroke="#1e1e1e" stroke-width="4" stroke-linejoin="round"/>

      <!-- Bite mark (cutout effect via overlay) -->
      <path d="M40 75
               C15 85, 15 115, 35 125
               C25 135, 35 155, 55 150
               C60 165, 85 165, 90 145
               C110 150, 125 130, 110 115
               C130 105, 120 80, 100 80
               C90 60, 60 55, 40 75 Z"
            fill="#f6f3ff" opacity="0.95"/>
      <path d="M40 75
               C15 85, 15 115, 35 125
               C25 135, 35 155, 55 150
               C60 165, 85 165, 90 145
               C110 150, 125 130, 110 115
               C130 105, 120 80, 100 80
               C90 60, 60 55, 40 75 Z"
            fill="none" stroke="#1e1e1e" stroke-width="4" opacity="0.8"/>
    </g>

    <!-- Suggestion of contact: a small "bite" line near mouth -->
    <path d="M470 280 C495 280, 515 285, 535 295"
          fill="none" stroke="#1e1e1e" stroke-width="4" stroke-linecap="round" opacity="0.55"/>

  </g>

  <!-- Caption -->
  <g opacity="0.85">
    <rect x="40" y="520" width="420" height="56" rx="14" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
    <text x="60" y="556" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1e1e1e">
      Stylized portrait: Andy Warhol eating a hamburger
    </text>
  </g>
</svg>