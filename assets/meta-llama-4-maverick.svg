<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="300" fill="#f0f0f0" rx="10" />
  
  <!-- Andy Warhol's Head -->
  <ellipse cx="200" cy="120" rx="60" ry="70" fill="#ffe0b3" />
  <circle cx="180" cy="100" r="10" fill="#000" />
  <circle cx="220" cy="100" r="10" fill="#000" />
  <path d="M 180,140 Q 200,160 220,140" stroke="#000" stroke-width="2" fill="none" />
  
  <!-- Body -->
  <rect x="150" y="150" width="100" height="100" fill="#ffe0b3" rx="10" />
  
  <!-- Arms -->
  <rect x="80" y="180" width="70" height="20" fill="#ffe0b3" transform="rotate(-30, 80, 180)" />
  <rect x="250" y="180" width="70" height="20" fill="#ffe0b3" transform="rotate(30, 320, 180)" />
  
  <!-- Hamburger in Hand -->
  <g transform="translate(90, 170)">
    <rect x="0" y="0" width="40" height="20" fill="#964B00" />
    <ellipse cx="20" cy="10" rx="18" ry="8" fill="#ffd700" />
    <ellipse cx="20" cy="10" rx="15" ry="5" fill="#ff0" />
  </g>
  
  <!-- Legs -->
  <rect x="170" y="250" width="30" height="50" fill="#ffe0b3" />
  <rect x="200" y="250" width="30" height="50" fill="#ffe0b3" />
</svg>