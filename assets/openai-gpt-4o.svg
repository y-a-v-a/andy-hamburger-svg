<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFC0CB"/>
  
  <!-- Andy Warhol stylized head (circle) -->
  <circle cx="100" cy="80" r="40" fill="#FFD700"/>
  <ellipse cx="95" cy="70" rx="5" ry="10" fill="#FFFFFF"/>
  <ellipse cx="105" cy="70" rx="5" ry="10" fill="#FFFFFF"/>
  
  <!-- Hamburger (simple abstraction) -->
  <rect x="70" y="120" width="60" height="10" fill="#8B4513"/>
  <rect x="70" y="130" width="60" height="10" fill="#32CD32"/>
  <rect x="70" y="140" width="60" height="10" fill="#FFD700"/>
  
  <!-- Simplified body -->
  <rect x="70" y="160" width="60" height="20" fill="#000000"/>
</svg>