<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Pop Art Style Split -->
  <rect width="500" height="500" fill="#FFEF00" /> <!-- Bright Yellow -->
  <rect width="250" height="500" fill="#00FFFF" opacity="0.3" /> <!-- Cyan overlay -->

  <!-- Grouping the character and burger to center them -->
  <g transform="translate(100, 50)">
    
    <!-- Andy's Face/Head Shape (Stylized) -->
    <path d="M150,50 Q300,50 300,200 Q300,350 225,350 Q150,350 150,200 Z" fill="#FFC0CB" stroke="black" stroke-width="5"/>
    
    <!-- Iconic Silver/White Hair -->
    <path d="M150,100 Q140,40 225,40 Q310,40 300,100 Q280,70 225,70 Q170,70 150,100" fill="white" stroke="black" stroke-width="4"/>

    <!-- Eyes (Heavy Black Linework) -->
    <g stroke="black" stroke-width="4" fill="white">
      <circle cx="190" cy="150" r="15" /> <!-- Left Eye -->
      <circle cx="260" cy="150" r="15" /> <!-- Right Eye -->
      <circle cx="190" cy="150" r="5" fill="black" /> <!-- Pupil -->
      <circle cx="260" cy="150" r="5" fill="black" /> <!-- Pupil -->
    </g>

    <!-- Glasses (Black rectangular frames) -->
    <rect x="170" y="135" width="40" height="30" fill="none" stroke="black" stroke-width="4" />
    <rect x="240" y="135" width="40" height="30" fill="none" stroke="black" stroke-width="4" />
    <line x1="210" y1="150" x2="240" y2="150" stroke="black" stroke-width="4" />

    <!-- Mouth (Open, mid-bite) -->
    <ellipse cx="225" cy="280" rx="30" ry="20" fill="#800000" stroke="black" stroke-width="3" />

    <!-- THE HAMBURGER (Positioned in front of the mouth) -->
    <g transform="translate(140, 250)">
      <!-- Bottom Bun -->
      <path d="M20,50 Q65,70 110,50 L110,65 Q65,85 20,65 Z" fill="#D2B48C" stroke="black" stroke-width="3" />
      
      <!-- Meat Patty -->
      <rect x="15" y="35" width="100" height="20" rx="5" fill="#654321" stroke="black" stroke-width="3" />
      
      <!-- Cheese (Bright Yellow/Orange) -->
      <path d="M15,35 L115,35 L115,45 Q65,55 15,45 Z" fill="#FFD700" stroke="black" stroke-width="2" />
      
      <!-- Lettuce -->
      <path d="M10,30 Q30,15 50,30 Q70,15 90,30 Q110,15 120,30 L120,35 L10,35 Z" fill="#32CD32" stroke="black" stroke-width="2" />
      
      <!-- Top Bun -->
      <path d="M15,30 Q65,-20 115,30 Z" fill="#D2B48C" stroke="black" stroke-width="3" />
      
      <!-- Sesame Seeds -->
      <circle cx="40" cy="10" r="2" fill="white" />
      <circle cx="65" cy="5" r="2" fill="white" />
      <circle cx="85" cy="12" r="2" fill="white" />
    </g>

    <!-- Neck/Shoulders -->
    <path d="M180,350 L120,450 L330,450 L270,350 Z" fill="#FFC0CB" stroke="black" stroke-width="4" />
  </g>

  <!-- Pop Art "Halftone" Decoration (Circles in the corner) -->
  <g fill="#FF00FF" opacity="0.5">
    <circle cx="450" cy="50" r="15" />
    <circle cx="470" cy="50" r="15" />
    <circle cx="460" cy="70" r="15" />
    <circle cx="440" cy="70" r="15" />
    <circle cx="460" cy="90" r="15" />
  </g>
</svg>