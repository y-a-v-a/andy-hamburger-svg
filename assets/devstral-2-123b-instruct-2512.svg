<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (Warhol-style gradient) -->
  <defs>
    <linearGradient id="warholGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF00FF" />
      <stop offset="50%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#FFFF00" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#warholGradient)" />

  <!-- Andy Warhol's face (simplified) -->
  <circle cx="200" cy="150" r="80" fill="#FFD700" stroke="#000" stroke-width="3" />
  <!-- Hair (Warhol's iconic wig) -->
  <path d="M120 100 Q200 50 280 100 L280 180 Q200 150 120 180 Z" fill="#FFF" stroke="#000" stroke-width="2" />
  <!-- Eyes -->
  <circle cx="170" cy="140" r="8" fill="#000" />
  <circle cx="230" cy="140" r="8" fill="#000" />
  <!-- Mouth (eating motion) -->
  <path d="M180 180 Q200 200 220 180" stroke="#000" stroke-width="3" fill="none" />

  <!-- Hamburger -->
  <g transform="translate(250, 250)">
    <!-- Bun (top) -->
    <ellipse cx="0" cy="-30" rx="40" ry="20" fill="#F4A460" stroke="#000" stroke-width="2" />
    <!-- Lettuce -->
    <ellipse cx="0" cy="-20" rx="35" ry="15" fill="#228B22" stroke="#000" stroke-width="1" />
    <!-- Patty -->
    <ellipse cx="0" cy="-10" rx="30" ry="10" fill="#8B4513" stroke="#000" stroke-width="1" />
    <!-- Cheese -->
    <ellipse cx="0" cy="0" rx="25" ry="8" fill="#FFD700" stroke="#000" stroke-width="1" />
    <!-- Bun (bottom) -->
    <ellipse cx="0" cy="10" rx="40" ry="20" fill="#F4A460" stroke="#000" stroke-width="2" />
  </g>

  <!-- Warhol-style text (optional) -->
  <text x="200" y="380" font-family="Arial" font-size="20" text-anchor="middle" fill="#000" stroke="#FFF" stroke-width="1">
    "A Hamburger is a Work of Art"
  </text>
</svg>
