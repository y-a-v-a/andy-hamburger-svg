<svg 
    width="400" height="400" 
    viewBox="0 0 400 400" 
    xmlns="http://www.w3.org/2000/svg" 
    xmlns:xlink="http://www.w3.org/1999/xlink">

  <!-- Background with Warhol-style color blocks -->
  <rect width="200" height="200" fill="#FF4136" />
  <rect x="200" width="200" height="200" fill="#0074D9" />
  <rect y="200" width="200" height="200" fill="#2ECC40" />
  <rect x="200" y="200" width="200" height="200" fill="#FFDC00" />

  <!-- Simplified square Warhol-style face-->
  <g transform="translate(100,90)">
    <rect width="200" height="220" fill="#FFC0CB" stroke="#000" stroke-width="3" rx="40" ry="40" />
    
    <!-- Eyes -->
    <circle cx="60" cy="80" r="20" fill="#000080" />
    <circle cx="140" cy="80" r="20" fill="#000080" />
    <circle cx="60" cy="80" r="8" fill="#FFFFFF" />
    <circle cx="140" cy="80" r="8" fill="#FFFFFF" />

    <!-- Nose -->
    <rect x="90" y="110" width="20" height="10" fill="#FF69B4" rx="5" ry="5" />

    <!-- Mouth - open to eat burger -->
    <ellipse cx="100" cy="160" rx="50" ry="20" fill="#900" />
    <rect x="50" y="150" width="100" height="10" fill="#FF6347" rx="5" ry="5" />

    <!-- Hair - blocky pop art style -->
    <path d="M0 0 h200 v40 q-20 20 -40 0 t-40 0 q-20 20 -40 0 t-40 0 Z" fill="#FFD700" />
  </g>

  <!-- Hamburger in front of mouth -->
  <g transform="translate(140,160)">
    <!-- Bottom bun -->
    <ellipse cx="0" cy="30" rx="50" ry="20" fill="#FFA500" />
    <!-- Patty -->
    <rect x="-50" y="10" width="100" height="20" fill="#8B4513" rx="10" ry="10" />
    <!-- Lettuce -->
    <ellipse cx="0" cy="5" rx="50" ry="15" fill="#32CD32" />
    <!-- Top bun -->
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="#FFD700" />
    <!-- Seeds -->
    <circle cx="-20" cy="-5" r="3" fill="#FFF8DC" />
    <circle cx="-10" cy="-10" r="3" fill="#FFF8DC" />
    <circle cx="0" cy="-7" r="3" fill="#FFF8DC" />
    <circle cx="10" cy="-12" r="3" fill="#FFF8DC" />
    <circle cx="20" cy="-5" r="3" fill="#FFF8DC" />
  </g>

</svg>