<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Pop Art Pink -->
  <rect width="100%" height="100%" fill="#ff9eb5" />

  <!-- Andy Warhol's Iconic White Wig (simplified) -->
  <ellipse cx="400" cy="150" rx="100" ry="60" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <!-- Forehead / face -->
  <rect x="300" y="200" width="200" height="120" rx="20" ry="20" fill="#fff5e6" stroke="#000" stroke-width="2"/>
  <!-- Eyes: signature dark shades (Warhol always wore sunglasses) -->
  <rect x="330" y="220" width="60" height="30" fill="#000"/>
  <rect x="410" y="220" width="60" height="30" fill="#000"/>
  <!-- Nose -->
  <path d="M380,260 L390,290 L410,290 L420,260 Z" fill="#ffccaa" stroke="#000" stroke-width="1"/>
  <!-- Mouth: small, smiling, slightly ironic -->
  <path d="M350,300 Q400,310 450,300" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Hamburger: stacked layers in Warhol pop style -->
  <!-- Bottom bun -->
  <ellipse cx="400" cy="380" rx="60" ry="20" fill="#e8b26c" stroke="#000" stroke-width="1"/>
  <!-- Lettuce -->
  <path d="M340,370 Q400,350 460,370 L440,365 Q400,375 360,365 Z" fill="#66cc66" stroke="#000" stroke-width="0.5"/>
  <!-- Tomato -->
  <ellipse cx="400" cy="345" rx="45" ry="15" fill="#e63946" stroke="#000" stroke-width="0.5"/>
  <!-- Patty -->
  <rect x="350" y="325" width="100" height="18" rx="3" fill="#8c5136" stroke="#000" stroke-width="0.5"/>
  <!-- Cheese -->
  <rect x="355" y="310" width="90" height="10" rx="2" fill="#ffdd83" stroke="#000" stroke-width="0.5"/>
  <!-- Top bun -->
  <ellipse cx="400" cy="295" rx="60" ry="18" fill="#e8b26c" stroke="#000" stroke-width="1"/>

  <!-- Andy’s hand reaching up to the burger -->
  <path d="M320,300 Q300,330 310,360 Q320,390 350,385" fill="none" stroke="#ffccaa" stroke-width="8" stroke-linecap="round"/>
  <!-- Fingers as simple lines -->
  <line x1="310" y1="360" x2="300" y2="350" stroke="#ffccaa" stroke-width="5"/>
  <line x1="310" y1="360" x2="305" y2="370" stroke="#ffccaa" stroke-width="5"/>
  <line x1="350" y1="385" x2="355" y2="395" stroke="#ffccaa" stroke-width="5"/>

  <!-- Pop Art Text Bubble: “Mmm, Mass Production” -->
  <ellipse cx="550" cy="180" rx="120" ry="60" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="510" y="195" font-family="Verdana, sans-serif" font-size="18" fill="#000">Mmm, Mass Production</text>

  <!-- Repeated Andy Silhouettes (Warhol’s signature style) -->
  <!-- Small Andy faces in background -->
  <g opacity="0.3">
    <use href="#andy-face" x="100" y="450" />
    <use href="#andy-face" x="700" y="450" />
    <use href="#andy-face" x="100" y="550" />
    <use href="#andy-face" x="700" y="550" />
  </g>

  <!-- Define Andy's silhouette for reuse -->
  <defs>
    <g id="andy-face">
      <ellipse cx="0" cy="0" rx="15" ry="10" fill="#ffffff" />
      <rect x="-10" y="15" width="20" height="12" rx="5" fill="#fff5e6" />
      <rect x="-5" y="20" width="8" height="6" fill="#000"/>
      <rect x="5" y="20" width="8" height="6" fill="#000"/>
    </g>
  </defs>

  <!-- Hamburger repeat pattern in background (Warhol-style repetition) -->
  <g opacity="0.1">
    <use href="#burger" x="150" y="50" />
    <use href="#burger" x="650" y="50" />
    <use href="#burger" x="150" y="500" />
    <use href="#burger" x="650" y="500" />
    <use href="#burger" x="400" y="100" />
  </g>

  <!-- Define simple burger for repeat pattern -->
  <defs>
    <g id="burger">
      <ellipse cx="0" cy="0" rx="30" ry="10" fill="#e8b26c"/>
      <path d="M-25,-5 Q0,-15 25,-5 L20,-10 Q0,-8 -20,-10 Z" fill="#66cc66"/>
      <ellipse cx="0" cy="-20" rx="25" ry="8" fill="#e63946"/>
      <rect x="-25" y="-30" width="50" height="8" rx="2" fill="#8c5136"/>
    </g>
  </defs>

  <!-- Signature: Andy Warhol -->
  <text x="680" y="590" font-family="Arial, sans-serif" font-size="16" fill="#000" opacity="0.6">— Andy Warhol (1987)</text>
</svg>