<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />

  <!-- Andy Warhol's Head -->
  <circle cx="200" cy="300" r="100" fill="white" stroke="black" stroke-width="2" />
  
  <!-- Eyes -->
  <circle cx="180" cy="270" r="15" fill="black" />
  <circle cx="220" cy="270" r="15" fill="black" />
  <circle cx="185" cy="265" r="5" fill="white" />
  <circle cx="215" cy="265" r="5" fill="white" />
  
  <!-- Mouth -->
  <path d="M 170 380 Q 200 400 230 380" stroke="black" fill="none" stroke-width="2" />

  <!-- Hamburger -->
  <!-- Bun -->
  <rect x="500" y="320" width="150" height="60" rx="30" ry="30" fill="#FFD700" stroke="black" stroke-width="2" />
  
  <!-- Patty -->
  <rect x="525" y="320" width="100" height="20" fill="#FF4500" stroke="black" stroke-width="2" />
  
  <!-- Cheese -->
  <rect x="525" y="340" width="100" height="10" fill="#FFFFFF" stroke="black" stroke-width="2" />
  
  <!-- Lettuce -->
  <rect x="525" y="350" width="100" height="10" fill="#228B22" stroke="black" stroke-width="2" />
  
  <!-- Tomato -->
  <ellipse cx="550" cy="360" rx="25" ry="10" fill="#FF6347" stroke="black" stroke-width="2" />
</svg>