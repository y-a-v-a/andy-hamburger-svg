<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="300" height="400">
  <g id="andy-warhol-eating-hamburger">
    <g id="andy-warhol">
      <rect width="40" height="40" x="20" y="20" rx="10" fill="#C0C0C0" />
      <ellipse cx="60" cy="60" rx="30" ry="40" fill="#C0C0C0" />
      <path d="M 90,10 L 60,100 L 30,10" stroke="#C0C0C0" stroke-width="5" />
      <circle cx="80" cy="150" r="20" fill="#000" />
    </g>
    <g id="hamburger">
      <g id="bun">
        <rect x="150" y="20" width="70" height="70" rx="30" fill="#F2C464" />
      </g>
      <g id="patty">
        <circle cx="250" cy="120" r="30" fill="#531121" />
      </g>
      <g id="cheese">
        <ellipse cx="220" cy="90" rx="20" ry="30" fill="#FFD700" />
      </g>
    </g>
    <g id="mouth">
      <circle cx="60" cy="80" r="20" fill="#000" />
    </g>
    <g id="hand">
      <path d="M 40,60 L 100,180" stroke="#000" stroke-width="5" />
    </g>
  </g>
</svg>