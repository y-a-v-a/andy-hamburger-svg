<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="500" fill="#FFFFFF"/>
  
  <!-- Andy Warhol -->
  <!-- Head -->
  <circle cx="200" cy="180" r="85" fill="#f0e6e6" stroke="#000000" stroke-width="3"/>
  
  <!-- Silver wig -->
  <path d="M 115 140 Q 200 95, 285 140 L 285 180 Q 200 165, 115 180 Z" fill="#e0e0e0" stroke="#000000" stroke-width="2"/>
  
  <!-- Iconic sunglasses -->
  <g stroke="#000000" stroke-width="2">
    <rect x="150" y="155" width="65" height="42" rx="5" fill="#000000"/>
    <rect x="215" y="155" width="65" height="42" rx="5" fill="#000000"/>
    <rect x="215" y="170" width="40" height="12" fill="#000000"/>
  </g>
  
  <!-- Mouth (slightly open) -->
  <ellipse cx="200" cy="225" rx="28" ry="18" fill="#d4a574" stroke="#000000" stroke-width="2"/>
  
  <!-- Neck -->
  <rect x="175" y="265" width="50" height="45" fill="#f0e6e6" stroke="#000000" stroke-width="2"/>
  
  <!-- Leather jacket -->
  <rect x="130" y="310" width="140" height="180" rx="15" fill="#1a1a1a" stroke="#000000" stroke-width="2"/>
  
  <!-- Right arm with hamburger -->
  <g stroke="#000000" stroke-width="2" fill="#f0e6e6">
    <!-- Arm -->
    <ellipse cx="270" cy="340" rx="28" ry="55" transform="rotate(-25 270 340)"/>
    <!-- Hand holding burger -->
    <circle cx="275" cy="270" r="28" fill="#f0e6e6"/>
  </g>
  
  <!-- Hamburger (in hand, near mouth) -->
  <g transform="translate(275, 265)">
    <!-- Top bun -->
    <ellipse cx="0" cy="0" rx="38" ry="18" fill="#daa520" stroke="#000000" stroke-width="2"/>
    <!-- Sesame seeds -->
    <circle cx="-12" cy="-5" r="2" fill="#FFFFFF"/>
    <circle cx="0" cy="-3" r="2" fill="#FFFFFF"/>
    <circle cx="12" cy="-5" r="2" fill="#FFFFFF"/>
    <circle cx="-8" cy="-8" r="2" fill="#FFFFFF"/>
    <circle cx="8" cy="-8" r="2" fill="#FFFFFF"/>
    
    <!-- Lettuce -->
    <ellipse cx="0" cy="10" rx="38" ry="7" fill="#90EE90" stroke="#000000" stroke-width="1"/>
    
    <!-- Tomato -->
    <ellipse cx="0" cy="20" rx="33" ry="7" fill="#FF6347" stroke="#000000" stroke-width="1"/>
    
    <!-- Patty -->
    <ellipse cx="0" cy="30" rx="36" ry="11" fill="#8B4513" stroke="#000000" stroke-width="1"/>
    
    <!-- Bottom bun -->
    <ellipse cx="0" cy="38" rx="38" ry="16" fill="#daa520" stroke="#000000" stroke-width="2"/>
  </g>
  
  <!-- Left arm -->
  <ellipse cx="130" cy="350" rx="28" ry="50" transform="rotate(30 130 350)" fill="#f0e6e6" stroke="#000000" stroke-width="2"/>
</svg>