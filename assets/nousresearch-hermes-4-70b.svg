<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Andy Warhol -->
  <circle cx="200" cy="150" r="50" fill="#FFD700" stroke="black" stroke-width="2"/>
  <!-- Warhol's Hair -->
  <path d="M200,100 Q220,60 240,100" fill="none" stroke="black" stroke-width="3"/>
  <path d="M240,100 Q260,60 280,100" fill="none" stroke="black" stroke-width="3"/>
  <path d="M200,100 Q180,60 160,100" fill="none" stroke="black" stroke-width="3"/>
  <path d="M160,100 Q140,60 120,100" fill="none" stroke="black" stroke-width="3"/>

  <!-- Andy Warhol's Eyes -->
  <circle cx="180" cy="130" r="5" fill="black"/>
  <circle cx="220" cy="130" r="5" fill="black"/>

  <!-- Andy Warhol's Nose -->
  <line x1="200" y1="125" x2="200" y2="145" stroke="black" stroke-width="2"/>

  <!-- Andy Warhol's Mouth with Hamburger -->
  <line x1="180" y1="160" x2="220" y2="160" stroke="black" stroke-width="2"/>
  <!-- Hamburger -->
  <rect x="170" y="140" width="60" height="20" fill="#A52A2A" stroke="black" stroke-width="2"/>
  <rect x="175" y="120" width="50" height="20" fill="#8B4513" stroke="black" stroke-width="2"/>
  <rect x="185" y="100" width="30" height="20" fill="#FFD700" stroke="black" stroke-width="2"/>
  <rect x="180" y="110" width="40" height="10" fill="#228B22" stroke="black" stroke-width="2"/>
</svg>