<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
   .face { fill: #FFE4C4; }
   .hair { fill: #F5F5DC; }
   .hamburger { fill: #8B4513; }
   .patty { fill: #A52A2A; }
   .outline { stroke: #000; stroke-width: 2; }
  </style>

  <rect width="100%" height="100%" fill="#ADD8E6"/>

  <circle cx="100" cy="80" r="30" class="face outline"/>
  <path d="M 90 100 Q 100 120 110 100" stroke="#F5F5DC" stroke-width="6" fill="none" />
  
  <path d="M 70 50 
           Q 90 20 110 50 
           L 100 40 
           Q 90 50 80 40 Z" class="hair outline" />

  <circle cx="85" cy="75" r="3" fill="#000"/>
  <circle cx="115" cy="75" r="3" fill="#000"/>

  <rect x="85" y="100" width="30" height="20" class="hamburger" rx="5"/>
  <rect x="90" y="110" width="20" height="5" class="patty"/>
  <rect x="90" y="118" width="20" height="5" class="patty"/>

  <path d="M 85 120 L 95 140 M 115 120 L 105 140" stroke="#F5F5DC" stroke-width="3"/>
</svg>