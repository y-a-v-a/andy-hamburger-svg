<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pop art halftone pattern -->
    <pattern id="halftone" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ff0066" opacity="0.3"/>
    </pattern>
    <pattern id="halftone-blue" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#00ccff" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background - Pop art vibrant pink -->
  <rect width="400" height="500" fill="#ff69b4"/>

  <!-- Blue corner accent -->
  <rect x="0" y="0" width="120" height="120" fill="#00ccff"/>

  <!-- Yellow border frame -->
  <rect x="10" y="10" width="380" height="480" fill="none" stroke="#ffff00" stroke-width="8"/>

  <!-- Andy Warhol figure -->
  <g transform="translate(200, 280)">

    <!-- Neck -->
    <rect x="-35" y="-60" width="70" height="80" fill="#ffdbac"/>

    <!-- Black turtleneck -->
    <path d="M-60,20 Q-70,60 -80,100 L80,100 Q70,60 60,20 Q0,40 -60,20" fill="#1a1a1a"/>

    <!-- Face shape -->
    <ellipse cx="0" cy="-80" rx="75" ry="95" fill="#ffdbac"/>

    <!-- Face shadow/halftone -->
    <ellipse cx="0" cy="-80" rx="75" ry="95" fill="url(#halftone)"/>

    <!-- Silver wig - iconic Warhol style -->
    <path d="M-85,-90 Q-95,-160 0,-170 Q95,-160 85,-90 Q90,-60 80,-40 Q85,-20 75,-10 L70,-30 Q60,-50 50,-60 Q30,-70 0,-70 Q-30,-70 -50,-60 Q-60,-50 -70,-30 L-75,-10 Q-85,-20 -80,-40 Q-90,-60 -85,-90" fill="#c0c0c0"/>
    <path d="M-80,-100 Q-40,-140 0,-145 Q40,-140 80,-100" fill="#e0e0e0"/>

    <!-- Wig texture lines -->
    <path d="M-60,-120 L-55,-80 M-40,-130 L-35,-85 M-20,-135 L-15,-85 M0,-140 L0,-85 M20,-135 L25,-85 M40,-130 L45,-85 M60,-120 L65,-80" stroke="#a0a0a0" stroke-width="2" fill="none"/>

    <!-- Eyes -->
    <ellipse cx="-25" cy="-85" rx="12" ry="8" fill="#ffffff"/>
    <ellipse cx="25" cy="-85" rx="12" ry="8" fill="#ffffff"/>
    <circle cx="-25" cy="-85" r="4" fill="#4a3728"/>
    <circle cx="25" cy="-85" r="4" fill="#4a3728"/>
    <!-- Heavy eyelids -->
    <path d="M-40,-92 Q-25,-88 -10,-92" stroke="#d4a574" stroke-width="3" fill="none"/>
    <path d="M10,-92 Q25,-88 40,-92" stroke="#d4a574" stroke-width="3" fill="none"/>

    <!-- Nose -->
    <path d="M-8,-75 L-5,-55 L0,-50 L5,-55 L8,-75" fill="#e8c4a0"/>
    <path d="M-8,-75 Q0,-70 8,-75" stroke="#d4a574" stroke-width="2" fill="none"/>

    <!-- Mouth - biting burger -->
    <path d="M-20,-35 Q0,-25 20,-35 Q15,-20 0,-18 Q-15,-20 -20,-35" fill="#8b0000"/>
    <path d="M-18,-32 Q0,-22 18,-32" stroke="#ff6b6b" stroke-width="2" fill="none"/>

    <!-- Cheekbones -->
    <ellipse cx="-45" cy="-55" rx="15" ry="10" fill="#f0c0a0" opacity="0.6"/>
    <ellipse cx="45" cy="-55" rx="15" ry="10" fill="#f0c0a0" opacity="0.6"/>

  </g>

  <!-- Hamburger - being eaten -->
  <g transform="translate(200, 260)">
    <!-- Bottom bun -->
    <ellipse cx="0" cy="40" rx="55" ry="20" fill="#d4a574"/>
    <path d="M-55,40 Q-55,65 0,65 Q55,65 55,40 L55,35 Q55,60 0,60 Q-55,60 -55,35 Z" fill="#b8956a"/>

    <!-- Lettuce -->
    <path d="M-50,25 Q-40,15 -30,25 Q-20,15 -10,25 Q0,15 10,25 Q20,15 30,25 Q40,15 50,25 L50,35 Q40,30 30,35 Q20,30 10,35 Q0,30 -10,35 Q-20,30 -30,35 Q-40,30 -50,35 Z" fill="#7cb342"/>

    <!-- Meat patty -->
    <rect x="-50" y="5" width="100" height="25" rx="5" fill="#5d4037"/>
    <ellipse cx="0" cy="5" rx="50" ry="10" fill="#6d4c41"/>

    <!-- Cheese -->
    <path d="M-48,8 L48,8 L45,0 L-45,0 Z" fill="#ffc107"/>
    <path d="M-45,0 L-40,-8 L-35,0 L-30,-5 L-25,0 L-20,-8 L-15,0 L-10,-5 L-5,0 L0,-8 L5,0 L10,-5 L15,0 L20,-8 L25,0 L30,-5 L35,0 L40,-8 L45,0" fill="#ffc107"/>

    <!-- Top bun -->
    <path d="M-50,0 Q-50,-45 0,-45 Q50,-45 50,0 Z" fill="#e6b89c"/>
    <ellipse cx="0" cy="-45" rx="50" ry="15" fill="#f4c2a1"/>

    <!-- Sesame seeds -->
    <ellipse cx="-20" cy="-40" rx="2" ry="1" fill="#fff8e1"/>
    <ellipse cx="0" cy="-48" rx="2" ry="1" fill="#fff8e1"/>
    <ellipse cx="20" cy="-38" rx="2" ry="1" fill="#fff8e1"/>
    <ellipse cx="-35" cy="-30" rx="2" ry="1" fill="#fff8e1"/>
    <ellipse cx="35" cy="-35" rx="2" ry="1" fill="#fff8e1"/>
    <ellipse cx="-10" cy="-35" rx="2" ry="1" fill="#fff8e1"/>
    <ellipse cx="15" cy="-42" rx="2" ry="1" fill="#fff8e1"/>

    <!-- Bite mark -->
    <circle cx="35" cy="-20" r="18" fill="#ff69b4"/>
    <circle cx="45" cy="-5" r="15" fill="#ff69b4"/>
    <circle cx="40" cy="10" r="12" fill="#ff69b4"/>
  </g>

  <!-- Hand holding burger -->
  <g transform="translate(200, 320)">
    <!-- Fingers -->
    <ellipse cx="-40" cy="-30" rx="12" ry="25" fill="#ffdbac" transform="rotate(-20)"/>
    <ellipse cx="-45" cy="-5" rx="12" ry="28" fill="#ffdbac" transform="rotate(-10)"/>
    <ellipse cx="-40" cy="25" rx="12" ry="26" fill="#ffdbac" transform="rotate(5)"/>
    <!-- Thumb -->
    <ellipse cx="40" cy="10" rx="14" ry="22" fill="#ffdbac" transform="rotate(30)"/>
    <!-- Palm -->
    <ellipse cx="0" cy="0" rx="45" ry="55" fill="#ffdbac"/>
  </g>

  <!-- Pop art text -->
  <text x="200" y="450" font-family="Impact, Arial Black, sans-serif" font-size="36" fill="#ffff00" text-anchor="middle" stroke="#000" stroke-width="1">ANDY</text>
  <text x="200" y="485" font-family="Impact, Arial Black, sans-serif" font-size="36" fill="#00ccff" text-anchor="middle" stroke="#000" stroke-width="1">WARHOL</text>

  <!-- Decorative elements -->
  <circle cx="50" cy="450" r="25" fill="#ffff00" opacity="0.8"/>
  <circle cx="350" cy="450" r="25" fill="#00ccff" opacity="0.8"/>
  <rect x="30" y="40" width="60" height="8" fill="#ffff00" transform="rotate(45 60 44)"/>
  <rect x="310" y="40" width="60" height="8" fill="#ffff00" transform="rotate(-45 340 44)"/>

</svg>