<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <title>Stylized pop-art figure eating a hamburger</title>
  <desc>A bright, pop-art inspired illustration of a stylized figure with colorful hair and sunglasses eating a large hamburger.</desc>

  <defs>
    <!-- Halftone dot pattern -->
    <pattern id="dots" patternUnits="userSpaceOnUse" width="18" height="18">
      <circle cx="5" cy="5" r="4" fill="#000000" opacity="0.12"/>
      <circle cx="14" cy="14" r="4" fill="#000000" opacity="0.12"/>
    </pattern>

    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFE7F5"/>
      <stop offset="70%" stop-color="#FFD34D"/>
      <stop offset="100%" stop-color="#FF9D00"/>
    </radialGradient>

    <!-- Shirt gradient -->
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3B3B"/>
      <stop offset="100%" stop-color="#D01616"/>
    </linearGradient>

    <!-- Bun gradients -->
    <linearGradient id="bunTopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9D58A"/>
      <stop offset="100%" stop-color="#E79C3A"/>
    </linearGradient>
    <linearGradient id="bunBottomGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4C46B"/>
      <stop offset="100%" stop-color="#D98A2A"/>
    </linearGradient>

    <!-- Patty gradient -->
    <linearGradient id="pattyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B3B26"/>
      <stop offset="100%" stop-color="#3E1F12"/>
    </linearGradient>

    <!-- Lettuce gradient -->
    <linearGradient id="lettuceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A1E66C"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>

    <!-- Cheese gradient -->
    <linearGradient id="cheeseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>

    <!-- Lips gradient -->
    <linearGradient id="lipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D79"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#dots)"/>

  <!-- Ground shadow -->
  <ellipse cx="450" cy="640" rx="210" ry="30" fill="#000000" opacity="0.1"/>

  <!-- Torso -->
  <g id="torso">
    <rect x="320" y="420" width="260" height="180" rx="28" fill="url(#shirtGrad)" stroke="#111111" stroke-width="3"/>
    <!-- Collar -->
    <path d="M380 430 L450 480 L520 430" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="385" cy="480" r="6" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <circle cx="515" cy="480" r="6" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <circle cx="450" cy="530" r="6" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
    <circle cx="450" cy="565" r="6" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  </g>

  <!-- Left arm (bent up holding the burger) -->
  <g id="leftArm" stroke-linejoin="round" stroke-linecap="round">
    <!-- Upper arm -->
    <rect x="310" y="440" width="120" height="42" rx="20"
          fill="url(#shirtGrad)" stroke="#111111" stroke-width="3"
          transform="rotate(-30 370 460)"/>
    <!-- Forearm -->
    <rect x="390" y="380" width="42" height="140" rx="20"
          fill="url(#shirtGrad)" stroke="#111111" stroke-width="3"
          transform="rotate(-70 411 450)"/>
    <!-- Hand -->
    <circle cx="470" cy="355" r="22" fill="#FFD5B5" stroke="#111111" stroke-width="3"/>
    <!-- Fingers -->
    <circle cx="458" cy="345" r="7" fill="#FFD5B5" stroke="#111111" stroke-width="2"/>
    <circle cx="468" cy="338" r="7" fill="#FFD5B5" stroke="#111111" stroke-width="2"/>
    <circle cx="478" cy="345" r="7" fill="#FFD5B5" stroke="#111111" stroke-width="2"/>
  </g>

  <!-- Right arm (relaxed) -->
  <g id="rightArm" stroke-linejoin="round" stroke-linecap="round">
    <rect x="570" y="450" width="120" height="44" rx="22"
          fill="url(#shirtGrad)" stroke="#111111" stroke-width="3"
          transform="rotate(25 630 470)"/>
  </g>

  <!-- Head -->
  <g id="head" transform="translate(0,0)">
    <!-- Neck -->
    <rect x="425" y="365" width="50" height="40" rx="10" fill="#FFD5B5" stroke="#111111" stroke-width="3"/>
    <!-- Face -->
    <ellipse cx="450" cy="300" rx="95" ry="110" fill="#FFD5B5" stroke="#111111" stroke-width="4"/>
    <!-- Hair (blocky, colorful) -->
    <g id="hair" stroke="#111111" stroke-width="3">
      <rect x="360" y="195" width="90" height="45" rx="8" fill="#FF2FB9"/>
      <polygon points="445,190 490,165 475,210" fill="#FF2FB9"/>
      <polygon points="355,210 400,185 405,225" fill="#FF2FB9"/>
      <polygon points="410,190 445,170 440,215" fill="#FF2FB9"/>
    </g>

    <!-- Sunglasses -->
    <g id="glasses">
      <circle cx="415" cy="300" r="30" fill="#121212" stroke="#FFFFFF" stroke-width="6"/>
      <circle cx="485" cy="300" r="30" fill="#121212" stroke="#FFFFFF" stroke-width="6"/>
      <rect x="445" y="295" width="10" height="10" fill="#FFFFFF"/>
      <path d="M385 295 C375 280, 370 275, 360 272" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M515 295 C525 280, 530 275, 540 272" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Eyebrows -->
    <rect x="395" y="270" width="40" height="8" rx="4" fill="#111111"/>
    <rect x="465" y="270" width="40" height="8" rx="4" fill="#111111"/>

    <!-- Nose -->
    <path d="M452 305 q-6 18 -2 30" stroke="#111111" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Mouth with burger -->
    <g id="mouth">
      <!-- Mouth interior -->
      <ellipse cx="450" cy="338" rx="38" ry="20" fill="#5C1A1A" stroke="#111111" stroke-width="3"/>
      <!-- Lips -->
      <path d="M415 328 Q450 315 485 328 L485 344 Q450 360 415 344 Z" fill="url(#lipGrad)" stroke="#111111" stroke-width="3"/>
    </g>
  </g>

  <!-- Hamburger -->
  <g id="burger" transform="translate(0,0)">
    <!-- Top bun -->
    <rect x="340" y="318" width="220" height="62" rx="30" fill="url(#bunTopGrad)" stroke="#111111" stroke-width="4"/>
    <!-- Sesame seeds -->
    <g fill="#FFFFFF" stroke="#111111" stroke-width="1.2">
      <ellipse cx="370" cy="330" rx="6" ry="3" transform="rotate(-20 370 330)"/>
      <ellipse cx="395" cy="320" rx="6" ry="3" transform="rotate(10 395 320)"/>
      <ellipse cx="430" cy="325" rx="6" ry="3" transform="rotate(-15 430 325)"/>
      <ellipse cx="470" cy="320" rx="6" ry="3" transform="rotate(25 470 320)"/>
      <ellipse cx="510" cy="330" rx="6" ry="3" transform="rotate(-5 510 330)"/>
      <ellipse cx="545" cy="335" rx="6" ry="3" transform="rotate(15 545 335)"/>
    </g>

    <!-- Lettuce (wavy) -->
    <path d="M355 370
             C365 390, 385 350, 405 370
             C425 390, 445 350, 465 370
             C485 390, 505 350, 525 370
             L525 378
             C505 360, 485 398, 465 378
             C445 360, 425 398, 405 378
             C385 360, 365 398, 355 378
             Z"
          fill="url(#lettuceGrad)" stroke="#111111" stroke-width="3"/>

    <!-- Cheese slice with drips -->
    <g>
      <polygon points="350,378 550,378 550,392 495,392 490,406 480,392 440,392 430,410 420,392 385,392 380,406 370,392 350,392"
               fill="url(#cheeseGrad)" stroke="#111111" stroke-width="3"/>
    </g>

    <!-- Patty -->
    <rect x="350" y="410" width="200" height="40" rx="16" fill="url(#pattyGrad)" stroke="#111111" stroke-width="4"/>

    <!-- Bottom bun -->
    <rect x="360" y="448" width="180" height="36" rx="18" fill="url(#bunBottomGrad)" stroke="#111111" stroke-width="4"/>
  </g>

  <!-- Fingers holding burger (front layer to look wrapped around) -->
  <g id="frontFingers" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="480" cy="352" r="8" fill="#FFD5B5" stroke="#111111" stroke-width="2"/>
    <circle cx="494" cy="346" r="8" fill="#FFD5B5" stroke="#111111" stroke-width="2"/>
    <circle cx="506" cy="352" r="8" fill="#FFD5B5" stroke="#111111" stroke-width="2"/>
    <circle cx="466" cy="358" r="7" fill="#FFD5B5" stroke="#111111" stroke-width="2"/>
  </g>

  <!-- Decorative caption -->
  <text x="450" y="90" font-family="Verdana, Geneva, DejaVu Sans, sans-serif" font-size="48" text-anchor="middle"
        fill="#FFFFFF" stroke="#111111" stroke-width="3" style="paint-order: stroke fill">
    BURGER SERIES
  </text>
</svg>