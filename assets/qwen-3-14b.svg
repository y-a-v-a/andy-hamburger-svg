<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fff3e0" />

  <!-- Andy Warhol's Head -->
  <circle cx="150" cy="180" r="80" fill="#f5f5dc" stroke="#a9a9a9" stroke-width="2" />
  
  <!-- Silver Hair -->
  <ellipse cx="150" cy="110" rx="60" ry="30" fill="#c0c0c0" />

  <!-- Eyes -->
  <circle cx="130" cy="160" r="8" fill="#ffffff" />
  <circle cx="130" cy="160" r="4" fill="#000000" />
  <circle cx="170" cy="160" r="8" fill="#ffffff" />
  <circle cx="170" cy="160" r="4" fill="#000000" />

  <!-- Nose and Mouth -->
  <ellipse cx="150" cy="180" rx="6" ry="4" fill="#ff4500" />
  <path d="M130,200 Q150,220 170,200" stroke="#000000" stroke-width="2" fill="none" />

  <!-- Mustache -->
  <path d="M130,195 Q140,210 150,195" stroke="#000000" stroke-width="4" fill="none" />
  <path d="M170,195 Q160,210 150,195" stroke="#000000" stroke-width="4" fill="none" />

  <!-- Glasses -->
  <circle cx="135" cy="155" r="8" fill="#000000" />
  <circle cx="165" cy="155" r="8" fill="#000000" />
  <line x1="135" y1="145" x2="165" y2="145" stroke="#000000" stroke-width="2" />
  <line x1="135" y1="165" x2="165" y2="165" stroke="#000000" stroke-width="2" />

  <!-- Hamburger -->
  <!-- Bottom Bun -->
  <rect x="120" y="230" width="60" height="20" fill="#a52a2a" rx="10" />
  <!-- Lettuce -->
  <ellipse cx="150" cy="210" rx="25" ry="10" fill="#008000" />
  <!-- Tomato -->
  <ellipse cx="150" cy="190" rx="20" ry="10" fill="#ff6347" />
  <!-- Pickles -->
  <ellipse cx="130" cy="180" rx="6" ry="3" fill="#ffff00" />
  <ellipse cx="170" cy="180" rx="6" ry="3" fill="#ffff00" />
  <!-- Top Bun -->
  <rect x="120" y="160" width="60" height="20" fill="#a52a2a" rx="10" />
  <!-- Ketchup Splash -->
  <circle cx="140" cy="170" r="5" fill="#ff6347" />
  <circle cx="160" cy="170" r="5" fill="#ff6347" />

  <!-- Shirt -->
  <rect x="90" y="220" width="120" height="100" fill="#add8e6" rx="10" />
</svg>