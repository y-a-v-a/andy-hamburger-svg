<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Define a repetitive pattern for Warhol-style background -->
    <pattern id="warhol-grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="none" />
      <circle cx="25" cy="25" r="5" fill="red" opacity="0.3"/>
      <circle cx="25" cy="25" r="5" fill="blue" opacity="0.3"/>
      <circle cx="25" cy="25" r="5" fill="yellow" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="white" />
  <rect width="100%" height="100%" fill="url(#warhol-grid)" />

  <!-- Andy Warhol's Head (Simplified cartoon style) -->
  <g transform="scale(0.8) translate(400, 250)">
    <!-- Head shape -->
    <ellipse cx="0" cy="-80" rx="70" ry="80" fill="lightpink" stroke="black" stroke-width="2"/>

    <!-- Profile face (simple line art) -->
    <path d="M -40 -80 Q -10 -60 20 -60 Q 50 -60 70 -75 Q 70 -90 60 -100 Q 50 -120 40 -115 Q 45 -100 40 -90 Q 30 -80 20 -75 Q 10 -70 0 -75 Q -20 -70 -30 -80" fill="none" stroke="black" stroke-width="2"/>

    <!-- Eyes -->
    <circle cx="-25" cy="-70" r="8" fill="white" />
    <circle cx="-25" cy="-70" r="4" fill="black" />
    <circle cx="25" cy="-70" r="8" fill="white" />
    <circle cx="25" cy="-70" r="4" fill="black" />

    <!-- Nose -->
    <path d="M 0 -60 L 0 -50 L 15 -55 Z" fill="lightpink" stroke="black" stroke-width="1" />

    <!-- Mouth -->
    <path d="M -30 -40 Q 0 -45 30 -40" fill="none" stroke="red" stroke-width="3" />

    <!-- Hair (simplified, with neon colors for Warhol vibes) -->
    <path d="M -60 -20 Q -30 -10 0 -20 Q 30 -10 60 -20" fill="none" stroke="red" stroke-width="6" />
    <path d="M -60 -20 Q -30 -10 0 -20 Q 30 -10 60 -20" fill="none" stroke="blue" stroke-width="4" />
    <path d="M -60 -20 Q -30 -10 0 -20 Q 30 -10 60 -20" fill="none" stroke="yellow" stroke-width="2" />
  </g>

  <!-- Hamburger (simplified, for visual impact) -->
  <g transform="scale(0.6) translate(380, 400)">
    <!-- Bottom bun -->
    <rect x="-50" y="0" width="100" height="20" fill="lightbrown" stroke="black" stroke-width="1" />
    <!-- Bottom bun shadow -->
    <rect x="-60" y="18" width="120" height="5" fill="#8B4513" opacity="0.3" />

    <!-- Cheese slice -->
    <rect x="-40" y="20" width="80" height="10" fill="gold" stroke="black" stroke-width="0.5" />

    <!-- Patty -->
    <rect x="-40" y="30" width="80" height="15" fill="brown" stroke="black" stroke-width="0.5" />
    <circle cx="-20" cy="35" r="3" fill="black" />
    <circle cx="-10" cy="37" r="2" fill="black" />
    <circle cx="-5" cy="40" r="2" fill="black" />
    <circle cx="5" cy="40" r="2" fill="black" />
    <circle cx="10" cy="37" r="2" fill="black" />
    <circle cx="20" cy="35" r="3" fill="black" />

    <!-- Lettuce -->
    <rect x="-40" y="45" width="80" height="6" fill="green" stroke="green" stroke-width="0.5" />

    <!-- Top bun -->
    <rect x="-50" y="51" width="100" height="20" fill="lightbrown" stroke="black" stroke-width="1" />
    <rect x="-60" y="68" width="120" height="5" fill="#8B4513" opacity="0.3" />

    <!-- Warhol-style color saturation across the burger -->
    <g opacity="0.7">
      <rect x="-50" y="0" width="100" height="20" fill="red" />
      <rect x="-40" y="20" width="80" height="10" fill="blue" />
      <rect x="-40" y="30" width="80" height="15" fill="yellow" />
      <rect x="-40" y="45" width="80" height="6" fill="green" />
      <rect x="-50" y="51" width="100" height="20" fill="purple" />
    </g>
  </g>

  <!-- Andy's hand reaching with the burger -->
  <g transform="scale(0.3) translate(250, 300)">
    <!-- Arm -->
    <rect x="0" y="-40" width="10" height="80" fill="lightpink" />

    <!-- Hand -->
    <ellipse cx="0" cy="40" rx="20" ry="15" fill="lightpink" stroke="black" stroke-width="1" />
    <line x1="0" y1="35" x2="0" y2="60" stroke="black" stroke-width="1" />
    <line x1="0" y1="35" x2="-15" y2="30" stroke="black" stroke-width="1" />
    <line x1="0" y1="35" x2="15" y2="30" stroke="black" stroke-width="1" />
    <line x1="0" y1="40" x2="-10" y2="45" stroke="black" stroke-width="1" />
    <line x1="0" y1="40" x2="10" y2="45" stroke="black" stroke-width="1" />
  </g>

  <!-- Warhol-style title text -->
  <text x="350" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="red" text-anchor="middle">
    ANDY WARHOL
  </text>
  <text x="350" y="90" font-family="Arial, sans-serif" font-size="24" font-style="italic" fill="blue" text-anchor="middle">
    EATING A HAMBURGER
  </text>

  <!-- Small dot pattern as Warhol icon -->
  <g fill="red">
    <circle cx="100" cy="100" r="3" opacity="0.6"/>
    <circle cx="130" cy="120" r="3" opacity="0.6"/>
    <circle cx="200" cy="90" r="3" opacity="0.6"/>
    <circle cx="300" cy="150" r="3" opacity="0.6"/>
    <circle cx="500" cy="200" r="3" opacity="0.6"/>
    <circle cx="650" cy="100" r="3" opacity="0.6"/>
  </g>
</svg>