<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Background with pop art style -->
  <defs>
    <pattern id="polkaDot" x="0" y="0" width="20" height="20">
      <circle cx="10" cy="10" r="3" fill="#ff6b6b" opacity="0.3"/>
    </pattern>
    <linearGradient id="warholGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45b7d1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="400" height="500" fill="url(#polkaDot)" />
  
  <!-- Ground -->
  <rect x="0" y="350" width="400" height="150" fill="#95e1d3" />
  
  <!-- Hamburger -->
  <g id="hamburger" transform="translate(180, 180)">
    <!-- Top bun -->
    <path d="M50,40 C65,30 85,30 100,40 C85,50 65,50 50,40 Z" fill="#f9ed6c" stroke="#e0a800" stroke-width="2"/>
    <!-- Lettuce -->
    <ellipse cx="75" cy="55" rx="35" ry="8" fill="#2a9d8f"/>
    <!-- Tomato -->
    <ellipse cx="75" cy="70" rx="30" ry="12" fill="#e76f51"/>
    <!-- Meat -->
    <path d="M45,80 L105,80 L100,100 L50,100 Z" fill="#8d99ae" stroke="#666"/>
    <!-- Cheese -->
    <ellipse cx="75" cy="90" rx="30" ry="8" fill="#fcbf49"/>
    <!-- Bottom bun -->
    <path d="M50,100 C65,110 85,110 100,100 C85,90 65,90 50,100 Z" fill="#f9ed6c" stroke="#e0a800" stroke-width="2"/>
  </g>
  
  <!-- Andy Warhol -->
  <g id="andy" transform="translate(120, 100)">
    <!-- Head -->
    <circle cx="50" cy="50" r="35" fill="#f4a261" stroke="#e76f51" stroke-width="2"/>
    <!-- Hair -->
    <path d="M30,30 Q50,15 70,30 L70,40 Q50,45 30,40 Z" fill="#264653"/>
    <!-- Eyes -->
    <ellipse cx="40" cy="48" rx="5" ry="8" fill="#264653"/>
    <ellipse cx="60" cy="48" rx="5" ry="8" fill="#264653"/>
    <!-- Eyebrows -->
    <path d="M35,40 Q50,45 65,40" stroke="#264653" stroke-width="2" fill="none"/>
    <!-- Smile -->
    <path d="M40,60 Q50,65 60,60" stroke="#264653" stroke-width="2" fill="none"/>
    <!-- Mustache -->
    <path d="M40,68 Q50,72 60,68" stroke="#264653" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Pop Art Banner -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-weight="bold" font-size="24" text-anchor="middle" fill="#264653">
    ANDY WARHOL
  </text>
  
  <!-- Speech bubble -->
  <path d="M250,180 Q280,170 300,180 L300,210 Q280,220 250,210 Z" fill="white" stroke="#333" stroke-width="1"/>
  <text x="260" y="200" font-family="Arial, sans-serif" font-size="14" fill="#333">#PopArt</text>
  
  <!-- Title -->
  <text x="200" y="450" font-family="Arial, sans-serif" font-weight="bold" font-size="18" text-anchor="middle" fill="#264653">
    BURGER POP ART
  </text>
  
  <!-- Pop Art Dots -->
  <circle cx="50" cy="100" r="5" fill="#e76f51"/>
  <circle cx="350" cy="120" r="5" fill="#2a9d8f"/>
  <circle cx="380" cy="300" r="5" fill="#f9ed6c"/>
  <circle cx="20" cy="400" r="5" fill="#8d99ae"/>
</svg>