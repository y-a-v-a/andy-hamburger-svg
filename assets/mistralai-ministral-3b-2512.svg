<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (black and white grid) -->
  <rect width="100%" height="100%" fill="#000" opacity="0.3"/>

  <!-- Andy Warhol's face (simplified oval) -->
  <circle cx="150" cy="150" r="80" fill="#FF0000" stroke="#000" stroke-width="5"/>

  <!-- Eyes (dots) -->
  <circle cx="130" cy="140" r="8" fill="#000"/>
  <circle cx="170" cy="140" r="8" fill="#000"/>

  <!-- Mouth (smile) -->
  <path d="M150 170 Q160 180 170 170" stroke="#000" stroke-width="5" fill="none"/>

  <!-- Pop Art style: Hamburger -->
  <rect x="200" y="220" width="80" height="60" fill="#FF0000" stroke="#000" stroke-width="3"/>
  <rect x="210" y="230" width="60" height="20" fill="#000" stroke="#000" stroke-width="3"/> <!-- Buns -->
  <rect x="215" y="240" width="50" height="30" fill="#FF000" stroke="#000" stroke-width="3"/> <!-- Lettuce -->
  <rect x="220" y="250" width="40" height="20" fill="#FF000" stroke="#000" stroke-width="3"/> <!-- Tomato -->
  <rect x="225" y="260" width="30" height="15" fill="#FF000" stroke="#000" stroke-width="3"/> <!-- Pickles -->

  <!-- Andy eating the burger -->
  <path d="M150 200 Q160 210 170 200" stroke="#000" stroke-width="5" fill="none"/>
  <circle cx="160" cy="210" r="10" fill="#FF0000" stroke="#000" stroke-width="2"/> <!-- Hand holding burger -->

  <!-- Warhol's signature style: Polka dots -->
  <circle cx="100" cy="100" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="300" cy="300" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="200" cy="200" r="2" fill="#FFF" opacity="0.7"/>
</svg>