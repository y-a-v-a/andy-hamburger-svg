<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <title>Stylized portrait of Andy Warhol eating a hamburger</title>
  <desc>An original pop-art-inspired SVG depiction of Andy Warhol with white hair, black turtleneck, and a hamburger near his mouth.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="#111" flood-opacity="0.35"/>
    </filter>

    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="#ff3eb5" opacity="0.45"/>
    </pattern>

    <linearGradient id="bun" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7c45d"/>
      <stop offset="100%" stop-color="#d98a2b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#13d7ff"/>
  <rect x="0" y="0" width="900" height="700" fill="url(#dots)"/>
  <rect x="42" y="42" width="816" height="616" fill="none" stroke="#111" stroke-width="10"/>

  <!-- Pop-art blocks -->
  <rect x="58" y="58" width="240" height="170" fill="#ffea00" opacity="0.9"/>
  <rect x="606" y="76" width="220" height="160" fill="#ff3b30" opacity="0.85"/>
  <rect x="84" y="492" width="260" height="120" fill="#7dff00" opacity="0.75"/>
  <rect x="588" y="488" width="230" height="125" fill="#b042ff" opacity="0.75"/>

  <!-- Shoulders / black turtleneck -->
  <path d="M225 650 C255 475 332 395 450 395 C568 395 645 475 675 650 Z"
        fill="#111" filter="url(#shadow)"/>
  <path d="M350 650 C360 510 386 455 450 455 C514 455 540 510 550 650 Z"
        fill="#050505"/>
  <ellipse cx="450" cy="458" rx="92" ry="38" fill="#111"/>

  <!-- Neck -->
  <path d="M393 365 C405 440 495 440 507 365 L507 470 C490 505 410 505 393 470 Z"
        fill="#f4c7a8" stroke="#111" stroke-width="5"/>

  <!-- Hair silhouette -->
  <path d="M282 285
           C250 220 265 142 335 98
           C350 55 415 45 452 70
           C495 37 572 70 582 132
           C652 168 653 263 612 320
           C606 385 548 435 454 433
           C354 431 293 380 282 285 Z"
        fill="#f1f1e8" stroke="#111" stroke-width="7" filter="url(#shadow)"/>

  <!-- Hair texture strokes -->
  <path d="M337 113 C310 160 315 228 292 276" fill="none" stroke="#bfc0ba" stroke-width="6"/>
  <path d="M385 79 C370 145 373 217 350 280" fill="none" stroke="#bfc0ba" stroke-width="5"/>
  <path d="M448 76 C438 153 442 220 423 294" fill="none" stroke="#bfc0ba" stroke-width="5"/>
  <path d="M514 83 C530 145 522 221 548 294" fill="none" stroke="#bfc0ba" stroke-width="5"/>
  <path d="M575 139 C605 190 599 255 616 304" fill="none" stroke="#bfc0ba" stroke-width="6"/>

  <!-- Face -->
  <path d="M325 240
           C323 167 377 112 450 112
           C523 112 577 167 575 240
           C578 337 530 398 450 398
           C370 398 322 337 325 240 Z"
        fill="#ffd1b5" stroke="#111" stroke-width="7"/>

  <!-- Cheeks / pop shadows -->
  <path d="M344 287 C371 272 407 276 421 300 C393 320 361 318 344 287 Z"
        fill="#ff4fa3" opacity="0.55"/>
  <path d="M555 287 C528 272 492 276 478 300 C506 320 538 318 555 287 Z"
        fill="#ff4fa3" opacity="0.55"/>

  <!-- Sunglasses -->
  <path d="M357 214 C386 198 426 202 442 224 C438 257 413 273 379 266 C356 261 345 239 357 214 Z"
        fill="#111"/>
  <path d="M543 214 C514 198 474 202 458 224 C462 257 487 273 521 266 C544 261 555 239 543 214 Z"
        fill="#111"/>
  <path d="M438 226 C446 219 454 219 462 226" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round"/>
  <path d="M371 221 C391 209 416 212 429 226" fill="none" stroke="#fff" stroke-width="4" opacity="0.75"/>
  <path d="M471 226 C486 211 512 210 533 221" fill="none" stroke="#fff" stroke-width="4" opacity="0.75"/>

  <!-- Nose -->
  <path d="M449 230 C442 268 437 291 424 316 C439 327 460 327 474 316"
        fill="none" stroke="#111" stroke-width="5" stroke-linecap="round"/>

  <!-- Mouth partially open -->
  <path d="M405 346 C430 365 471 365 496 346 C476 383 425 383 405 346 Z"
        fill="#7b1e24" stroke="#111" stroke-width="5"/>
  <path d="M424 351 C445 359 463 358 481 351" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>

  <!-- Hamburger near mouth -->
  <g transform="translate(487 316) rotate(-8)" filter="url(#shadow)">
    <!-- Hand behind burger -->
    <path d="M88 92
             C122 90 143 111 147 137
             C150 160 135 178 112 175
             L20 162
             C-8 158 -18 129 2 111
             C20 96 49 96 88 92 Z"
          fill="#ffd1b5" stroke="#111" stroke-width="6"/>
    <path d="M35 116 C45 142 45 156 30 170" fill="none" stroke="#111" stroke-width="4"/>
    <path d="M67 110 C78 139 77 158 62 174" fill="none" stroke="#111" stroke-width="4"/>
    <path d="M100 111 C111 137 110 155 96 172" fill="none" stroke="#111" stroke-width="4"/>

    <!-- Burger -->
    <g transform="translate(-8 0)">
      <path d="M20 48 C31 10 95 0 139 16 C166 26 185 45 189 69
               C148 82 65 82 20 48 Z"
            fill="url(#bun)" stroke="#111" stroke-width="6"/>
      <circle cx="55" cy="31" r="4" fill="#fff4bc"/>
      <circle cx="88" cy="22" r="4" fill="#fff4bc"/>
      <circle cx="125" cy="32" r="4" fill="#fff4bc"/>
      <circle cx="154" cy="49" r="4" fill="#fff4bc"/>

      <path d="M21 67 C57 80 148 81 189 67 L184 91 C141 101 65 101 27 91 Z"
            fill="#f7d35b" stroke="#111" stroke-width="5"/>
      <path d="M28 93 C57 77 76 111 103 93 C129 78 146 111 181 94
               L181 119 C138 133 68 132 28 119 Z"
            fill="#5bbd2a" stroke="#111" stroke-width="5"/>
      <path d="M24 120 C70 134 139 136 186 120 L181 146 C135 158 70 158 29 146 Z"
            fill="#6b2f1a" stroke="#111" stroke-width="5"/>
      <path d="M30 147 C77 164 133 164 178 147 C174 176 39 176 30 147 Z"
            fill="url(#bun)" stroke="#111" stroke-width="6"/>
      <path d="M46 112 L71 100 L83 118 Z" fill="#ffdf00" stroke="#111" stroke-width="3"/>
      <path d="M128 115 L154 101 L166 119 Z" fill="#ffdf00" stroke="#111" stroke-width="3"/>
    </g>
  </g>

  <!-- Arm sleeve -->
  <path d="M612 533 C680 500 734 480 795 477
           C816 493 825 529 808 554
           C735 559 683 582 625 624 Z"
        fill="#111" stroke="#111" stroke-width="6"/>

  <!-- Graphic outlines / highlights -->
  <path d="M325 241 C315 302 335 359 383 389" fill="none" stroke="#ffea00" stroke-width="8" opacity="0.8"/>
  <path d="M575 241 C585 302 565 359 517 389" fill="none" stroke="#00ff7f" stroke-width="8" opacity="0.8"/>

  <!-- Caption -->
  <g filter="url(#shadow)">
    <rect x="92" y="78" width="224" height="72" fill="#fff" stroke="#111" stroke-width="6"/>
    <text x="112" y="127"
          font-family="Arial Black, Impact, sans-serif"
          font-size="38"
          fill="#111">ANDY</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="585" y="86" width="230" height="82" fill="#fff" stroke="#111" stroke-width="6"/>
    <text x="604" y="139"
          font-family="Arial Black, Impact, sans-serif"
          font-size="34"
          fill="#111">BURGER</text>
  </g>
</svg>