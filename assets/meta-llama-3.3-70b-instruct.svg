<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="400" fill="#F0F0F0" rx="10" />
  
  <!-- Andy Warhol (Simplified) -->
  <circle cx="100" cy="100" r="50" fill="#CCC" stroke="black" stroke-width="2" />
  <circle cx="100" cy="100" r="10" fill="#000" /> <!-- Eye -->
  <circle cx="120" cy="100" r="10" fill="#000" /> <!-- Eye -->
  <rect x="90" y="120" width="20" height="5" fill="#000" /> <!-- Mouth -->
  
  <!-- Hamburger -->
  <rect x="250" y="150" width="50" height="20" fill="#FFA07A" rx="5" /> <!-- Patty -->
  <rect x="240" y="130" width="60" height="10" fill="#F5DEB3" rx="5" /> <!-- Bun Bottom -->
  <rect x="240" y="170" width="60" height="10" fill="#F5DEB3" rx="5" /> <!-- Bun Top -->
  <rect x="245" y="160" width="10" height="5" fill="#008000" /> <!-- Lettuce -->
  <rect x="265" y="155" width="5" height="10" fill="#FF0000" /> <!-- Tomato -->
  
  <!-- Hand (Simplified) -->
  <path d="M 280,200 L 300,220 L 310,200 Z" fill="#CCC" stroke="black" stroke-width="2" />
  
  <!-- Arm (Simplified) -->
  <line x1="100" y1="150" x2="280" y2="180" stroke="#CCC" stroke-width="5" />
</svg>