<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Andy Warhol's head (simplified, stylized) -->
  <ellipse cx="250" cy="150" rx="80" ry="80" fill="#f0f0f0" stroke="#000" stroke-width="2" />
  
  <!-- Hair -->
  <path d="M170 150 C170 100, 330 100, 330 150 C330 200, 170 200, 170 150 Z" fill="#000" />
  
  <!-- Face features -->
  <!-- Eyes -->
  <circle cx="220" cy="140" r="10" fill="#000" />
  <circle cx="280" cy="140" r="10" fill="#000" />
  <!-- Mouth -->
  <path d="M220 180 Q250 200, 280 180" fill="none" stroke="#000" stroke-width="2" />
  <!-- Nose -->
  <ellipse cx="250" cy="160" rx="5" ry="8" fill="#ff0000" />

  <!-- Hamburger -->
  <rect x="200" y="300" width="100" height="10" fill="#d4af37" /> <!-- Top bun -->
  <rect x="200" y="310" width="100" height="20" fill="#ff0000" /> <!-- Patty -->
  <rect x="200" y="330" width="100" height="10" fill="#f0f0f0" /> <!-- Cheese -->
  <rect x="200" y="340" width="100" height="10" fill="#a0a0a0" /> <!-- Lettuce -->
  <rect x="200" y="350" width="100" height="10" fill="#f0f0f0" /> <!-- Tomato -->
  <rect x="200" y="360" width="100" height="10" fill="#d4af37" /> <!-- Bottom bun -->

  <!-- Andy's hands holding the burger -->
  <path d="M180 320 Q160 300, 160 280 Q160 260, 180 240" fill="none" stroke="#a0a0a0" stroke-width="10" stroke-linecap="round" />
  <path d="M320 320 Q340 300, 340 280 Q340 260, 320 240" fill="none" stroke="#a0a0a0" stroke-width="10" stroke-linecap="round" />

  <!-- Warhol's signature pop-art color blocks -->
  <rect x="30" y="400" width="100" height="100" fill="#ff0000" />
  <rect x="150" y="400" width="100" height="100" fill="#0000ff" />
  <rect x="270" y="400" width="100" height="100" fill="#00ff00" />
  <rect x="390" y="400" width="100" height="100" fill="#ffff00" />

  <!-- Text: Andy Warhol -->
  <text x="250" y="480" font-family="Arial" font-size="24" fill="#000" text-anchor="middle">Andy Warhol</text>
</svg>