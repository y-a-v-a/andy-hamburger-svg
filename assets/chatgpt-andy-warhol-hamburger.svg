<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pop-art inspired portrait of Andy Warhol eating a hamburger</title>
  <desc id="desc">An original vector illustration in a bold pop-art style, showing a pale-haired artist figure in black clothing holding and biting into a large hamburger, with bright background panels.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.18"/>
    </filter>
    <pattern id="dotsA" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="#111"/>
    </pattern>
    <pattern id="dotsB" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="#fff"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f7f0e8"/>
  <rect x="0" y="0" width="300" height="900" fill="#ff4f8b"/>
  <rect x="300" y="0" width="300" height="900" fill="#ffcf33"/>
  <rect x="600" y="0" width="300" height="900" fill="#47d7ac"/>
  <rect x="900" y="0" width="300" height="900" fill="#48a7ff"/>

  <rect x="22" y="22" width="255" height="856" fill="url(#dotsB)" opacity="0.22"/>
  <rect x="322" y="22" width="255" height="856" fill="url(#dotsA)" opacity="0.12"/>
  <rect x="622" y="22" width="255" height="856" fill="url(#dotsA)" opacity="0.10"/>
  <rect x="922" y="22" width="255" height="856" fill="url(#dotsB)" opacity="0.20"/>

  <!-- Framing circles -->
  <circle cx="600" cy="380" r="240" fill="#fff2" />
  <circle cx="600" cy="380" r="212" fill="#ffffff44" />
  <circle cx="600" cy="380" r="188" fill="#ffffff33" />

  <!-- Torso -->
  <g filter="url(#shadow)">
    <path d="M355 790
             C395 650, 465 585, 600 585
             C735 585, 805 650, 845 790
             L845 900 L355 900 Z"
          fill="#121212"/>
    <path d="M458 676
             C505 720, 555 742, 600 742
             C645 742, 695 720, 742 676
             C710 622, 658 590, 600 590
             C542 590, 490 622, 458 676 Z"
          fill="#0b0b0b"/>
  </g>

  <!-- Neck -->
  <rect x="550" y="500" width="100" height="90" rx="30" fill="#f4c8b7"/>

  <!-- Face -->
  <g filter="url(#shadow)">
    <ellipse cx="600" cy="395" rx="150" ry="180" fill="#f6d7c6"/>
    <path d="M516 442
             C530 474, 565 500, 600 500
             C635 500, 670 474, 684 442
             C675 462, 645 470, 600 470
             C555 470, 525 462, 516 442 Z"
          fill="#e9b4a0" opacity="0.7"/>
  </g>

  <!-- Hair -->
  <g filter="url(#shadow)">
    <path d="M446 344
             C455 230, 536 166, 612 172
             C704 178, 770 234, 766 343
             C743 317, 712 302, 684 286
             C653 267, 637 242, 621 210
             C612 248, 575 291, 530 312
             C501 326, 473 336, 446 344 Z"
          fill="#e9edf2"/>
    <path d="M494 214
             C533 160, 669 147, 736 249
             C689 218, 650 210, 614 206
             C571 201, 533 205, 494 214 Z"
          fill="#f8fbff"/>
    <path d="M458 333
             C505 302, 523 277, 534 239
             C564 284, 609 310, 674 332
             C627 307, 575 305, 528 322
             C498 333, 478 336, 458 333 Z"
          fill="#d5d9df"/>
  </g>

  <!-- Eyes -->
  <g>
    <ellipse cx="545" cy="390" rx="18" ry="11" fill="#fff"/>
    <ellipse cx="655" cy="390" rx="18" ry="11" fill="#fff"/>
    <circle cx="546" cy="392" r="6.5" fill="#111"/>
    <circle cx="654" cy="392" r="6.5" fill="#111"/>
    <path d="M520 372 C535 362, 556 362, 570 373" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round"/>
    <path d="M630 373 C644 362, 666 362, 680 372" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Nose and mouth -->
  <path d="M600 404 C591 430, 592 453, 606 466" fill="none" stroke="#9f7463" stroke-width="5" stroke-linecap="round"/>
  <path d="M555 513
           C577 532, 625 535, 645 513
           C631 514, 616 521, 600 521
           C584 521, 569 514, 555 513 Z"
        fill="#bf3d4c"/>
  <path d="M554 513 C576 500, 625 500, 646 513" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>

  <!-- Hamburger -->
  <g transform="translate(738 540) rotate(-8)" filter="url(#shadow)">
    <!-- lower hand -->
    <path d="M-78 66
             C-92 42, -95 19, -75 7
             C-55 -4, -40 8, -32 22
             C-23 10, -9 8, 4 17
             C16 7, 33 8, 43 20
             C58 14, 78 21, 80 44
             C82 62, 73 82, 54 91
             C20 107, -36 104, -78 66 Z"
          fill="#f4c8b7"/>
    <ellipse cx="20" cy="10" rx="104" ry="36" fill="#e1a443"/>
    <ellipse cx="20" cy="14" rx="102" ry="32" fill="#f0b857"/>
    <circle cx="-38" cy="-2" r="4" fill="#f7e6ab"/>
    <circle cx="-20" cy="-10" r="4" fill="#f7e6ab"/>
    <circle cx="-2" cy="-2" r="4" fill="#f7e6ab"/>
    <circle cx="18" cy="-12" r="4" fill="#f7e6ab"/>
    <circle cx="42" cy="-3" r="4" fill="#f7e6ab"/>
    <circle cx="62" cy="-8" r="4" fill="#f7e6ab"/>
    <path d="M-88 18 C-22 28, 45 28, 118 16" fill="none" stroke="#7dcf53" stroke-width="12" stroke-linecap="round"/>
    <path d="M-90 35 C-26 47, 41 46, 117 34" fill="none" stroke="#7b3b22" stroke-width="22" stroke-linecap="round"/>
    <path d="M-90 25 C-30 31, 40 32, 117 23" fill="none" stroke="#f2db56" stroke-width="7" stroke-linecap="round"/>
    <path d="M-88 49 C-24 58, 45 58, 118 47" fill="none" stroke="#c64f34" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="20" cy="70" rx="102" ry="25" fill="#d79338"/>

    <!-- bite mark -->
    <circle cx="-75" cy="14" r="15" fill="#f6d7c6"/>
    <circle cx="-59" cy="8" r="13" fill="#f6d7c6"/>
    <circle cx="-44" cy="17" r="11" fill="#f6d7c6"/>
  </g>

  <!-- Arm and hand to burger -->
  <path d="M715 690
           C760 650, 777 625, 783 602
           C790 578, 778 559, 756 548
           C719 529, 688 552, 680 587
           C672 622, 688 657, 715 690 Z"
        fill="#121212"/>
  <path d="M724 620
           C737 597, 752 580, 768 571
           C789 560, 817 568, 824 591
           C831 614, 817 638, 790 647
           C768 654, 745 647, 724 620 Z"
        fill="#f4c8b7"/>

  <!-- Mouth connection / bite -->
  <path d="M650 523
           C685 522, 712 525, 737 538"
        fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>

  <!-- Caption -->
  <rect x="72" y="736" width="320" height="92" rx="18" fill="#111" opacity="0.9"/>
  <text x="104" y="790" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#fff" letter-spacing="2">POP HAMBURGER</text>

  <!-- Decorative stars -->
  <g fill="#fff" opacity="0.9">
    <path d="M964 138 l14 34 36 3 -28 22 9 36 -31 -19 -31 19 9 -36 -28 -22 36 -3z"/>
    <path d="M190 155 l10 24 25 2 -19 15 6 25 -22 -13 -22 13 6 -25 -19 -15 25 -2z"/>
    <path d="M1018 710 l10 24 25 2 -19 15 6 25 -22 -13 -22 13 6 -25 -19 -15 25 -2z"/>
  </g>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="860" fill="none" stroke="#111" stroke-width="8"/>
</svg>
