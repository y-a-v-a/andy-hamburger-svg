<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Classic Pop Art Split -->
  <rect width="500" height="500" fill="#FFD700" />
  <rect x="250" width="250" height="500" fill="#FF4500" />

  <!-- Warhol's Head/Face -->
  <path d="M150,200 Q150,120 250,120 Q350,120 350,200 L340,320 Q250,360 160,320 Z" fill="#FFDBAC" stroke="black" stroke-width="4"/>
  
  <!-- The Iconic Silver-White Wig -->
  <path d="M140,210 Q130,100 250,80 Q370,100 360,210 Q360,150 330,140 Q300,130 250,140 Q200,130 170,140 Q140,150 140,210" fill="#E0E0E0" stroke="black" stroke-width="4"/>
  
  <!-- Glasses -->
  <rect x="180" y="210" width="60" height="35" rx="5" fill="black" />
  <rect x="260" y="210" width="60" height="35" rx="5" fill="black" />
  <line x1="240" y1="227" x2="260" y2="227" stroke="black" stroke-width="4" />

  <!-- Eyes (simplified white glints) -->
  <circle cx="210" cy="227" r="3" fill="white" />
  <circle cx="290" cy="227" r="3" fill="white" />

  <!-- The Hamburger (Positioned in front of the mouth) -->
  <g transform="translate(200, 270)">
    <!-- Bottom Bun -->
    <path d="M20,40 Q50,50 80,40 L80,30 Q50,40 20,30 Z" fill="#F4A460" stroke="black" stroke-width="3"/>
    <!-- Patty -->
    <rect x="15" y="20" width="70" height="15" rx="5" fill="#8B4513" stroke="black" stroke-width="3"/>
    <!-- Cheese -->
    <path d="M15,20 L85,20 L80,25 L20,25 Z" fill="#FFD700" stroke="black" stroke-width="2"/>
    <!-- Lettuce -->
    <path d="M15,15 Q25,10 35,15 Q45,10 55,15 Q65,10 75,15 Q85,10 85,15 L15,15" fill="#32CD32" stroke="black" stroke-width="2"/>
    <!-- Top Bun -->
    <path d="M15,15 Q50,0 85,15 Z" fill="#F4A460" stroke="black" stroke-width="3"/>
    <!-- Sesame Seeds -->
    <ellipse cx="30" cy="8" rx="2" ry="1" fill="white" />
    <ellipse cx="50" cy="5" rx="2" ry="1" fill="white" />
    <ellipse cx="70" cy="8" rx="2" ry="1" fill="white" />
  </g>

  <!-- Nose (minimalist line) -->
  <path d="M240,250 Q250,260 260,250" fill="none" stroke="black" stroke-width="3" />

  <!-- Simplified Mouth (under the burger) -->
  <path d="M220,310 Q250,330 280,310" fill="none" stroke="black" stroke-width="3" />
</svg>