<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Warhol-esque flat color with subtle halftone texture -->
  <defs>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="5" cy="5" r="1.5" fill="white" fill-opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="400" height="500" fill="#FFEB3B" url="#dots"/>
  
  <!-- Andy Warhol's Silhouette -->
  <g transform="translate(200, 250) scale(1.2)">
    <!-- Silver Wig -->
    <path d="M-80 -100 
             c-20,-30 0,-40 20,-30 
             l10 0 
             c20,-10 40,0 40,20 
             l0 30 
             c0,20 -20,30 -40,20 
             l-10 0 
             c-20,10 -40,0 -40,-20z"
          fill="#C0C0C0"/>
    
    <!-- Sunglasses (Iconic black frames) -->
    <rect x="-50" y="-30" width="40" height="20" fill="black" rx="4"/>
    <rect x="10" y="-30" width="40" height="20" fill="black" rx="4"/>
    <!-- White lens reflections -->
    <circle cx="-30" cy="-20" r="3" fill="white"/>
    <circle cx="30" cy="-20" r="3" fill="white"/>
    
    <!-- Simplified Face (minimalist pop-art style) -->
    <circle cx="-5" cy="10" r="15" fill="#F5DEB3" stroke="black" stroke-width="1"/>
    <!-- Nose shadow -->
    <path d="M-5 10 q5 -5 10 0" fill="none" stroke="black" stroke-width="1.5"/>
    <!-- Burger covering mouth (implies eating) -->
    <path d="M-25 20 
             q10 -5 20 0 
             l5 10 
             q-5 5 -10 5 
             l-20 0z"
          fill="#8B4513"/>
  </g>
  
  <!-- Hamburger Details (visible above hand) -->
  <g transform="translate(200, 280) scale(1.2)">
    <!-- Top Bun with Sesame Seeds -->
    <ellipse cx="0" cy="-25" rx="30" ry="15" fill="#DEB887"/>
    <circle cx="-15" cy="-30" r="1.5" fill="#333"/>
    <circle cx="-5" cy="-28" r="1.2" fill="#333"/>
    <circle cx="5" cy="-32" r="1.8" fill="#333"/>
    <circle cx="15" cy="-29" r="1.4" fill="#333"/>
    
    <!-- Burger Patty -->
    <ellipse cx="0" cy="-5" rx="28" ry="12" fill="#8B4513"/>
    
    <!-- Lettuce (wavy green) -->
    <path d="M-28 -5 
             q-5 10 0 15 
             q5 -5 10 0 
             q-5 10 0 15 
             q5 -5 10 0 
             q-5 10 0 15 
             q5 -5 10 0z"
          fill="#90EE90"/>
    
    <!-- Bottom Bun -->
    <ellipse cx="0" cy="25" rx="30" ry="15" fill="#DEB887"/>
  </g>
  
  <!-- Simple Hand holding burger (glove-like, Warhol often wore gloves) -->
  <path d="M180 340 
           c20 -10 30 -25 20 -40 
           l-10 -5 
           c-10 15 -20 25 -15 40z"
          fill="#F5DEB3" stroke="black" stroke-width="1"/>
</svg>