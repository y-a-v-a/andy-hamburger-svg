<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fff" />

  <!-- Andy Warhol's Face -->
  <circle cx="250" cy="150" r="60" fill="#fff" stroke="#000" stroke-width="2"/> <!-- Head -->
  <circle cx="230" cy="170" r="8" fill="#000"/> <!-- Left Eye -->
  <circle cx="270" cy="170" r="8" fill="#000"/> <!-- Right Eye -->
  <path d="M250,190 Q240,200 250,210" stroke="#000" stroke-width="2" fill="none"/> <!-- Nose -->
  <rect x="240" y="210" width="20" height="10" fill="#000" /> <!-- Mouth -->
  <rect x="220" y="140" width="40" height="20" fill="#fff" stroke="#000" stroke-width="2"/> <!-- Hair -->
  <line x1="250" y1="160" x2="255" y2="155" stroke="#000" stroke-width="2"/> <!-- Mustache -->

  <!-- Hamburger -->
  <rect x="350" y="200" width="80" height="50" fill="#ffcc00" stroke="#000" stroke-width="2"/> <!-- Bun -->
  <ellipse cx="390" cy="230" rx="30" ry="15" fill="#ff4444" stroke="#000" stroke-width="2"/> <!-- Patty -->
  <rect x="360" y="240" width="20" height="10" fill="#008000" stroke="#000" stroke-width="2"/> <!-- Lettuce -->
  <rect x="380" y="240" width="20" height="10" fill="#ff0000" stroke="#000" stroke-width="2"/> <!-- Tomato -->
  <rect x="370" y="250" width="10" height="5" fill="#fff" stroke="#000" stroke-width="1"/> <!-- Bite taken -->

  <!-- Warhol's Hand (Holding Hamburger) -->
  <path d="M400,280 Q410,290 400,300" stroke="#000" stroke-width="3" fill="none"/> <!-- Hand -->
  <circle cx="410" cy="290" r="10" fill="#fff" stroke="#000" stroke-width="2"/> <!-- Handball -->
</svg>
