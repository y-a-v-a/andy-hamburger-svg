<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Head -->
  <circle cx="100" cy="50" r="20" fill="#f1c27d" />
  <!-- Body -->
  <rect x="85" y="70" width="30" height="50" fill="#0000ff" />
  <!-- Arms -->
  <line x1="85" y1="80" x2="70" y2="100" stroke="#f1c27d" stroke-width="5" />
  <line x1="115" y1="80" x2="130" y2="100" stroke="#f1c27d" stroke-width="5" />
  <!-- Hands -->
  <circle cx="70" cy="100" r="5" fill="#f1c27d" />
  <circle cx="130" cy="100" r="5" fill="#f1c27d" />
  <!-- Hamburger -->
  <ellipse cx="130" cy="100" rx="10" ry="5" fill="#8b4513" />
  <ellipse cx="130" cy="100" rx="10" ry="3" fill="#fff" />
  <ellipse cx="130" cy="100" rx="10" ry="1" fill="#ff6347" />
  <!-- Legs -->
  <line x1="90" y1="120" x2="90" y2="150" stroke="#0000ff" stroke-width="5" />
  <line x1="110" y1="120" x2="110" y2="150" stroke="#0000ff" stroke-width="5" />
  <!-- Shoes -->
  <circle cx="90" cy="150" r="5" fill="#000000" />
  <circle cx="110" cy="150" r="5" fill="#000000" />
</svg>