<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" style="background: linear-gradient(to bottom, #e6f7ff, #ffffff);">
  <!-- Background -->
  <rect width="500" height="400" fill="#e6f7ff" />
  
  <!-- Andy Warhol (simplified) -->
  <g transform="translate(250, 200)">
    <!-- Head -->
    <ellipse cx="0" cy="-60" rx="45" ry="55" fill="#f0f0f0" stroke="#333" stroke-width="2" />
    
    <!-- Hair -->
    <path d="M-45,-65 L-35,-70 L-20,-60 L0,-65 L20,-70 L35,-65 L45,-65 L45,-55 L-45,-55 Z" 
          fill="#222" stroke="#333" stroke-width="1.5" />
    
    <!-- Torso -->
    <rect x="-30" y="0" width="60" height="70" fill="#4a4a4a" stroke="#333" stroke-width="1.5" />
    
    <!-- Arm holding burger -->
    <path d="M 50 20 Q 80 25 85 40 Q 90 55 75 65 L 65 60" 
          stroke="#e6e6e6" stroke-width="15" stroke-linecap="round" fill="none" />
    
    <!-- Burger -->
    <g transform="translate(75, 65)">
      <!-- Top bun -->
      <rect x="0" y="-25" width="40" height="10" rx="5" fill="#d2b48c" stroke="#333" stroke-width="1" />
      <rect x="0" y="-25" width="40" height="5" fill="#f5deb3" stroke="#333" stroke-width="1" />
      
      <!-- Patty -->
      <ellipse cx="20" cy="-10" rx="18" ry="12" fill="#8b4513" stroke="#333" stroke-width="1" />
      
      <!-- Lettuce -->
      <path d="M 0,-5 Q 5,-10 10,-5 Q 15,0 20,-5 Q 25,0 30,-5 Q 35,-10 40,-5" 
            fill="#4caf50" stroke="#2e7d32" stroke-width="0.5" />
      
      <!-- Tomato -->
      <ellipse cx="20" cy="0" rx="15" ry="10" fill="#e53935" stroke="#c6302d" stroke-width="1" />
      
      <!-- Bottom bun -->
      <rect x="0" y="8" width="40" height="10" rx="5" fill="#d2b48c" stroke="#333" stroke-width="1" />
      <rect x="0" y="13" width="40" height="5" fill="#f5deb3" stroke="#333" stroke-width="1" />
    </g>
    
    <!-- Details -->
    <circle cx="0" cy="-45" r="5" fill="#333" />
    <circle cx="0" cy="-45" r="3" fill="#fff" />
    <path d="M-15,-25 Q 0,-20 15,-25" stroke="#333" stroke-width="2" fill="none" />
    
    <!-- Warhol's signature (simplified) -->
    <text x="0" y="85" text-anchor="middle" fill="#333" font-family="Arial" font-size="12">AW</text>
  </g>
  
  <!-- Pop art style elements -->
  <g fill="none" stroke="#000" stroke-width="0.8" stroke-dasharray="5,2">
    <path d="M0 0 L499 0 M0 400 L499 400 M0 0 L0 399 M499 0 L499 399" />
  </g>
  
  <!-- Text overlay -->
  <text x="250" y="385" text-anchor="middle" fill="#333" font-family="Arial" font-size="14" font-weight="bold">
    Andy Warhol Eating a Hamburger (Pop Art Style)
  </text>
</svg>