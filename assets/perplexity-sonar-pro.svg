<svg
    xmlns="http://www.w3.org/2000/svg"
    width="800"
    height="600"
    viewBox="0 0 800 600">

  <!-- Background: flat pop-art colors -->
  <rect x="0" y="0" width="800" height="600" fill="#ffeb3b"/>
  <rect x="0" y="300" width="800" height="300" fill="#00bcd4"/>

  <!-- Table -->
  <rect x="0" y="340" width="800" height="260" fill="#f5f5f5"/>

  <!-- Simplified 'pop-artist' head (generic, not a portrait) -->
  <circle cx="400" cy="220" r="80" fill="#ffcc99" stroke="#000000" stroke-width="3"/>

  <!-- Stylized hair: messy, light color to hint at pop-artist vibe -->
  <path
    d="M320 195
       Q360 120 400 130
       Q440 120 480 195
       Q440 170 400 180
       Q360 170 320 195 Z"
    fill="#f0f0f0"
    stroke="#000000"
    stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="375" cy="215" r="6" fill="#000000"/>
  <circle cx="425" cy="215" r="6" fill="#000000"/>

  <!-- Nose -->
  <path
    d="M400 215
       Q395 230 400 235"
    fill="none"
    stroke="#000000"
    stroke-width="3"/>

  <!-- Mouth (hidden behind burger, only corners) -->
  <path
    d="M380 245
       Q400 255 420 245"
    fill="none"
    stroke="#000000"
    stroke-width="3"
    opacity="0.2"/>

  <!-- Torso / jacket -->
  <rect x="340" y="280" width="120" height="120" fill="#212121" stroke="#000000" stroke-width="3"/>
  <rect x="365" y="280" width="70" height="120" fill="#ff4081" opacity="0.9"/>

  <!-- Arms -->
  <!-- Left arm -->
  <path
    d="M340 300
       Q300 340 330 380"
    fill="none"
    stroke="#000000"
    stroke-width="12"
    stroke-linecap="round"/>

  <!-- Right arm -->
  <path
    d="M460 300
       Q500 340 470 380"
    fill="none"
    stroke="#000000"
    stroke-width="12"
    stroke-linecap="round"/>

  <!-- Hamburger near mouth -->
  <g transform="translate(400,255)">
    <!-- Bun top -->
    <ellipse cx="0" cy="-8" rx="40" ry="16" fill="#ffca28" stroke="#000000" stroke-width="3"/>
    <!-- Seeds -->
    <circle cx="-15" cy="-12" r="2" fill="#ffffff"/>
    <circle cx="-5" cy="-15" r="2" fill="#ffffff"/>
    <circle cx="8" cy="-14" r="2" fill="#ffffff"/>
    <circle cx="18" cy="-11" r="2" fill="#ffffff"/>

    <!-- Patty -->
    <rect x="-37" y="-8" width="74" height="12" fill="#5d4037" stroke="#000000" stroke-width="2"/>

    <!-- Lettuce -->
    <path
      d="M-37 2
         Q-25 10 -15 2
         Q-5 10 5 2
         Q15 10 25 2
         Q35 10 37 2"
      fill="#66bb6a" stroke="#000000" stroke-width="2"/>

    <!-- Cheese -->
    <path
      d="M-30 2
         L30 2
         L22 16
         L-22 16 Z"
      fill="#ffeb3b" stroke="#000000" stroke-width="2"/>

    <!-- Bun bottom -->
    <ellipse cx="0" cy="16" rx="40" ry="10" fill="#ffca28" stroke="#000000" stroke-width="3"/>
  </g>

  <!-- Hands holding burger -->
  <!-- Left hand -->
  <ellipse cx="360" cy="275" rx="18" ry="12" fill="#ffcc99" stroke="#000000" stroke-width="3"/>
  <!-- Right hand -->
  <ellipse cx="440" cy="275" rx="18" ry="12" fill="#ffcc99" stroke="#000000" stroke-width="3"/>

  <!-- Burger bag on table (reference to fast-food packaging) -->
  <g transform="translate(270,360)">
    <rect x="0" y="0" width="90" height="110" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <!-- Colored stripes to suggest branding without copying -->
    <rect x="5" y="15" width="80" height="12" fill="#ff5722"/>
    <rect x="5" y="35" width="80" height="12" fill="#4caf50"/>
    <rect x="5" y="55" width="80" height="12" fill="#ffc107"/>
    <text x="45" y="90"
          font-family="Arial, sans-serif"
          font-size="14"
          text-anchor="middle"
          fill="#000000">
      BURGER
    </text>
  </g>

  <!-- Ketchup bottle on table -->
  <g transform="translate(460,360)">
    <rect x="15" y="20" width="40" height="80" fill="#f44336" stroke="#000000" stroke-width="3" rx="4"/>
    <rect x="23" y="0" width="24" height="24" fill="#ffffff" stroke="#000000" stroke-width="3" rx="4"/>
    <circle cx="35" cy="45" r="12" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  </g>

  <!-- Pop-art caption at bottom -->
  <text
    x="400"
    y="560"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="32"
    font-weight="bold"
    fill="#000000">
    POP ARTIST EATS A HAMBURGER
  </text>

</svg>