<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0e6d2"/>

  <!-- Andy Warhol's head -->
  <circle cx="150" cy="100" r="50" fill="#8b4513"/>
  
  <!-- Andy Warhol's face -->
  <ellipse cx="150" cy="100" rx="45" ry="35" fill="#f5deb3"/>
  
  <!-- Andy Warhol's eyes -->
  <circle cx="135" cy="90" r="5" fill="#000000"/>
  <circle cx="165" cy="90" r="5" fill="#000000"/>
  
  <!-- Andy Warhol's mouth -->
  <path d="M130,110 C130,115 170,115 170,110" stroke="#000000" stroke-width="2" fill="none"/>
  
  <!-- Andy Warhol's body -->
  <rect x="120" y="150" width="60" height="100" fill="#8b4513"/>
  
  <!-- Andy Warhol's arms -->
  <line x1="120" y1="175" x2="100" y2="200" stroke="#000000" stroke-width="2"/>
  <line x1="180" y1="175" x2="200" y2="200" stroke="#000000" stroke-width="2"/>
  
  <!-- Andy Warhol's legs -->
  <line x1="130" y1="250" x2="130" y2="300" stroke="#000000" stroke-width="2"/>
  <line x1="150" y1="250" x2="150" y2="300" stroke="#000000" stroke-width="2"/>
  
  <!-- Hamburger -->
  <rect x="180" y="100" width="40" height="20" fill="#8b4513"/> <!-- Bun top -->
  <rect x="180" y="120" width="40" height="10" fill="#ff4500"/> <!-- Tomato -->
  <rect x="180" y="130" width="40" height="10" fill="#ffffff"/> <!-- Cheese -->
  <rect x="180" y="140" width="40" height="20" fill="#8b4513"/> <!-- Bun bottom -->
  
  <!-- Andy Warhol holding the hamburger -->
  <line x1="170" y1="175" x2="180" y2="120" stroke="#000000" stroke-width="2"/>
</svg>