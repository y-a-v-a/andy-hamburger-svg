<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#F0F0F0"/>
  
  <!-- Andy's head -->
  <g id="andy">
    <!-- Hair -->
    <path d="M120 80 Q200 60 280 80 L280 120 Q200 100 120 120 Z" 
          fill="#E8E8E8" stroke="#D0D0D0" stroke-width="2"/>
    
    <!-- Face -->
    <ellipse cx="200" cy="160" rx="80" ry="90" 
             fill="#FFE4CC" stroke="#D4B896" stroke-width="2"/>
    
    <!-- Glasses -->
    <g id="glasses">
      <!-- Left lens -->
      <rect x="130" y="140" width="50" height="40" rx="5" 
            fill="none" stroke="#333" stroke-width="3"/>
      <!-- Right lens -->
      <rect x="220" y="140" width="50" height="40" rx="5" 
            fill="none" stroke="#333" stroke-width="3"/>
      <!-- Bridge -->
      <line x1="180" y1="155" x2="220" y2="155" 
            stroke="#333" stroke-width="3"/>
      <!-- Left arm -->
      <line x1="130" y1="160" x2="110" y2="155" 
            stroke="#333" stroke-width="3"/>
      <!-- Right arm -->
      <line x1="270" y1="160" x2="290" y2="155" 
            stroke="#333" stroke-width="3"/>
    </g>
    
    <!-- Eyes behind glasses -->
    <circle cx="155" cy="160" r="5" fill="#333"/>
    <circle cx="245" cy="160" r="5" fill="#333"/>
    
    <!-- Nose -->
    <path d="M195 180 L200 190 L205 180" 
          fill="none" stroke="#D4B896" stroke-width="2"/>
    
    <!-- Mouth (biting the burger) -->
    <path d="M170 210 Q200 230 230 210" 
          fill="#FF6B6B" stroke="#333" stroke-width="2"/>
    
    <!-- Neck -->
    <rect x="180" y="230" width="40" height="50" 
          fill="#FFE4CC" stroke="#D4B896" stroke-width="2"/>
  </g>
  
  <!-- Hamburger -->
  <g id="hamburger" transform="translate(140, 200)">
    <!-- Top bun -->
    <ellipse cx="60" cy="20" rx="60" ry="25" 
             fill="#D4A574" stroke="#B8935F" stroke-width="2"/>
    <!-- Sesame seeds -->
    <circle cx="40" cy="10" r="3" fill="#FFF8DC"/>
    <circle cx="60" cy="8" r="3" fill="#FFF8DC"/>
    <circle cx="80" cy="12" r="3" fill="#FFF8DC"/>
    
    <!-- Lettuce -->
    <path d="M10 35 Q30 30 50 35 Q70 30 90 35 Q100 40 100 50 
             Q90 45 70 50 Q50 45 30 50 Q10 45 10 50 Z" 
          fill="#90EE90" stroke="#228B22" stroke-width="1"/>
    
    <!-- Cheese -->
    <path d="M20 50 Q60 45 100 50 L100 60 Q60 55 20 60 Z" 
          fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    
    <!-- Patty -->
    <ellipse cx="60" cy="70" rx="50" ry="15" 
             fill="#8B4513" stroke="#654321" stroke-width="2"/>
    
    <!-- Bottom bun -->
    <ellipse cx="60" cy="90" rx="60" ry="20" 
             fill="#D4A574" stroke="#B8935F" stroke-width="2"/>
  </g>
  
  <!-- Hand holding burger -->
  <g id="hand" transform="translate(250, 250)">
    <!-- Palm -->
    <ellipse cx="20" cy="20" rx="25" ry="30" 
             fill="#FFE4CC" stroke="#D4B896" stroke-width="2" 
             transform="rotate(-30 20 20)"/>
    <!-- Thumb -->
    <ellipse cx="5" cy="10" rx="10" ry="20" 
             fill="#FFE4CC" stroke="#D4B896" stroke-width="2" 
             transform="rotate(-45 5 10)"/>
  </g>
  
  <!-- Pop art style elements -->
  <g id="pop-art-elements">
    <!-- Speech bubble -->
    <path d="M300 100 L340 100 L350 110 L350 130 L320 130 L315 135 L315 130 L300 130 Z" 
          fill="#FFD700" stroke="#333" stroke-width="2"/>
    <text x="310" y="120" font-family="Arial, sans-serif" font-size="14" fill="#333">YUM!</text>
  </g>
  
  <!-- Signature style border -->
  <rect x="10" y="10" width="380" height="380" 
        fill="none" stroke="#333" stroke-width="4" stroke-dasharray="10,5"/>
</svg>