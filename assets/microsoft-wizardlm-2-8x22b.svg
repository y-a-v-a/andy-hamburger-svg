<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <title>Andy Warhol Eating a Hamburger</title>
  <rect width="400" height="500" fill="#f0f0f0"/>
  
  <!-- Background Warhol-style colored boxes -->
  <rect x="20" y="30" width="80" height="80" fill="#ff6b6b"/>
  <rect x="120" y="30" width="80" height="80" fill="#4ecdc4"/>
  <rect x="220" y="30" width="80" height="80" fill="#ffe66d"/>
  <rect x="320" y="30" width="80" height="80" fill="#95e1d3"/>
  
  <!-- Andy Warhol's face -->
  <circle cx="200" cy="280" r="80" fill="#f5d0a9"/>
  
  <!-- Hair -->
  <path d="M120,200 Q140,150 160,180 Q180,140 200,190 Q220,140 240,180 Q260,150 280,200" fill="#a0522d"/>
  
  <!-- Sunglasses -->
  <rect x="140" y="250" width="50" height="25" rx="5" fill="#1a1a1a"/>
  <rect x="210" y="250" width="50" height="25" rx="5" fill="#1a1a1a"/>
  <line x1="190" y1="262" x2="210" y2="262" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Nose -->
  <path d="M195,280 Q200,290 205,280" fill="none" stroke="#d9a673" stroke-width="2"/>
  
  <!-- Mouth with hamburger -->
  <g transform="translate(180, 320)">
    <!-- Hamburger -->
    <rect x="-40" y="-10" width="80" height="25" rx="5" fill="#a0522d"/> <!-- Bottom bun -->
    <rect x="-35" y="-15" width="70" height="5" fill="#8b0000"/> <!-- Patty -->
    <rect x="-30" y="-20" width="60" height="5" fill="#ffd700"/> <!-- Cheese -->
    <rect x="-25" y="-25" width="50" height="5" fill="#228b22"/> <!-- Lettuce -->
    <rect x="-40" y="-30" width="80" height="5" rx="3" fill="#f4a460"/> <!-- Top bun -->
    
    <!-- Andy's hand holding hamburger -->
    <path d="M-50,0 Q-60,-10 -50,-20 Q-40,-30 -30,-20 Q-20,-10 -30,0" fill="#f5d0a9"/>
  </g>
  
  <!-- Shirt collar -->
  <path d="M160,360 Q180,340 200,350 Q220,340 240,360" fill="white" stroke="#333" stroke-width="1"/>
  
  <!-- Text label -->
  <text x="200" y="450" text-anchor="middle" font-family="Arial" font-size="24" fill="#333">Andy Warhol</text>
  <text x="200" y="480" text-anchor="middle" font-family="Arial" font-size="18" fill="#666">Eating a Hamburger</text>
</svg>