<svg width="480" height="480" viewBox="0 0 480 480"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <!-- Bright Pop-Art background grid -->
  <rect width="240" height="240" x="0"   y="0"   fill="#ff007f"/>
  <rect width="240" height="240" x="240" y="0"   fill="#00ffff"/>
  <rect width="240" height="240" x="0"   y="240" fill="#ffff00"/>
  <rect width="240" height="240" x="240" y="240" fill="#00ff00"/>

  <!-- Thick black container frame -->
  <rect x="2" y="2" width="476" height="476"
        fill="none" stroke="#000" stroke-width="10"/>

  <!-- Warhol’s head silhouette-->
  <circle cx="240" cy="200" r="120" fill="#fde1b9"/>

  <!-- Sunglasses -->
  <g stroke="#000" stroke-width="5">
    <ellipse cx="200" cy="160" rx="35" ry="25" fill="#000"/>
    <ellipse cx="280" cy="160" rx="35" ry="25" fill="#000"/>
    <line x1="235" y1="160" x2="245" y2="160"/>
  </g>

  <!-- Nose and mouth lines -->
  <path d="M240 185 v20" stroke="#000" stroke-width="4"/>
  <path d="M220 240 q20 20 40 0" stroke="#000" stroke-width="4"/>

  <!-- Hair -->
  <path d="M150 150
           q-20 -90 90 -90
           q110 0 90 90
           q-5 -50 -90 -40
           q-85 -10 -90 40"
        fill="#f7f7f7"/>

  <!-- Hamburger held in front of shrinking mouth -->
  <g transform="rotate(30 320 260)">
    <!-- Top bun -->
    <ellipse cx="320" cy="260" rx="60" ry="25" fill="#f5bb60"/>
    <!-- Patty -->
    <ellipse cx="320" cy="285" rx="58" ry="20" fill="#6d4534"/>
    <!-- Lettuce -->
    <path d="M262 283 q4 -10 6 -12
             q26 10 54 2
             q26 8 50 -2
             q2 2 4 8
             q-26 14 -54 8
             q-26 6 -52 -6z"
          fill="#2c9e5a"/>
    <!-- Bottom bun -->
    <ellipse cx="320" cy="310" rx="60" ry="25" fill="#f5bb60"/>
  </g>

  <!-- Sunglasses reflection lines (pop-art flair) -->
  <g stroke="#fff" stroke-width="3">
    <line x1="175" y1="155" x2="185" y2="160"/>
    <line x1="255" y1="155" x2="265" y2="160"/>
    <line x1="180" y1="170" x2="190" y2="175"/>
    <line x1="260" y1="170" x2="270" y2="175"/>
  </g>

  <!-- Screen-print dots overlay -->
  <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
    <circle cx="5" cy="5" r="2" fill="#000" opacity=".05"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#dots)"/>
</svg>