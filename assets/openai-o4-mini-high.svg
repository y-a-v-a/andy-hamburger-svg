<svg xmlns="http://www.w3.org/2000/svg"
     width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Hair (behind face) -->
  <ellipse cx="200" cy="170" rx="120" ry="100" fill="#dddddd"/>

  <!-- Face -->
  <circle cx="200" cy="200" r="100" fill="#f1c27d" stroke="#000000" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="170" cy="180" r="12" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <circle cx="170" cy="180" r="5" fill="#000000"/>
  <circle cx="230" cy="180" r="12" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <circle cx="230" cy="180" r="5" fill="#000000"/>

  <!-- Nose -->
  <path d="M200,190 Q200,210 205,215" stroke="#000000" stroke-width="2" fill="none"/>

  <!-- Mouth (behind burger) -->
  <ellipse cx="220" cy="250" rx="20" ry="10" fill="#e69f8c"/>

  <!-- Hamburger -->
  <!-- Top bun -->
  <ellipse cx="240" cy="222" rx="40" ry="20" fill="#f4a460" stroke="#c68642" stroke-width="2"/>
  <!-- Sesame seeds -->
  <circle cx="225" cy="215" r="3" fill="#fff8dc"/>
  <circle cx="245" cy="210" r="3" fill="#fff8dc"/>
  <circle cx="260" cy="220" r="3" fill="#fff8dc"/>
  <circle cx="235" cy="230" r="3" fill="#fff8dc"/>
  <circle cx="255" cy="225" r="3" fill="#fff8dc"/>
  <!-- Lettuce -->
  <ellipse cx="240" cy="242" rx="45" ry="10" fill="#8fbc8f"/>
  <!-- Patty -->
  <ellipse cx="240" cy="260" rx="45" ry="12" fill="#8b4513"/>
  <!-- Bottom bun -->
  <ellipse cx="240" cy="275" rx="45" ry="12" fill="#f4a460" stroke="#c68642" stroke-width="2"/>
</svg>