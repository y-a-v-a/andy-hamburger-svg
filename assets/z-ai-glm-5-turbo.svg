      <!-- Signature-style text at bottom -->
      <text x="500" y="790" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#888" letter-spacing="3" font-weight="300">SCREEN PRINT — FOUR VARIATIONS — AFTER WARHOL</text>
