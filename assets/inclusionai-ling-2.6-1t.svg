<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="100%" height="100%">
  <defs>
    <!-- Background Pattern: Halftone Dots -->
    <pattern id="halftone" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="6" fill="#ff00ff" />
    </pattern>

    <!-- Clothing Pattern: Camouflage/Simple Stripes for Pop Art texture -->
    <pattern id="tiePattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#00ffff" />
      <path d="M 0,0 L 8,8 M 8,0 L 0,8" stroke="#000080" stroke-width="1.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="500" height="600" fill="#ffff00" />
  <rect width="500" height="600" fill="url(#halftone)" opacity="0.3" />

  <!-- Neck & Shirt Collar -->
  <path d="M 220,280 L 280,280 L 270,320 L 230,320 Z" fill="#ffffff" stroke="#000000" stroke-width="4" />
  <path d="M 210,310 L 290,310" stroke="#000000" stroke-width="4" />

  <!-- Shirt -->
  <rect x="180" y="310" width="140" height="180" fill="#ffffff" stroke="#000000" stroke-width="4" />
  
  <!-- Tie -->
  <path d="M 235,310 L 235,500 L 265,500 L 265,310 Z" fill="url(#tiePattern)" stroke="#000000" stroke-width="4" />
  <ellipse cx="250" cy="340" rx="12" ry="20" fill="#000080" stroke="#000000" stroke-width="4" />

  <!-- Hair (Famous Silver Wig) -->
  <path d="M 150,220 
           C 130,180 140,120 200,100 
           C 220,70 280,70 300,100 
           C 360,120 370,180 350,220 
           C 360,260 350,300 300,300 
           C 250,300 240,260 250,220 Z" 
        fill="#f0f0f0" stroke="#000000" stroke-width="4" />

  <!-- Face Outline -->
  <path d="M 200,220 
           C 200,170 250,140 280,160 
           C 310,140 360,170 360,220 
           C 360,280 320,320 280,320 
           C 250,320 200,280 200,220 Z" 
        fill="#ffcc99" stroke="#000000" stroke-width="4" />

  <!-- Eyebrows (Abstract/Block style) -->
  <rect x="220" y="180" width="60" height="20" rx="5" fill="#000000" />
  <rect x="290" y="175" width="60" height="20" rx="5" fill="#000000" />

  <!-- Glasses (Thick Black Frames) -->
  <circle cx="250" cy="220" r="35" fill="none" stroke="#000000" stroke-width="6" />
  <circle cx="310" cy="215" r="35" fill="none" stroke="#000000" stroke-width="6" />
  
  <!-- Glasses Bridge -->
  <rect x="280" y="205" width="30" height="15" fill="#ffcc99" />
  <line x1="280" y1="212" x2="310" y2="212" stroke="#000000" stroke-width="3" />
  
  <!-- Eyes (Just black dots, no pupils for classic pop art look) -->
  <circle cx="250" cy="220" r="8" fill="#000000" />
  <circle cx="310" cy="215" r="8" fill="#000000" />

  <!-- The Hamburger (Large and holding with straight arm) -->
  <g transform="translate(-40, 40)">
    <!-- Hand (simplified mitten) -->
    <path d="M 180,400 L 110,360 L 120,420 L 190,460 Z" fill="#ffcc99" stroke="#000000" stroke-width="4" />
    
    <!-- Top Bun -->
    <ellipse cx="200" cy="350" rx="70" ry="25" fill="#deb887" stroke="#000000" stroke-width="4" />
    <path d="M 130,350 Q 200,320 270,350" fill="none" stroke="#8b4513" stroke-width="4" /> <!-- Sesame Seeds -->
    <circle cx="155" cy="345" r="5" fill="#ffffe0" /><circle cx="180" cy="340" r="5" fill="#ffffe0" /><circle cx="220" cy="340" r="5" fill="#ffffe0" /><circle cx="245" cy= "345" r="5" fill="#ffffe0" />

    <!-- Lettuce -->
    <path d="M 130,365 Q 200,420 270,365 Z" fill="#32cd32" stroke="#006400" stroke-width="4" />

    <!-- Tomato -->
    <ellipse cx="200" cy="400" rx="65" ry="20" fill="#ff4500" stroke="#8b0000" stroke-width="4" />
    <line x1="135" y1="400" x2="265" y2="400" stroke="#8b0000" stroke-width="3" />
    <line x1="150" y1="385" x2="250" y2="385" stroke="#8b0000" stroke-width="3" />

    <!-- Patty -->
    <ellipse cx="200" cy="450" rx="70" ry="25" fill="#3b2b21" stroke="#000000" stroke-width="4" />
    <!-- Grill Marks -->
    <path d="M 140,440 Q 200,460 260,440" fill="none" stroke="#1a0f0a" stroke-width="3" />
    <path d="M 140,455 Q 200,435 260,455" fill="none" stroke="#1a0f0a" stroke-width="3" />
    <path d="M 140,465 Q 200,485 260,465" fill="none" stroke="#1a0f0a" stroke-width="3" />

    <!-- Bottom Bun -->
    <ellipse cx="200" cy="500" rx="70" ry="20" fill="#deb887" stroke="#000000" stroke-width="4" />
    <path d="M 135,490 Q 200,510 265,490 Q 200,525 135,490 Z" fill="#a0522d" /> <!-- Texture -->
  </g>

  <!-- Strokes on Shirt (Classic Warhol ink bleed look) -->
  <path d="M 180,350 L 180,490" stroke="#000000" stroke-width="2" opacity="0.5" />
  <path d="M 320,350 L 320,490" stroke="#000000" stroke-width="2" opacity="0.5" />
</svg>