<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="400" fill="#F7F7F7" rx="20" />

  <!-- Andy Warhol -->
  <g transform="translate(120, 100)">
    <circle cx="0" cy="0" r="40" fill="#CCCCCC" />
    <rect x="-20" y="-50" width="40" height="60" fill="#CCCCCC" rx="5" />
    <path d="M 0, -30 L -20, -10 L 20, -10 Z" fill="#CCCCCC" />
    <circle cx="0" cy="-40" r="10" fill="#CCCCCC" />
    <path d="M -15, -55 L 15, -55" stroke="#CCCCCC" stroke-width="2" />
  </g>

  <!-- Hamburger -->
  <g transform="translate(200, 150)">
    <rect x="-40" y="-20" width="80" height="40" fill="#F2C464" rx="5" />
    <circle cx="0" cy="10" r="20" fill="#F2C464" />
    <rect x="-25" y="20" width="50" height="10" fill="#8B9467" />
    <rect x="-20" y="30" width="40" height="10" fill="#FFC080" />
    <circle cx="0" cy="40" r="10" fill="#FF69B4" />
  </g>

  <!-- Hand -->
  <path d="M 220, 140 L 240, 160 L 260, 140 Z" fill="#CCCCCC" />
  <path d="M 230, 150 L 250, 170 L 270, 150 Z" fill="#CCCCCC" />

  <!-- Bite taken out of hamburger -->
  <rect x="170" y="160" width="20" height="10" fill="#F7F7F7" rx="2" />

  <!-- Mouth -->
  <path d="M 130, 90 L 150, 110 L 170, 90 Z" fill="#CCCCCC" />
</svg>