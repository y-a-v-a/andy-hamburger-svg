<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- General Background (Optional, but makes it look nicer sometimes) -->
  <rect width="100%" height="100%" fill="#f0f0f0"/>

  <!-- Warhol-esque Style.  Use bold outlines & blocks of color. -->

  <!-- Foreground - Andy Warhol -->
  <g>
    <!-- Face -->
    <ellipse cx="300" cy="250" rx="80" ry="90" fill="#99bfff" stroke="black" stroke-width="3"/>
    <!-- Hair (Simplified) -->
    <rect x="220" y="160" width="160" height="90" fill="#f0e68c" stroke="black" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="260" cy="220" r="12" fill="white" stroke="black" stroke-width="1"/>
    <circle cx="340" cy="220" r="12" fill="white" stroke="black" stroke-width="1"/>
    <circle cx="260" cy="220" r="5" fill="black"/>  <!-- Pupils -->
    <circle cx="340" cy="220" r="5" fill="black"/>
    <!-- Nose (Simple) -->
    <rect x="295" y="240" width="10" height="10" fill="orange" stroke="black" stroke-width="1"/>
    <!-- Mouth -->
    <path d="M270 260 C 280 270, 320 270, 330 260" fill="none" stroke="black" stroke-width="2"/>

    <!-- Collar -->
    <rect x="280" y="280" width="40" height="70" fill="#ffcc99" stroke="black" stroke-width="2"/>
  </g>

  <!-- Hamburger Details -->
  <g>
    <!-- Bun (Top) -->
    <ellipse cx="450" cy="350" rx="40" ry="30" fill="#e6b800" stroke="black" stroke-width="2"/>
    <!-- Lettuce -->
    <ellipse cx="450" cy="330" rx="30" ry="20" fill="lightgreen"/>
    <!-- Tomato -->
    <circle cx="450" cy="330" r="15" fill="red"/>
    <!-- Patty -->
    <circle cx="450" cy="350" r="30" fill="#a0522d"/>
    <!-- Cheese -->
    <ellipse cx="450" cy="350" rx="25" ry="15" fill="#ffff00"/>
    <!-- Bun (Bottom) -->
    <ellipse cx="450" cy="380" rx="40" ry="30" fill="#e6b800" stroke="black" stroke-width="2"/>
  </g>

  <!-- Overall Impression - joyful engagement -->
  <path d="M300 400 L 450 350" stroke="black" stroke-width="4" stroke-linecap="round"/> <!--  A simple line showing a reaching motion -->

  <!-- Comment out the following to disable the color version -->


