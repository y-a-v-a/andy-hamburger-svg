<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFE0F5"/>
  
  <!-- Warhol's face (in pop-art style) -->
  <circle cx="250" cy="200" r="120" fill="#FC6E51"/>
  
  <!-- Darker face shadow -->
  <circle cx="260" cy="190" r="100" fill="#F9C80E"/>
  
  <!-- White highlight on face -->
  <ellipse cx="300" cy="170" rx="40" ry="30" fill="#FFF" opacity="0.6"/>
  
  <!-- Hair -->
  <path d="M130,150 Q150,80 250,60 Q350,80 370,150 Q350,180 250,170 Q150,180 130,150" 
        fill="#F38D68" opacity="0.9"/>
  
  <!-- Sunglasses -->
  <rect x="170" y="180" width="50" height="30" rx="5" fill="#2C2C2C"/>
  <rect x="280" y="180" width="50" height="30" rx="5" fill="#2C2C2C"/>
  <rect x="220" y="190" width="60" height="10" rx="5" fill="#555"/>
  
  <!-- Nose -->
  <ellipse cx="260" cy="230" rx="8" ry="10" fill="#F38D68"/>
  
  <!-- Closed eyes (as he's enjoying the burger) -->
  <line x1="170" y1="195" x2="220" y2="195" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="195" x2="330" y2="195" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Smile -->
  <path d="M200,250 Q250,290 300,250" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Hand with burger -->
  <circle cx="150" cy="320" r="40" fill="#FFD7A7"/>
  
  <!-- Burger (in hand) -->
  <rect x="130" y="280" width="120" height="30" rx="10" fill="#8B4513"/> <!-- bottom bun -->
  <rect x="130" y="250" width="120" height="30" rx="10" fill="#A52A2A"/> <!-- patty -->
  <rect x="130" y="220" width="120" height="30" rx="10" fill="#FFFACD"/> <!-- cheese -->
  <rect x="130" y="190" width="120" height="30" rx="10" fill="#8B4513"/> <!-- top bun -->
  
  <!-- Lettuce sticking out -->
  <path d="M130,240 Q145,235 160,240 Q175,245 190,240 Q205,235 215,245" fill="none" stroke="#90EE90" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Pop-art style dots in background -->
  <circle cx="80" cy="80" r="30" fill="#E74C3C" opacity="0.8"/>
  <circle cx="420" cy="100" r="20" fill="#3498DB" opacity="0.8"/>
  <circle cx="400" cy="350" r="25" fill="#9B59B6" opacity="0.8"/>
  <circle cx="60" cy="350" r="15" fill="#2ECC71" opacity="0.8"/>
  <circle cx="250" cy="400" r="18" fill="#F1C40F" opacity="0.8"/>
</svg>