<svg
    width="200"
    height="200"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 200 200"
>
    <!-- Background -->
    <rect width="100%" height="100%" fill="#f0f0f0" />
    
    <!-- Andy Warhol's Hair -->
    <path
        d="M50 40 Q45 20 70 40 Q95 20 90 40 Q85 30 50 40"
        fill="yellow"
    />

    <!-- Face -->
    <circle cx="70" cy="80" r="20" fill="#ffcc99" />

    <!-- Eyes -->
    <circle cx="65" cy="75" r="3" fill="black" />
    <circle cx="75" cy="75" r="3" fill="black" />

    <!-- Mouth -->
    <path d="M65 85 Q70 90 75 85" stroke="black" fill="none" />

    <!-- Hamburger -->
    <rect x="50" y="100" width="40" height="20" fill="#c67c51" />
    <circle cx="70" cy="90" r="5" fill="#f39c12" />
    <circle cx="70" cy="110" r="5" fill="green" />
    <circle cx="70" cy="120" r="4" fill="red" />
    
    <!-- Plate -->
    <ellipse cx="70" cy="120" rx="30" ry="5" fill="#ffffff" stroke="black" />
</svg>