<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f0f0" />
  
  <!-- Andy Warhol's face - multiple colored versions -->
  <g transform="translate(150, 100)">
    <!-- Face -->
    <circle cx="0" cy="0" r="60" fill="#ffcc00" />
    
    <!-- Eyes -->
    <circle cx="-20" cy="-10" r="12" fill="black" />
    <circle cx="20" cy="-10" r="12" fill="black" />
    
    <!-- Smile -->
    <path d="M -20 20 Q 0 40 20 20" stroke="black" stroke-width="3" fill="none" />
    
    <!-- Hair -->
    <path d="M -30 -40 Q 0 -60 30 -40" stroke="#ff3366" stroke-width="20" fill="none" />
  </g>
  
  <!-- Hamburger -->
  <g transform="translate(180, 250)">
    <!-- Bottom bun -->
    <rect x="-30" y="0" width="60" height="10" rx="5" fill="#cc6600" />
    
    <!-- Meat patty -->
    <rect x="-25" y="10" width="50" height="15" rx="3" fill="#993300" />
    
    <!-- Cheese -->
    <rect x="-22" y="25" width="44" height="8" rx="2" fill="#ffcc00" />
    
    <!-- Lettuce -->
    <rect x="-20" y="33" width="40" height="8" rx="2" fill="green" />
    
    <!-- Top bun -->
    <rect x="-30" y="41" width="60" height="10" rx="5" fill="#cc6600" />
  </g>
  
  <!-- Pop Art style grid -->
  <g stroke="#000" stroke-width="1" fill="none">
    <rect x="10" y="10" width="380" height="380" />
    <line x1="100" y1="10" x2="100" y2="390" />
    <line x1="200" y1="10" x2="200" y2="390" />
    <line x1="300" y1="10" x2="300" y2="390" />
    <line x1="10" y1="100" x2="390" y2="100" />
    <line x1="10" y1="200" x2="390" y2="200" />
    <line x1="10" y1="300" x2="390" y2="300" />
  </g>
</svg>