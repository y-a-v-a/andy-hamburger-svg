<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (Warhol-style gradient) -->
  <defs>
    <linearGradient id="warholGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF00FF" />
      <stop offset="50%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#FFFF00" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#warholGradient)" />

  <!-- Andy Warhol's Face (simplified) -->
  <circle cx="200" cy="150" r="80" fill="#FFD700" stroke="#000" stroke-width="3" />
  <!-- Hair (Warhol's wig) -->
  <path d="M120 100 Q200 50 280 100 L280 180 Q200 200 120 180 Z" fill="#FFF" stroke="#000" stroke-width="2" />
  <!-- Eyes -->
  <circle cx="170" cy="140" r="8" fill="#000" />
  <circle cx="230" cy="140" r="8" fill="#000" />
  <!-- Glasses -->
  <rect x="150" y="130" width="40" height="20" rx="5" fill="none" stroke="#000" stroke-width="3" />
  <rect x="210" y="130" width="40" height="20" rx="5" fill="none" stroke="#000" stroke-width="3" />
  <line x1="190" y1="140" x2="210" y2="140" stroke="#000" stroke-width="3" />
  <!-- Mouth (eating hamburger) -->
  <path d="M180 170 Q200 180 220 170" fill="none" stroke="#000" stroke-width="3" />

  <!-- Hamburger -->
  <circle cx="250" cy="250" r="50" fill="#FF6B6B" stroke="#000" stroke-width="2" />
  <!-- Burger top bun -->
  <circle cx="250" cy="220" r="45" fill="#F4A460" stroke="#000" stroke-width="2" />
  <!-- Lettuce -->
  <path d="M205 220 Q250 200 295 220 L295 240 Q250 220 205 240 Z" fill="#90EE90" stroke="#000" stroke-width="1" />
  <!-- Cheese -->
  <rect x="210" y="240" width="80" height="10" fill="#FFD700" stroke="#000" stroke-width="1" />
  <!-- Patty -->
  <circle cx="250" cy="255" r="35" fill="#8B4513" stroke="#000" stroke-width="1" />
  <!-- Bottom bun -->
  <circle cx="250" cy="280" r="40" fill="#F4A460" stroke="#000" stroke-width="2" />

  <!-- Warhol-style text (optional) -->
  <text x="200" y="380" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">
    "A Hamburger a Day"
  </text>
</svg>