<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#EBEBEB" />

  <!-- Andy Warhol -->
  <g id="warhol">
    <path d="M120,180 c0,0 100,-100 120,20 c0,0 20,75 20,100 c0,25 -60,65 -65,80 c-5,15 -25,10 -35,-10 c-10,-20 -90,-95 -90,-95" fill="#333333" />
    <circle cx="150" cy="270" r="30" fill="#FF5722" />
    <circle cx="125" cy="270" r="5" fill="#FFFFFF" />
    <circle cx="175" cy="270" r="5" fill="#FFFFFF" />
  </g>

  <!-- Hamburger -->
  <g id="hamburger">
    <circle cx="300" cy="200" r="60" fill="#F2F2F2" />
    <rect x="240" y="190" width="120" height="40" rx="20" ry="20" fill="#E67300" />
    <rect x="250" y="190" width="80" height="30" rx="10" ry="10" fill="#666666" />
  </g>

  <!-- Plate -->
  <circle cx="300" cy="200" r="100" fill="#DDDDDD" stroke="#B2B2B2" stroke-width="5" />

</svg>