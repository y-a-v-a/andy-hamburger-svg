        <linearGradient id="gradientWarhol">
            <stop offset="0%"   stop-color="#666" />
            <stop offset="100%" stop-color="#fff" />
        </linearGradient>
        <linearGradient id="gradientBurger">
            <!-- Define your own gradients for the hamburger -->
