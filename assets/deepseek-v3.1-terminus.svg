<svg width="400" height="600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Background with Pop Art Colors -->
  <rect width="400" height="600" fill="#FFEB3B"/> <!-- Bright Yellow -->

  <!-- Andy's Head -->
  <circle cx="200" cy="200" r="120" fill="#FFCCBC"/> <!-- Light Skin Tone -->

  <!-- Iconic White Hair/Silhouette -->
  <ellipse cx="200" cy="80" rx="140" ry="70" fill="white"/>
  <ellipse cx="200" cy="70" rx="130" ry="60" fill="#FFCCBC"/>

  <!-- Sunglasses -->
  <rect x="120" y="180" width="160" height="60" rx="5" fill="black"/>
  <rect x="130" y="190" width="60" height="40" rx="2" fill="#4FC3F7"/> <!-- Blue Lens -->
  <rect x="210" y="190" width="60" height="40" rx="2" fill="#4FC3F7"/> <!-- Blue Lens -->
  <line x1="200" y1="190" x2="200" y2="230" stroke="black" stroke-width="3"/>

  <!-- Nose (Simple Line) -->
  <line x1="200" y1="240" x2="200" y2="260" stroke="black" stroke-width="3"/>

  <!-- Mouth - Open for the burger -->
  <ellipse cx="200" cy="290" rx="40" ry="20" fill="black"/>

  <!-- The Hamburger -->
  <!-- Top Bun -->
  <ellipse cx="200" cy="270" rx="35" ry="15" fill="#FFD54F" stroke="#E65100" stroke-width="2"/>
  <!-- Lettuce -->
  <path d="M 165 275 Q 200 290, 235 275" stroke="#7CB342" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Patty -->
  <ellipse cx="200" cy="285" rx="33" ry="12" fill="#5D4037"/>
  <!-- Cheese -->
  <path d="M 170 280 L 190 278 L 210 280 L 230 278" stroke="#FFB300" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Bottom Bun -->
  <ellipse cx="200" cy="295" rx="35" ry="10" fill="#FFD54F" stroke="#E65100" stroke-width="2"/>

  <!-- Hand Bringing Burger to Mouth -->
  <!-- Arm -->
  <rect x="150" y="320" width="100" height="20" rx="10" fill="#FFCCBC"/>
  <!-- Hand -->
  <ellipse cx="250" cy="330" rx="20" ry="15" fill="#FFCCBC"/>

  <!-- Signature Turtle Neck -->
  <rect x="140" y="320" width="120" height="40" fill="black"/>
  <rect x="140" y="320" width="120" height="10" fill="#E53935"/> <!-- Stripe -->

  <!-- Andy Warhol Text -->
  <text x="200" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#E53935">ANDY WARHOL</text>

</svg>