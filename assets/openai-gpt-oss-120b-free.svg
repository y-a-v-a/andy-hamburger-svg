<svg xmlns="http://www.w3.org/2000/svg"
     width="800" height="600"
     viewBox="0 0 800 600"
     style="background:#fdfdfd">

  <!-- ==== Background ==== -->
  <rect width="100%" height="100%" fill="#fff"/>
  <!-- Light pastel background square for pop‑art feel -->
  <rect x="50" y="50" width="700" height="500"
        fill="#f0f8ff" stroke="#c0d8ff" stroke-width="2"/>

  <!-- ==== Andy Warhol (cartoon) ==== -->
  <g id="warhol" transform="translate(200,150) scale(1.2)">
    <!-- Head -->
    <circle cx="0" cy="0" r="80" fill="#ffebcd"/>
    <!-- Hair (slicked back) -->
    <path d="M-70,-10 C-80,-70 -30,-110 0,-120 C30,-110 80,-70 70,-10 Z"
          fill="#222"/>
    <!-- Beret -->
    <ellipse cx="0" cy="-90" rx="60" ry="25" fill="#ff4444"/>
    <ellipse cx="0" cy="-100" rx="45" ry="12" fill="#aa0000"/>
    <!-- Glasses -->
    <circle cx="-30" cy="-10" r="22" fill="none" stroke="#000"
            stroke-width="4"/>
    <circle cx="30" cy="-10" r="22" fill="none" stroke="#000"
            stroke-width="4"/>
    <line x1="-8" y1="-10" x2="8" y2="-10" stroke="#000" stroke-width="4"/>
    <line x1="-30" y1="-32" x2="-30" y2="-2" stroke="#000" stroke-width="2"/>
    <line x1="30" y1="-32" x2="30" y2="-2" stroke="#000" stroke-width="2"/>

    <!-- Neck -->
    <rect x="-25" y="80" width="50" height="20" fill="#ffebcd"/>

    <!-- Body (simple T‑shirt) -->
    <rect x="-70" y="100" width="140" height="150"
          fill="#ff69b4" stroke="#e055a0" stroke-width="2"/>

    <!-- Arm holding burger -->
    <g id="arm" transform="translate(70,130) rotate(20)">
      <rect x="-15" y="-10" width="30" height="100" fill="#ffebcd"/>
      <!-- Hand -->
      <path d="M-15,90 Q0,110 15,90 L15,80 Q0,100 -15,80 Z"
            fill="#ffebcd"/>
    </g>
  </g>

  <!-- ==== Hamburger ==== -->
  <g id="burger" transform="translate(480,250) scale(1.4)">
    <!-- Bottom bun -->
    <ellipse cx="0" cy="70" rx="80" ry="30" fill="#d2a679" stroke="#a66d3e" stroke-width="2"/>
    <!-- Lettuce -->
    <path d="M-80,60 Q-40,40 0,60 Q40,80 80,60 L80,50 Q40,30 0,50 Q-40,70 -80,50 Z"
          fill="#7ec850" stroke="#5a9c35" stroke-width="1"/>
    <!-- Tomato -->
    <ellipse cx="0" cy="45" rx="70" ry="12" fill="#e13636"/>
    <!-- Cheese -->
    <polygon points="-75,38 -65,30 -45,38 -35,30 -15,38 -5,30 15,38 25,30 45,38 55,30 75,38 75,45 -75,45"
             fill="#ffdb58" stroke="#caa33e" stroke-width="1"/>
    <!-- Patty -->
    <ellipse cx="0" cy="20" rx="80" ry="25" fill="#8b4513" stroke="#5a2c0c"/>
    <!-- Top bun -->
    <ellipse cx="0" cy="-10" rx="85" ry="35" fill="#d2a679" stroke="#a66d3e" stroke-width="2"/>
    <!-- Sesame seeds -->
    <g fill="#fff" transform="scale(0.9)">
      <ellipse cx="-40" cy="-15" rx="6" ry="3"/>
      <ellipse cx="-20" cy="-20" rx="6" ry="3"/>
      <ellipse cx="0"   cy="-12" rx="6" ry="3"/>
      <ellipse cx="20"  cy="-18" rx="6" ry="3"/>
      <ellipse cx="40"  cy="-14" rx="6" ry="3"/>
    </g>
  </g>

  <!-- ==== Speech / Pop‑art caption ==== -->
  <text x="400" y="80"
        font-family="Impact,Arial,Helvetica"
        font-size="48"
        text-anchor="middle"
        fill="#ff0066"
        stroke="#000"
        stroke-width="1.5"
        paint-order="stroke">
    POP ART BITE!
  </text>

  <!-- ==== Optional decorative dots (Matisse‑style) ==== -->
  <g fill="#ff99cc" opacity="0.6">
    <circle cx="120" cy="500" r="12"/>
    <circle cx="680" cy="470" r="9"/>
    <circle cx="300" cy="540" r="7"/>
    <circle cx="560" cy="520" r="11"/>
  </g>
</svg>