<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFD700"/>
  
  <!-- Halftone pattern background (Warhol's signature style) -->
  <defs>
    <pattern id="halftone" patternUnits="userSpaceOnUse" width="8" height="8">
      <circle cx="4" cy="4" r="1.5" fill="#000" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#halftone)" opacity="0.3"/>
  
  <!-- Andy Warhol silhouette/simple figure -->
  <g transform="translate(300, 100)">
    <!-- Silver hair (distinctive style) -->
    <path d="M50,30 C30,30 10,50 10,80 C10,110 30,130 50,130 C70,130 90,110 90,80 C90,50 70,30 50,30 Z" 
          fill="#C0C0C0" stroke="#000" stroke-width="2"/>
    
    <!-- Face -->
    <circle cx="50" cy="80" r="25" fill="#FFD5B5" stroke="#000" stroke-width="2"/>
    
    <!-- Dark sunglasses -->
    <rect x="35" y="70" width="30" height="15" fill="#000" rx="3"/>
    <line x1="50" y1="77.5" x2="50" y2="77.5" stroke="#C0C0C0" stroke-width="2"/>
    
    <!-- Simple mouth (open as if eating) -->
    <ellipse cx="50" cy="92" rx="8" ry="5" fill="#000"/>
    
    <!-- Black turtleneck -->
    <path d="M30,105 L70,105 L70,150 L30,150 Z" fill="#000"/>
    
    <!-- Hand holding burger -->
    <circle cx="75" cy="110" r="10" fill="#FFD5B5" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Hamburger (Warhol pop art style - bold colors) -->
  <g transform="translate(350, 180)">
    <!-- Top bun -->
    <path d="M20,0 C10,0 0,10 0,25 C0,40 10,50 20,50 C30,50 40,40 40,25 C40,10 30,0 20,0 Z" 
          fill="#D2691E" stroke="#000" stroke-width="3"/>
    <path d="M25,5 C15,5 8,12 8,22 C8,32 15,38 25,38 C35,38 42,32 42,22 C42,12 35,5 25,5 Z" 
          fill="#F4A460" opacity="0.7"/>
    
    <!-- Lettuce -->
    <path d="M5,30 Q20,25 35,30 Q40,35 35,40 Q20,45 5,40 Q0,35 5,30 Z" 
          fill="#228B22" stroke="#000" stroke-width="2"/>
    
    <!-- Cheese -->
    <path d="M0,45 L50,45 L45,55 L5,55 Z" fill="#FFD700" stroke="#000" stroke-width="2"/>
    
    <!-- Patty -->
    <path d="M5,60 L45,60 L45,70 L5,70 Z" fill="#8B4513" stroke="#000" stroke-width="2"/>
    
    <!-- Bottom bun -->
    <path d="M10,75 C0,75 0,90 10,90 C20,90 30,80 30,70 C30,60 20,50 10,50 C0,50 0,75 10,75 Z" 
          fill="#D2691E" stroke="#000" stroke-width="3"/>
  </g>
  
  <!-- Text in Warhol style -->
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        text-anchor="middle" fill="#000" stroke="#FFD700" stroke-width="1">
    WARHOL EATS
  </text>
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="36" 
        text-anchor="middle" fill="#FF4500">
    Hamburger Art
  </text>
  
  <!-- Campbell's Soup can reference (subtle Warhol nod) -->
  <g transform="translate(50, 450)">
    <rect x="0" y="0" width="60" height="80" fill="#FF0000" stroke="#000" stroke-width="2" rx="5"/>
    <rect x="10" y="20" width="40" height="40" fill="#FFF"/>
    <text x="30" y="45" font-family="Arial" font-size="10" font-weight="bold" 
          text-anchor="middle" fill="#000">CAMPBELL'S</text>
    <text x="30" y="57" font-family="Arial" font-size="10" font-weight="bold" 
          text-anchor="middle" fill="#000">TOMATO</text>
  </g>
</svg>