<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- Head -->
  <circle cx="150" cy="80" r="30" fill="#ffe0bd"/>

  <!-- Eyes -->
  <circle cx="140" cy="75" r="4" fill="black"/>
  <circle cx="160" cy="75" r="4" fill="black"/>

  <!-- Mouth (smile) -->
  <path d="M 135 90 q 15 15 30 0" stroke="black" stroke-width="3" fill="none"/>

  <!-- Body -->
  <rect x="120" y="110" width="60" height="80" rx="10" fill="#c7d0ff"/>

  <!-- Arms and hand holding burger -->
  <path d="M 120 130 L 90 170" stroke="#ffe0bd" stroke-width="15" stroke-linecap="round"/>
  <path d="M 180 130 L 210 170" stroke="#ffe0bd" stroke-width="15" stroke-linecap="round"/>

  <!-- Hamburger -->
  <g id="burger" >
    <!-- Bottom bun -->
    <ellipse cx="150" cy="190" rx="35" ry="10" fill="#d4a373"/>
    <!-- Cheese -->
    <rect x="115" y="180" width="70" height="8" fill="#ffd700"/>
    <!-- Patty -->
    <rect x="115" y="188" width="70" height="4" fill="#5e3a20"/>
    <!-- Top bun -->
    <ellipse cx="150" cy="180" rx="35" ry="10" fill="#d4a373"/>
  </g>

  <!-- Neck -->
  <rect x="140" y="110" width="20" height="20" fill="#ffe0bd"/>

  <!-- Legs -->
  <rect x="130" y="190" width="15" height="50" fill="#c7d0ff"/>
  <rect x="155" y="190" width="15" height="50" fill="#c7d0ff"/>

  <!-- Text label (optional) -->
  <text x="150" y="350" font-family="Arial" font-size="18" text-anchor="middle" fill="#333">
    Andy Warhol
  </text>
</svg>