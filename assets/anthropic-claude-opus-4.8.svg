<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background - Pop Art style -->
  <rect width="400" height="400" fill="#ffcb05"/>
  <circle cx="200" cy="180" r="160" fill="#ff6ec7" opacity="0.3"/>
  
  <!-- Neck -->
  <rect x="175" y="270" width="50" height="60" fill="#f5d5b8"/>
  
  <!-- Shirt/Collar -->
  <path d="M 130 320 L 175 290 L 200 320 L 225 290 L 270 320 L 270 400 L 130 400 Z" fill="#1a1a1a"/>
  <path d="M 175 290 L 200 330 L 225 290 L 200 305 Z" fill="#ffffff"/>
  
  <!-- Face -->
  <ellipse cx="200" cy="190" rx="75" ry="90" fill="#f5d5b8"/>
  
  <!-- Iconic Warhol silver/white hair -->
  <path d="M 125 165 
           Q 120 90 200 80 
           Q 280 90 275 165
           Q 280 130 260 110
           Q 270 95 250 95
           Q 255 80 235 88
           Q 240 75 215 82
           Q 200 70 185 82
           Q 165 75 168 88
           Q 148 82 152 95
           Q 132 92 142 110
           Q 122 128 125 165 Z" 
        fill="#e8e8e8" stroke="#cccccc" stroke-width="1"/>
  <path d="M 130 160 Q 135 100 200 92 Q 265 100 270 160" 
        fill="none" stroke="#d0d0d0" stroke-width="2"/>
  
  <!-- Eyebrows -->
  <path d="M 150 165 Q 165 160 180 165" fill="none" stroke="#999" stroke-width="2"/>
  <path d="M 220 165 Q 235 160 250 165" fill="none" stroke="#999" stroke-width="2"/>
  
  <!-- Glasses (iconic Warhol frames) -->
  <rect x="143" y="168" width="48" height="32" rx="6" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="209" y="168" width="48" height="32" rx="6" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="191" y1="180" x2="209" y2="180" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Eyes -->
  <circle cx="167" cy="184" r="5" fill="#333"/>
  <circle cx="233" cy="184" r="5" fill="#333"/>
  
  <!-- Nose -->
  <path d="M 200 195 L 195 225 Q 200 230 205 225 Z" fill="#e8c4a0"/>
  
  <!-- Mouth (open, eating) -->
  <ellipse cx="200" cy="248" rx="22" ry="14" fill="#a0392f"/>
  <ellipse cx="200" cy="245" rx="18" ry="6" fill="#ffffff"/>
  
  <!-- Hamburger -->
  <g transform="translate(200, 255)">
    <!-- Top bun -->
    <path d="M -55 0 Q -55 -30 0 -30 Q 55 -30 55 0 Z" fill="#e8a85c"/>
    <!-- Sesame seeds -->
    <ellipse cx="-25" cy="-18" rx="3" ry="2" fill="#fff5e0"/>
    <ellipse cx="0" cy="-23" rx="3" ry="2" fill="#fff5e0"/>
    <ellipse cx="25" cy="-18" rx="3" ry="2" fill="#fff5e0"/>
    <ellipse cx="-12" cy="-10" rx="3" ry="2" fill="#fff5e0"/>
    <ellipse cx="15" cy="-10" rx="3" ry="2" fill="#fff5e0"/>
    <!-- Lettuce -->
    <path d="M -58 2 Q -50 10 -42 2 Q -34 10 -26 2 Q -18 10 -10 2 Q -2 10 6 2 Q 14 10 22 2 Q 30 10 38 2 Q 46 10 54 2 Q 58 8 58 8 L 58 14 L -58 14 Z" fill="#6ab04c"/>
    <!-- Cheese -->
    <path d="M -55 12 L 55 12 L 48 26 L -48 26 Z" fill="#f9ca24"/>
    <!-- Patty -->
    <rect x="-55" y="20" width="110" height="16" rx="6" fill="#6e3b1e"/>
    <!-- Bottom bun -->
    <path d="M -55 34 Q -55 48 0 48 Q 55 48 55 34 Z" fill="#e8a85c"/>
  </g>
  
  <!-- Hand holding burger -->
  <g fill="#f5d5b8" stroke="#d4b896" stroke-width="1">
    <ellipse cx="155" cy="295" rx="22" ry="15"/>
    <rect x="138" y="285" width="35" height="12" rx="6"/>
  </g>
  
  <!-- Pop art dots accent -->
  <circle cx="60" cy="60" r="8" fill="#ff1493"/>
  <circle cx="340" cy="80" r="8" fill="#00bcd4"/>
  <circle cx="50" cy="340" r="8" fill="#ff1493"/>
  <circle cx="350" cy="350" r="8" fill="#00bcd4"/>
  
  <!-- Signature text -->
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#1a1a1a" text-anchor="middle">Andy &amp; Burger</text>
</svg>