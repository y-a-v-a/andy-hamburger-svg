<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <title>Andy Warhol Eating a Hamburger</title>
  
  <!-- Andy Warhol's head -->
  <ellipse cx="100" cy="70" rx="40" ry="50" fill="none" stroke="black" stroke-width="2" />
  
  <!-- Andy Warhol's glasses -->
  <circle cx="80" cy="60" r="5" fill="none" stroke="black" stroke-width="2" />
  <circle cx="120" cy="60" r="5" fill="none" stroke="black" stroke-width="2" />
  <line x1="85" y1="60" x2="115" y2="60" stroke="black" stroke-width="2" />
  
  <!-- Andy Warhol's mouth -->
  <path d="M 80 90 Q 100 110, 120 90" fill="none" stroke="black" stroke-width="2" />
  
  <!-- Hamburger bun -->
  <ellipse cx="100" cy="120" rx="30" ry="10" fill="burlywood" stroke="black" stroke-width="2" />
  
  <!-- Hamburger patty -->
  <rect x="75" y="120" width="50" height="10" fill="saddlebrown" stroke="black" stroke-width="2" />
  
  <!-- Bottom bun -->
  <ellipse cx="100" cy="140" rx="30" ry="10" fill="burlywood" stroke="black" stroke-width="2" />
  
</svg>