<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" style="background-color:#F5D0A9;">

  <!--
    SVG depiction of Andy Warhol eating a hamburger.
    Inspired by Jørgen Leth's film "66 Scenes from America".
    Style: Graphic, Pop Art with bold outlines and flat colors.
  -->

  <defs>
    <style>
      .outline { stroke: #2c2c2c; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
      .no-outline { stroke: none; }
    </style>
  </defs>

  <!-- Group for the entire scene -->
  <g id="scene">

    <!-- Table -->
    <rect id="table" x="0" y="450" width="600" height="150" fill="#a9a9a9" class="outline" />

    <!-- Ketchup Bottle (nod to the Heinz in the film) -->
    <g id="ketchup-bottle" transform="translate(450, 340)">
      <path d="M 0,110 L 0,30 C 0,10 10,0 25,0 C 40,0 50,10 50,30 L 50,110 Z" fill="#c0392b" class="outline"/>
      <rect x="5" y="40" width="40" height="40" fill="#fefefe" stroke="#2c2c2c" stroke-width="2"/>
      <text x="25" y="65" font-family="Arial, sans-serif" font-weight="bold" font-size="14" text-anchor="middle" fill="#2c2c2c">57</text>
      <path d="M 15,0 L 35,0 L 30, -15 L 20, -15 Z" fill="#fefefe" class="outline" />
    </g>

    <!-- Andy Warhol Figure -->
    <g id="warhol" transform="translate(0, 50)">

      <!-- Torso and Shirt -->
      <g id="torso">
        <path d="M 150,450 L 150,220 Q 200,180 300,180 Q 400,180 450,220 L 450,450 Z" fill="#34495e" class="outline" />
        <path d="M 270,190 L 300,240 L 330,190 Z" fill="#f1f1f1" class="outline" /> <!-- Shirt Collar -->
        <path d="M 300,240 L 290, 350 L 310, 350 L 300, 240 Z" fill="#2c2c2c" class="outline" /> <!-- Tie -->
      </g>
      
      <!-- Head -->
      <g id="head" transform="translate(300, 150)">
        <!-- Iconic Hair/Wig -->
        <path id="hair" d="M -110,-50 Q -120,-110 0,-120 Q 120,-110 110,-50 Q 130,20 100,50 L -100,50 Q -130,20 -110,-50 Z" fill="#e0e0e0" class="outline" />
        
        <!-- Face -->
        <path id="face" d="M -80,0 C -90,80 0,120 80,80 C 90,0 50,-60 0,-70 C -50,-60 -70,-50 -80,0 Z" fill="#f5cba7" class="outline" />
        
        <!-- Glasses -->
        <g id="glasses" fill="#2c2c2c" class="no-outline">
          <circle cx="-50" cy="15" r="30" />
          <circle cx="50" cy="15" r="30" />
          <rect x="-20" y="10" width="40" height="5"/>
        </g>

        <!-- Ear -->
        <path d="M -90,20 C -110,20 -110,60 -90,60" fill="none" class="outline" />
      </g>

      <!-- Hands and Hamburger -->
      <g id="hands-and-burger">
        <!-- Hamburger -->
        <g id="hamburger" transform="translate(300, 270)" class="outline">
          <path id="top-bun" d="M -60,0 A 60 40 0 0 1 60,0 Z" fill="#d2b48c" />
          <rect id="contents" y="0" x="-65" width="130" height="30" fill="#8b4513" />
          <path id="lettuce" d="M -65,25 l 10,-5 l 10,5 l 10,-5 l 10,5 l 10,-5 l 15,5 l 10,-5 l 15,5 l 10,-5 l 15,5 l 10,-5 l 10,5" fill="#2e8b57" stroke="#2c2c2c" stroke-width="4"/>
          <path id="bottom-bun" d="M -60,30 A 60 30 0 0 0 60,30 Z" fill="#d2b48c" />
        </g>
        
        <!-- Hands holding the burger -->
        <g id="hands" fill="#f5cba7" class="outline">
          <path id="left-hand" d="M 180,280 C 160,280 150,300 160,320 L 220,330 L 220,290 C 210,280 190,280 180,280 Z" />
          <path id="right-hand" d="M 420,280 C 440,280 450,300 440,320 L 380,330 L 380,290 C 390,280 410,280 420,280 Z" />
        </g>
      </g>
      
    </g>

  </g>
</svg>