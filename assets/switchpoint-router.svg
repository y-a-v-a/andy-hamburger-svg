<svg
  xmlns="http://www.w3.org/2000/svg"
  width="200"
  height="200"
  viewBox="0 0 200 200"
>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F0F0F0"/>

  <!-- Head -->
  <circle cx="100" cy="80" r="30" fill="#FFD700"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="75" r="5" fill="black"/>
  <circle cx="115" cy="75" r="5" fill="black"/>

  <!-- Mouth -->
  <path d="M85 90 Q100 110 115 90" stroke="black" stroke-width="2" fill="transparent"/>

  <!-- Hamburger -->
  <rect x="75" y="100" width="50" height="20" rx="10" fill="#8B4513"/>
  <circle cx="100" cy="100" r="12" fill="#FFD700"/>
  <circle cx="100" cy="115" r="8" fill="#228B22"/>

  <!-- Hair -->
  <path d="M70 60 Q100 30 130 60" fill="#C0C0C0"/>
  
  <!-- Text -->
  <text x="50" y="190" font-family="Arial" font-size="15" fill="black">Andy Warhol Eating a Hamburger</text>
</svg>