<svg
    xmlns="http://www.w3.org/2000/svg"
    width="800"
    height="1000"
    viewBox="0 0 800 1000"
    style="background:#f5f0f5;"
>
  <!-- ------------------- Title ------------------- -->
  <text
    x="50%"
    y="20"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="24"
    fill="#111"
  >Andy Warhol eating a hamburger</text>

  <!-- ------------------- Andy Warhol ------------------- -->
  <!-- Head -->
  <ellipse
    cx="400"
    cy="200"
    rx="100"
    ry="120"
    fill="#C2C8FF"
    stroke="#000"
    stroke-width="2"
  />
  <!-- Hair (short, upturned style reminiscent of Warhol) -->
  <path
    d="M250 210 Q300 160 400 200 Q450 240 500 200"
    fill="#4F2683"
    stroke="#000"
    stroke-width="2"
    style="opacity:0.9;"
  />
  <!-- Hair highlights (tiny triangles) -->
  <polygon
    points="180,150 250,155 210,130"
    fill="#D6C2FF"
    opacity="0.6"
  />
  <polygon
    points="320,190 400,200 340,180"
    fill="#D6C2FF"
    opacity="0.6"
  />

  <!-- Facial features (simplified) -->
  <!-- Eyes -->
  <circle
    cx="330"
    cy="250"
    r="25"
    fill="#fff"
  />
  <!-- Pupils -->
  <circle
    cx="330"
    cy="250"
    r="8"
    fill="#000"
  />
  <circle
    cx="390"
    cy="250"
    r="25"
    fill="#fff"
  />
  <circle
    cx="390"
    cy="250"
    r="8"
    fill="#000"
  />
  <!-- Nose (flat, stylized) -->
  <path
    d="M350,285 Q360,280 370,285 Q380,290 370,295 Q360,290 350,285"
    fill="#8B4E8B"
    stroke="#000"
    stroke-width="2"
  />
  <!-- Mouth (smiling) -->
  <path
    d="M340,310 Q360,320 370,310 Q340,300 340,300"
    fill="#B65C3A"
    stroke="#000"
    stroke-width="1.5"
  />

  <!-- Andy’s iconic sunglasses (optional) -->
  <g id="sunglasses">
    <rect
      x="255"
      y="260"
      width="190"
      height="30"
      rx="6"
      fill="#000"
    />
    <rect
      x="270"
      y="260"
      width="160"
      height="2"
      rx="1"
      fill="#FFF"
    />
    <rect
      x="280"
      y="255"
      width="30"
      height="5"
      rx="2.5"
      fill="#FFF"
    />
    <rect
      x="285"
      y="255"
      width="3"
      height="5"
      rx="1.5"
      fill="#000"
    />
  </g>

  <!-- ------------------- Hamburger ------------------- -->
  <!-- Whole hamburger shape -->
  <rect
    x="150"
    y="500"
    width="500"
    height="300"
    rx="10"
    fill="#FAEBC7"
    stroke="#000"
    stroke-width="2"
  />

  <!-- Burger bun top – light yellow background -->
  <rect
    x="170"
    y="520"
    width="460"
    height="80"
    rx="5"
    fill="#FFE4B5"
    stroke="#000"
    stroke-width="1"
  />
  <!-- Burger bun bottom – slightly darker yellow -->
  <rect
    x="170"
    y="580"
    width="460"
    height="80"
    rx="5"
    fill="#FFEBCD"
    stroke="#000"
    stroke-width="1"
  />

  <!-- Lettuce (green) -->
  <ellipse
    cx="340"
    cy="600"
    rx="150"
    ry="80"
    fill="#7CFC00"
    opacity="0.4"
  />

  <!-- Tomato slice (red) -->
  <ellipse
    cx="430"
    cy="615"
    rx="60"
    ry="35"
    fill="#FF6347"
    opacity="0.6"
  />
  <ellipse
    cx="370"
    cy="615"
    rx="60"
    ry="35"
    fill="#FF6347"
    opacity="0.6"
  />

  <!-- Pickle slices (green) – rounded rectangles -->
  <rect
    x="300"
    y="655"
    width="60"
    height="20"
    rx="10"
    fill="#00A968"
  />
  <rect
    x="400"
    y="655"
    width="60"
    height="20"
    rx="10"
    fill="#00A968"
  />

  <!-- Patty (light brown) -->
  <rect
    x="200"
    y="690"
    width="200"
    height="60"
    rx="3"
    fill="#C97456"
  />

  <!-- Cheese slice (yellow) – overlay on patty -->
  <rect
    x="215"
    y="705"
    width="170"
    height="45"
    rx="3"
    fill="#FFD700"
  />

  <!-- Friendly smile – a small burger‑shaped mouth -->
  <path
    d="M200,755 Q300,755 400,755 Q500,755 400,820 Q300,820 200,820"
    fill="#FAEBD7"
    stroke="#000"
    stroke-width="2"
  />

  <!-- Andy’s hand holding the burger (stylized) -->
  <g id="hand">
    <!-- Palm – semi‑transparent skin tone -->
    <ellipse
      cx="340"
      cy="520"
      rx="80"
      ry="55"
      fill="rgba(255,204,204,0.7)"   <!-- pinkish skin -->
      opacity="0.8"
    />
    <!-- Finger outline -->
    <path
      d="M260,500 L340,500 L280,660"
      stroke="#cc0000"
      stroke-width="4"
      fill="none"
    />
    <path
      d="M420,500 L340,500 L400,660"
      stroke="#cc0000"
      stroke-width="4"
      fill="none"
    />
    <path
      d="M340,500 Q340,540 300,560 Q340,600"
      stroke="#cc0000"
      stroke-width="3"
      fill="none"
    />
  </g>

  <!-- ------------------- Andy’s name (art credit) ------------------- -->
  <text
    x="50%"
    y="940"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="30"
    fill="#222"
  >Andy Warhol style © 2026</text>
</svg>