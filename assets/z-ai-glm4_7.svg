<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Halftone Pattern for Screen Print Effect -->
    <pattern id="halftone" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2" fill="#000" opacity="0.1"/>
    </pattern>
    
    <!-- Gradient for the Wig -->
    <linearGradient id="silverWig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A9A9A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D3D3D3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background: Vibrant Warhol Pink -->
  <rect width="100%" height="100%" fill="#FF1493" />
  <rect width="100%" height="100%" fill="url(#halftone)" />

  <!-- Main Group Centered -->
  <g transform="translate(100, 50)">
    
    <!-- Neck and Turtleneck -->
    <path d="M 120,350 L 120,450 L 280,450 L 280,350 Q 200,380 120,350" fill="#000" />
    
    <!-- Face Shape (Pale Green/Blue Tint) -->
    <ellipse cx="200" cy="250" rx="110" ry="140" fill="#E0FFFF" stroke="#000" stroke-width="2"/>

    <!-- The Iconic Wig -->
    <path d="M 90,200 
             Q 80,100 150,80 
             Q 200,60 250,80 
             Q 320,100 310,200 
             Q 300,150 250,140 
             Q 200,130 150,140 
             Q 100,150 90,200 Z" 
          fill="url(#silverWig)" stroke="#000" stroke-width="2"/>
    
    <!-- Messy hair strands on top -->
    <path d="M 120,120 Q 150,90 180,120 T 240,120 T 280,140" fill="none" stroke="#808080" stroke-width="3"/>

    <!-- Sunglasses -->
    <g transform="translate(0, 10)">
      <!-- Left Lens -->
      <ellipse cx="160" cy="240" rx="35" ry="25" fill="#000" stroke="#000" stroke-width="3"/>
      <!-- Right Lens -->
      <ellipse cx="240" cy="240" rx="35" ry="25" fill="#000" stroke="#000" stroke-width="3"/>
      <!-- Bridge -->
      <path d="M 195,240 L 205,240" stroke="#000" stroke-width="3"/>
      <!-- Temple -->
      <path d="M 125,235 L 90,220" stroke="#000" stroke-width="3"/>
      <path d="M 275,235 L 310,220" stroke="#000" stroke-width="3"/>
    </g>

    <!-- Nose -->
    <path d="M 200,240 L 195,280 L 205,280" fill="none" stroke="#000" stroke-width="2"/>

    <!-- Mouth (Open, taking a bite) -->
    <path d="M 170,310 Q 200,330 230,310" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M 180,310 Q 200,320 220,310" fill="#800000" />

    <!-- THE HAMBURGER -->
    <g transform="translate(140, 290) rotate(-10)">
      <!-- Hands holding burger -->
      <ellipse cx="10" cy="20" rx="15" ry="25" fill="#E0FFFF" stroke="#000" stroke-width="1"/> <!-- Left Hand -->
      <ellipse cx="110" cy="20" rx="15" ry="25" fill="#E0FFFF" stroke="#000" stroke-width="1"/> <!-- Right Hand -->

      <!-- Bottom Bun -->
      <path d="M 10,40 Q 60,50 110,40 L 110,50 Q 60,60 10,50 Z" fill="#DAA520" stroke="#000" stroke-width="1"/>
      
      <!-- Meat Patty -->
      <ellipse cx="60" cy="35" rx="50" ry="10" fill="#8B4513" stroke="#000" stroke-width="1"/>
      
      <!-- Cheese -->
      <path d="M 15,35 L 25,25 L 95,25 L 105,35 Z" fill="#FFD700" stroke="#000" stroke-width="1"/>
      
      <!-- Lettuce -->
      <path d="M 10,30 Q 20,20 30,30 T 50,30 T 70,30 T 90,30 T 110,30" fill="none" stroke="#32CD32" stroke-width="4"/>

      <!-- Top Bun -->
      <path d="M 10,30 Q 60,-10 110,30 Z" fill="#DAA520" stroke="#000" stroke-width="1"/>
      <!-- Sesame Seeds -->
      <circle cx="40" cy="15" r="2" fill="#FFF"/>
      <circle cx="60" cy="10" r="2" fill="#FFF"/>
      <circle cx="80" cy="15" r="2" fill="#FFF"/>
    </g>

  </g>
  
  <!-- Signature / Title Block -->
  <text x="20" y="480" font-family="Arial, sans-serif" font-size="14" fill="#FFF" font-weight="bold">ANDY WARHOL</text>
  <text x="20" y="495" font-family="Arial, sans-serif" font-size="10" fill="#FFF">EATING A BURGER</text>
</svg>
