<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Pop Art Bright Yellow -->
  <rect width="500" height="500" fill="#FFEF00" />

  <!-- Andy Warhol Stylized Face -->
  <!-- Neck -->
  <rect x="200" y="350" width="100" height="100" fill="#FFDBAC" stroke="black" stroke-width="4"/>
  
  <!-- Face Shape -->
  <path d="M180 200 Q180 380 250 380 Q320 380 320 200 Z" fill="#FFDBAC" stroke="black" stroke-width="4"/>
  
  <!-- Signature Silver Wig (Stylized) -->
  <path d="M170 220 Q160 100 250 80 Q340 100 330 220 Q330 150 250 150 Q170 150 170 220" fill="#C0C0C0" stroke="black" stroke-width="3"/>
  
  <!-- Eyes & Glasses -->
  <!-- Left Lens -->
  <rect x="195" y="220" width="45" height="35" rx="5" fill="white" stroke="black" stroke-width="3"/>
  <!-- Right Lens -->
  <rect x="260" y="220" width="45" height="35" rx="5" fill="white" stroke="black" stroke-width="3"/>
  <!-- Bridge -->
  <line x1="240" y1="235" x2="260" y2="235" stroke="black" stroke-width="3"/>
  <!-- Eyes (Dots) -->
  <circle cx="217" cy="237" r="5" fill="black"/>
  <circle cx="282" cy="237" r="5" fill="black"/>

  <!-- Mouth (Eating gesture) -->
  <path d="M230 320 Q250 350 270 320" fill="none" stroke="black" stroke-width="4" stroke-linecap="round"/>

  <!-- The Hamburger (Pop Art Style) -->
  <!-- Bottom Bun -->
  <rect x="300" y="380" width="120" height="30" rx="15" fill="#E3A857" stroke="black" stroke-width="3"/>
  <!-- Meat Patty -->
  <rect x="300" y="360" width="120" height="25" rx="5" fill="#633917" stroke="black" stroke-width="3"/>
  <!-- Cheese -->
  <rect x="300" y="355" width="120" height="10" fill="#FFD700" stroke="black" stroke-width="2"/>
  <!-- Lettuce -->
  <path d="M300 350 Q320 340 340 350 Q360 340 380 350 Q400 340 420 350 L420 355 L300 355 Z" fill="#32CD32" stroke="black" stroke-width="2"/>
  <!-- Top Bun -->
  <path d="M300 350 Q300 310 360 310 Q420 310 420 350 Z" fill="#E3A857" stroke="black" stroke-width="3"/>
  <!-- Sesame Seeds -->
  <circle cx="330" cy="330" r="2" fill="white"/>
  <circle cx="350" cy="325" r="2" fill="white"/>
  <circle cx="370" cy="335" r="2" fill="white"/>
  <circle cx="390" cy="328" r="2" fill="white"/>

  <!-- Pop Art Halftone Effect (Decorative Dots) -->
  <circle cx="50" cy="50" r="3" fill="#FF69B4" opacity="0.5"/>
  <circle cx="80" cy="50" r="3" fill="#FF69B4" opacity="0.5"/>
  <circle cx="50" cy="80" r="3" fill="#FF69B4" opacity="0.5"/>
  <circle cx="80" cy="80" r="3" fill="#FF69B4" opacity="0.5"/>
  
  <circle cx="450" cy="450" r="3" fill="#00BFFF" opacity="0.5"/>
  <circle cx="420" cy="450" r="3" fill="#00BFFF" opacity="0.5"/>
  <circle cx="450" cy="420" r="3" fill="#00BFFF" opacity="0.5"/>
</svg>