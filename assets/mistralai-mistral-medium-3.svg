<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Warhol-style color blocks -->
  <rect width="500" height="500" fill="#FFD700" /> <!-- Gold background -->

  <!-- Warhol's face (simplified, pop art style) -->
  <circle cx="250" cy="200" r="100" fill="#FF6B6B" stroke="#000" stroke-width="3" />
  <!-- Hair (stylized) -->
  <path d="M200,100 Q250,50 300,100 L350,150 Q300,200 250,180 Q200,200 150,150 Z" fill="#4ECDC4" stroke="#000" stroke-width="2" />
  <!-- Glasses -->
  <rect x="200" y="180" width="100" height="30" rx="5" fill="#FFFFFF" stroke="#000" stroke-width="2" />
  <line x1="250" y1="180" x2="250" y2="210" stroke="#000" stroke-width="2" />
  <!-- Mouth (eating hamburger) -->
  <path d="M230,250 Q250,270 270,250" fill="none" stroke="#000" stroke-width="2" />

  <!-- Hamburger -->
  <rect x="220" y="280" width="60" height="30" rx="5" fill="#FFBE0B" stroke="#000" stroke-width="2" /> <!-- Bun top -->
  <rect x="210" y="310" width="80" height="20" fill="#8338EC" stroke="#000" stroke-width="2" /> <!-- Patty -->
  <rect x="220" y="330" width="60" height="20" rx="5" fill="#FFBE0B" stroke="#000" stroke-width="2" /> <!-- Bun bottom -->

  <!-- Warhol-style color halftone dots (background effect) -->
  <circle cx="50" cy="50" r="10" fill="#FF6B6B" opacity="0.7" />
  <circle cx="100" cy="100" r="15" fill="#4ECDC4" opacity="0.7" />
  <circle cx="400" cy="150" r="12" fill="#8338EC" opacity="0.7" />
  <circle cx="350" cy="300" r="10" fill="#FFBE0B" opacity="0.7" />
  <circle cx="150" cy="400" r="15" fill="#FF6B6B" opacity="0.7" />

  <!-- Text: "Andy Warhol" in pop art style -->
  <text x="250" y="480" font-family="Arial" font-size="24" font-weight="bold" fill="#000" text-anchor="middle">ANDY WARHOL</text>
  <text x="250" y="450" font-family="Arial" font-size="16" fill="#8338EC" text-anchor="middle">EATING A HAMBURGER</text>
</svg>