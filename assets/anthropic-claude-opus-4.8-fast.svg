<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Pop Art Background -->
  <rect width="500" height="500" fill="#FFD700"/>
  <rect width="250" height="250" fill="#FF6EC7"/>
  <rect x="250" width="250" height="250" fill="#00CED1"/>
  <rect y="250" width="250" height="250" fill="#7FFF00"/>
  <rect x="250" y="250" width="250" height="250" fill="#FF4500"/>

  <!-- Face -->
  <ellipse cx="250" cy="220" rx="90" ry="110" fill="#FFE4C4" stroke="#000" stroke-width="3"/>

  <!-- Warhol's iconic white/silver hair -->
  <path d="M 160 160 Q 150 100 200 90 Q 250 70 300 90 Q 350 100 340 160 
           Q 350 130 320 120 Q 290 110 250 115 Q 210 110 180 120 Q 150 130 160 160 Z" 
        fill="#F5F5F5" stroke="#000" stroke-width="3"/>
  <path d="M 165 155 Q 180 130 210 135" fill="none" stroke="#DDD" stroke-width="4"/>
  <path d="M 290 135 Q 320 130 335 155" fill="none" stroke="#DDD" stroke-width="4"/>

  <!-- Glasses (Warhol's signature look) -->
  <rect x="195" y="190" width="50" height="35" rx="5" fill="none" stroke="#000" stroke-width="4"/>
  <rect x="255" y="190" width="50" height="35" rx="5" fill="none" stroke="#000" stroke-width="4"/>
  <line x1="245" y1="205" x2="255" y2="205" stroke="#000" stroke-width="4"/>

  <!-- Eyes behind glasses -->
  <circle cx="220" cy="207" r="6" fill="#000"/>
  <circle cx="280" cy="207" r="6" fill="#000"/>

  <!-- Nose -->
  <path d="M 250 220 L 245 250 Q 250 255 255 250" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Mouth (open, eating) -->
  <ellipse cx="250" cy="280" rx="30" ry="20" fill="#8B0000" stroke="#000" stroke-width="3"/>
  <ellipse cx="250" cy="275" rx="22" ry="8" fill="#FFF"/>

  <!-- Hamburger -->
  <g transform="translate(250, 290)">
    <!-- Top bun -->
    <ellipse cx="0" cy="15" rx="70" ry="30" fill="#D2691E" stroke="#000" stroke-width="3"/>
    <ellipse cx="0" cy="10" rx="70" ry="25" fill="#DEB887" stroke="#000" stroke-width="2"/>
    <!-- Sesame seeds -->
    <ellipse cx="-30" cy="5" rx="4" ry="2" fill="#FFF8DC"/>
    <ellipse cx="0" cy="0" rx="4" ry="2" fill="#FFF8DC"/>
    <ellipse cx="30" cy="5" rx="4" ry="2" fill="#FFF8DC"/>
    <ellipse cx="-15" cy="10" rx="4" ry="2" fill="#FFF8DC"/>
    <ellipse cx="20" cy="12" rx="4" ry="2" fill="#FFF8DC"/>

    <!-- Lettuce -->
    <path d="M -70 30 Q -50 22 -30 30 Q -10 22 10 30 Q 30 22 50 30 Q 70 22 70 35 
             L 70 40 L -70 40 Z" fill="#7FFF00" stroke="#000" stroke-width="2"/>

    <!-- Tomato -->
    <ellipse cx="0" cy="42" rx="68" ry="10" fill="#FF6347" stroke="#000" stroke-width="2"/>

    <!-- Patty -->
    <ellipse cx="0" cy="52" rx="72" ry="14" fill="#654321" stroke="#000" stroke-width="3"/>

    <!-- Cheese -->
    <path d="M -65 50 L 65 50 L 55 70 L 35 62 L 15 72 L -5 62 L -25 72 L -45 62 L -65 70 Z" 
          fill="#FFA500" stroke="#000" stroke-width="2"/>

    <!-- Bottom bun -->
    <ellipse cx="0" cy="68" rx="68" ry="20" fill="#D2691E" stroke="#000" stroke-width="3"/>
  </g>

  <!-- Hand holding burger -->
  <ellipse cx="170" cy="370" rx="35" ry="25" fill="#FFE4C4" stroke="#000" stroke-width="3"/>
  <ellipse cx="330" cy="370" rx="35" ry="25" fill="#FFE4C4" stroke="#000" stroke-width="3"/>

  <!-- Title text in Pop Art style -->
  <text x="250" y="470" font-family="Arial Black, sans-serif" font-size="28" 
        font-weight="bold" text-anchor="middle" fill="#000" 
        stroke="#FFF" stroke-width="1">WARHOL</text>
</svg>