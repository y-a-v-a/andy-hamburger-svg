<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <!-- Background (Warhol-style color blocks) -->
  <rect width="500" height="500" fill="#FFD700" />

  <!-- Andy Warhol's face (stylized) -->
  <g id="warhol">
    <!-- Head (silver wig) -->
    <ellipse cx="250" cy="200" rx="100" ry="120" fill="#C0C0C0" stroke="#000" stroke-width="3" />
    <!-- Face (pale skin) -->
    <ellipse cx="250" cy="220" rx="80" ry="90" fill="#F5F5DC" stroke="#000" stroke-width="2" />
    <!-- Eyes (bold and simple) -->
    <ellipse cx="220" cy="190" rx="15" ry="10" fill="#000" />
    <ellipse cx="280" cy="190" rx="15" ry="10" fill="#000" />
    <!-- Eyebrows (thick and arched) -->
    <path d="M200,170 Q220,160 240,170" stroke="#000" stroke-width="5" fill="none" />
    <path d="M260,170 Q280,160 300,170" stroke="#000" stroke-width="5" fill="none" />
    <!-- Nose (simple line) -->
    <path d="M250,200 L250,240" stroke="#000" stroke-width="3" />
    <!-- Mouth (smirk) -->
    <path d="M230,260 Q250,270 270,260" stroke="#000" stroke-width="3" fill="none" />
    <!-- Cheek blush (pop art dots) -->
    <circle cx="200" cy="230" r="8" fill="#FF69B4" />
    <circle cx="300" cy="230" r="8" fill="#FF69B4" />
  </g>

  <!-- Hamburger (Warhol-style) -->
  <g id="hamburger">
    <!-- Top bun -->
    <ellipse cx="350" cy="250" rx="40" ry="20" fill="#F4A460" stroke="#000" stroke-width="2" />
    <!-- Lettuce (green squiggles) -->
    <path d="M320,250 Q330,240 340,250 Q350,260 360,250" stroke="#228B22" stroke-width="5" fill="none" />
    <!-- Patty (brown) -->
    <ellipse cx="350" cy="260" rx="35" ry="15" fill="#8B4513" stroke="#000" stroke-width="2" />
    <!-- Cheese (yellow) -->
    <ellipse cx="350" cy="265" rx="30" ry="10" fill="#FFD700" stroke="#000" stroke-width="1" />
    <!-- Bottom bun -->
    <ellipse cx="350" cy="275" rx="40" ry="20" fill="#F4A460" stroke="#000" stroke-width="2" />
    <!-- Sesame seeds (dots) -->
    <circle cx="340" cy="245" r="2" fill="#FFF" />
    <circle cx="350" cy="240" r="2" fill="#FFF" />
    <circle cx="360" cy="245" r="2" fill="#FFF" />
  </g>

  <!-- Hand holding the burger (simplified) -->
  <g id="hand">
    <path d="M300,240 L320,260 L340,250 L360,270 L380,260 L390,280 L370,300 L350,290 Z" fill="#F5F5DC" stroke="#000" stroke-width="2" />
    <!-- Thumb -->
    <path d="M390,280 L400,270 L410,280 L400,290 Z" fill="#F5F5DC" stroke="#000" stroke-width="2" />
  </g>

  <!-- Warhol-style "POP" text -->
  <text x="50" y="450" font-family="Arial" font-size="30" font-weight="bold" fill="#FF0000">POP!</text>
</svg>