<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background - classic Warhol bright color -->
  <rect width="400" height="400" fill="#FF6B9D"/>
  
  <!-- BODY -->
  <rect x="130" y="280" width="140" height="120" fill="#000080" rx="5"/>
  
  <!-- NECK -->
  <rect x="175" y="255" width="50" height="35" fill="#FDBCB4"/>
  
  <!-- HEAD -->
  <ellipse cx="200" cy="220" rx="70" ry="75" fill="#FDBCB4"/>
  
  <!-- HAIR - Andy's signature silver hair -->
  <ellipse cx="200" cy="160" rx="72" ry="45" fill="#E8E8E8"/>
  <ellipse cx="200" cy="155" rx="68" ry="40" fill="#D3D3D3"/>
  <!-- Hair strands -->
  <path d="M130 170 Q140 140 160 150" stroke="#C0C0C0" stroke-width="3" fill="none"/>
  <path d="M270 170 Q260 140 240 150" stroke="#C0C0C0" stroke-width="3" fill="none"/>
  <path d="M145 185 Q150 155 170 160" stroke="#C0C0C0" stroke-width="3" fill="none"/>
  <path d="M255 185 Q250 155 230 160" stroke="#C0C0C0" stroke-width="3" fill="none"/>
  
  <!-- GLASSES - Andy's iconic round glasses -->
  <circle cx="180" cy="225" r="18" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="220" cy="225" r="18" fill="none" stroke="#333" stroke-width="3"/>
  <line x1="198" y1="225" x2="202" y2="225" stroke="#333" stroke-width="3"/>
  <line x1="138" y1="222" x2="162" y2="224" stroke="#333" stroke-width="2"/>
  <line x1="238" y1="224" x2="262" y2="222" stroke="#333" stroke-width="2"/>
  <!-- Lens tint -->
  <circle cx="180" cy="225" r="17" fill="#87CEEB" opacity="0.3"/>
  <circle cx="220" cy="225" r="17" fill="#87CEEB" opacity="0.3"/>
  
  <!-- EYES behind glasses -->
  <ellipse cx="180" cy="225" rx="8" ry="6" fill="white"/>
  <ellipse cx="220" cy="225" rx="8" ry="6" fill="white"/>
  <circle cx="181" cy="225" r="4" fill="#5C4033"/>
  <circle cx="221" cy="225" r="4" fill="#5C4033"/>
  <circle cx="182" cy="224" r="1.5" fill="white"/>
  <circle cx="222" cy="224" r="1.5" fill="white"/>
  
  <!-- EYEBROWS -->
  <path d="M165 210 Q180 205 195 210" stroke="#999" stroke-width="2.5" fill="none"/>
  <path d="M205 210 Q220 205 235 210" stroke="#999" stroke-width="2.5" fill="none"/>
  
  <!-- NOSE -->
  <ellipse cx="200" cy="240" rx="8" ry="5" fill="#F0A898"/>
  <path d="M196 237 Q200 250 204 237" stroke="#E8998A" stroke-width="1.5" fill="none"/>
  
  <!-- MOUTH - open, eating -->
  <path d="M178 262 Q200 258 222 262" stroke="#CC6666" stroke-width="2" fill="#CC6666"/>
  <path d="M178 262 Q200 278 222 262" fill="#8B0000"/>
  <!-- Teeth -->
  <rect x="182" y="262" width="10" height="8" fill="white" rx="1"/>
  <rect x="195" y="262" width="10" height="8" fill="white" rx="1"/>
  <rect x="208" y="262" width="10" height="8" fill="white" rx="1"/>
  
  <!-- ARMS -->
  <!-- Left arm -->
  <path d="M130 295 Q90 320 80 360" stroke="#FDBCB4" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Right arm holding hamburger -->
  <path d="M270 295 Q310 320 320 340" stroke="#FDBCB4" stroke-width="22" fill="none" stroke-linecap="round"/>
  
  <!-- HAND holding hamburger -->
  <ellipse cx="320" cy="348" rx="20" ry="15" fill="#FDBCB4"/>
  
  <!-- HAMBURGER -->
  <!-- Top bun -->
  <ellipse cx="330" cy="305" rx="45" ry="22" fill="#C8860A"/>
  <ellipse cx="330" cy="297" rx="43" ry="18" fill="#E8A020"/>
  <!-- Sesame seeds -->
  <ellipse cx="320" cy="292" rx="4" ry="2" fill="#C8860A" transform="rotate(-20 320 292)"/>
  <ellipse cx="335" cy="288" rx="4" ry="2" fill="#C8860A" transform="rotate(10 335 288)"/>
  <ellipse cx="348" cy="293" rx="4" ry="2" fill="#C8860A" transform="rotate(-15 348 293)"/>
  
  <!-- Lettuce -->
  <path d="M288 312 Q295 306 305 312 Q315 306 325 312 Q335 306 345 312 Q355 306 365 312 Q370 318 365 322 Q355 316 345 322 Q335 316 325 322 Q315 316 305 322 Q295 316 288 322 Z" fill="#228B22"/>
  
  <!-- Cheese -->
  <rect x="290" y="318" width="80" height="8" fill="#FFD700" rx="1"/>
  
  <!-- Patty -->
  <ellipse cx="330" cy="330" rx="45" ry="12" fill="#8B4513"/>
  <ellipse cx="330" cy="327" rx="43" ry="10" fill="#A0522D"/>
  
  <!-- Tomato -->
  <ellipse cx="330" cy="338" rx="42" ry="7" fill="#FF4444"/>
  
  <!-- Bottom bun -->
  <ellipse cx="330" cy="348" rx="45" ry="14" fill="#C8860A"/>
  <ellipse cx="330" cy="344" rx="43" ry="12" fill="#E8A020"/>
  
  <!-- POP ART text -->
  <text x="200" y="30" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" 
        fill="#FFFF00" text-anchor="middle" stroke="#000" stroke-width="2">ANDY WARHOL</text>
  <text x="200" y="58" font-family="Arial Black, sans-serif" font-size="14" font-weight="900"
        fill="#FFFF00" text-anchor="middle" stroke="#000" stroke-width="1">EATING A HAMBURGER</text>
  
  <!-- Decorative dots (Warhol/Lichtenstein style) -->
  <circle cx="20" cy="100" r="8" fill="#FFFF00" opacity="0.7"/>
  <circle cx="45" cy="100" r="8" fill="#FFFF00" opacity="0.7"/>
  <circle cx="355" cy="100" r="8" fill="#FFFF00" opacity="0.7"/>
  <circle cx="380" cy="100" r="8" fill="#FFFF00" opacity="0.7"/>
  <circle cx="20" cy="125" r="8" fill="#FFFF00" opacity="0.7"/>
  <circle cx="45" cy="125" r="8" fill="#FFFF00" opacity="0.7"/>
  <circle cx="355" cy="125" r="8" fill="#FFFF00" opacity="0.7"/>
  <circle cx="380" cy="125" r="8" fill="#FFFF00" opacity="0.7"/>
  
  <!-- Outline for pop art effect -->
  <ellipse cx="200" cy="220" rx="70" ry="75" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="130" y="280" width="140" height="120" fill="none" stroke="#000" stroke-width="2" rx="5"/>
</svg>