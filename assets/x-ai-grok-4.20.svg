<svg xmlns="http://www.w3.org/2000/svg" width="400" height="380" viewBox="0 0 400 380">
  <!-- Background - Pop Art style bright yellow -->
  <rect width="400" height="380" fill="#FFEE00"/>

  <!-- Andy Warhol's face (pop art colored) -->
  <!-- Skin tone with Warhol's signature flat color blocking -->
  <ellipse cx="200" cy="160" rx="95" ry="115" fill="#FFDBB4"/>

  <!-- Hair (iconic Warhol silver/white with black outline) -->
  <ellipse cx="195" cy="75" rx="85" ry="55" fill="#E5E5E5"/>
  <path d="M125 55 Q140 25 185 28 Q225 20 265 48 Q280 75 255 95" fill="#D0D0D0"/>
  <path d="M130 60 Q150 35 190 32 Q230 28 270 55" fill="none" stroke="#333" stroke-width="8"/>

  <!-- Sunglasses (very Warhol) -->
  <!-- Left lens -->
  <rect x="135" y="135" width="55" height="32" rx="8" fill="#222" />
  <!-- Right lens -->
  <rect x="210" y="135" width="55" height="32" rx="8" fill="#222" />
  <!-- Bridge -->
  <rect x="190" y="145" width="20" height="8" fill="#222"/>
  <!-- Frames -->
  <rect x="130" y="130" width="65" height="40" rx="10" fill="none" stroke="#111" stroke-width="6"/>
  <rect x="205" y="130" width="65" height="40" rx="10" fill="none" stroke="#111" stroke-width="6"/>

  <!-- Mouth - slight smile while eating -->
  <path d="M165 200 Q200 215 235 200" fill="none" stroke="#C33" stroke-width="9" stroke-linecap="round"/>

  <!-- Hamburger - huge and juicy, being eaten -->
  <!-- Top bun -->
  <ellipse cx="305" cy="205" rx="48" ry="22" fill="#E8B16E"/>
  <!-- Sesame seeds on bun -->
  <ellipse cx="270" cy="188" rx="6" ry="4" fill="#F6D8A2" transform="rotate(-25 270 188)"/>
  <ellipse cx="295" cy="180" rx="7" ry="4" fill="#F6D8A2" transform="rotate(35 295 180)"/>
  <ellipse cx="325" cy="187" rx="5" ry="4" fill="#F6D8A2" transform="rotate(-40 325 187)"/>
  <ellipse cx="345" cy="198" rx="6" ry="3" fill="#F6D8A2" transform="rotate(20 345 198)"/>

  <!-- Lettuce (pop art green) -->
  <path d="M265 215 Q280 235 315 230 Q355 240 360 215" fill="#4CAF50" stroke="#2E7D32" stroke-width="6"/>

  <!-- Patty -->
  <rect x="263" y="230" width="78" height="28" rx="8" fill="#3C2F2F"/>

  <!-- Cheese - melting dramatically (Warhol would love the drips) -->
  <path d="M260 255 L265 270 L290 263 L310 275 L335 258 L355 265 L360 255" fill="#FFCC00" stroke="#F5A623" stroke-width="4"/>

  <!-- Bottom bun -->
  <ellipse cx="305" cy="275" rx="52" ry="18" fill="#E8B16E"/>

  <!-- Andy's hand holding the burger -->
  <!-- Arm -->
  <rect x="340" y="225" width="35" height="75" rx="15" fill="#FFDBB4" transform="rotate(25 360 260)"/>
  <!-- Fingers -->
  <rect x="370" y="240" width="18" height="28" rx="8" fill="#FFDBB4" transform="rotate(45 375 255)"/>
  
  <!-- Text: "Andy eats" in classic Warhol font style -->
  <text x="35" y="340" font-family="Impact, Arial Black" font-size="42" fill="#E61E2B" letter-spacing="-2">ANDY</text>
  <text x="42" y="375" font-family="Impact, Arial Black" font-size="38" fill="#2A6CEB" letter-spacing="-1.5">EATS</text>

  <!-- Pop art dots in corners for that classic Warhol Factory vibe -->
  <circle cx="30" cy="30" r="12" fill="#FF0088"/>
  <circle cx="370" cy="30" r="12" fill="#00AAFF"/>
  <circle cx="30" cy="340" r="12" fill="#00AAFF"/>
  <circle cx="370" cy="340" r="12" fill="#FF0088"/>
</svg>