<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Warhol's Body (Red Shirt) -->
  <rect x="180" y="180" width="140" height="140" rx="30" fill="red"/>

  <!-- Warhol's Arms -->
  <rect x="160" y="190" width="20" height="80" rx="10" fill="red"/> <!-- Left arm -->
  <rect x="300" y="190" width="20" height="100" rx="10" transform="rotate(-30 310 190)" fill="red"/> <!-- Right arm holding the burger -->

  <!-- Head -->
  <ellipse cx="250" cy="130" rx="50" ry="60" fill="#f9c3a6"/>

  <!-- Warhol's Hair -->
  <circle cx="200" cy="70" r="10" fill="white"/>
  <circle cx="220" cy="40" r="12" fill="white"/>
  <circle cx="250" cy="30" r="12" fill="white"/>
  <circle cx="280" cy="40" r="12" fill="white"/>
  <circle cx="300" cy="70" r="10" fill="white"/>

  <!-- Glasses (for style, not historically accurate) -->
  <circle cx="230" cy="120" r="10" stroke="black" stroke-width="2" fill="white"/>
  <circle cx="270" cy="120" r="10" stroke="black" stroke-width="2" fill="white"/>
  <line x1="240" y1="120" x2="260" y2="120" stroke="black" stroke-width="2"/>

  <!-- Warhol's Face Details -->
  <circle cx="235" cy="120" r="3" fill="black"/> <!-- Left eye -->
  <circle cx="265" cy="120" r="3" fill="black"/> <!-- Right eye -->
  <path d="M 220 145 Q 250 155 280 145" stroke="black" stroke-width="2" fill="none"/> <!-- Smile -->

  <!-- Hamburger -->
  <g transform="translate(330, 180)">
    <!-- Outer bun ring -->
    <circle cx="0" cy="0" r="30" fill="#f7d547"/>
    <!-- Inner meat layer -->
    <circle cx="0" cy="0" r="15" fill="#6b2e0f"/>
    <!-- Lettuce -->
    <circle cx="0" cy="0" r="10" fill="rgba(46, 125, 50, 0.8)"/>
    <!-- Cheese -->
    <circle cx="0" cy="0" r="7" fill="#f0c040"/>
    
    <!-- Bite mark -->
    <path d="M 30 0 A 30 30 0 0 1 20 -25 L 0 0 Z" fill="white"/>
  </g>

  <!-- Optional Text: Warhol's Famous Quote -->
  <text x="50" y="360" font-family="Verdana" font-size="16" fill="#333">"Pop art is for everyone."</text>
</svg>