<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background: Classic Pop Art Red -->
  <rect width="500" height="500" fill="#D62828"/>

  <!-- Definitions for simple effects -->
  <defs>
    <clipPath id="faceClip">
      <ellipse cx="250" cy="240" rx="130" ry="160"/>
    </clipPath>
  </defs>

  <!-- Body / Black Turtleneck -->
  <path d="M140,500 L140,350 Q140,280 250,280 Q360,280 360,350 L360,500 Z" fill="#1A1A1A"/>

  <!-- Neck -->
  <rect x="215" y="270" width="70" height="50" fill="#F5D0C5"/>

  <!-- Head Shape -->
  <ellipse cx="250" cy="240" rx="130" ry="160" fill="#F5D0C5"/>

  <!-- Iconic Silver Wig -->
  <path d="M120,240 Q120,80 250,60 Q380,80 380,240 Q380,180 250,170 Q120,180 120,240 Z" fill="#D8D8D8"/>
  <path d="M130,220 Q130,100 250,85 Q370,100 370,220 Q350,150 250,140 Q150,150 130,220 Z" fill="#EAEAEA"/>
  
  <!-- Hair highlights for texture -->
  <path d="M150,210 Q150,140 250,120 Q350,140 350,210" fill="none" stroke="#C0C0C0" stroke-width="2" opacity="0.5"/>

  <!-- Left Ear -->
  <ellipse cx="120" cy="250" rx="15" ry="25" fill="#F5D0C5"/>
  <ellipse cx="120" cy="250" rx="8" ry="15" fill="#E6B9B0"/>

  <!-- Right Ear -->
  <ellipse cx="380" cy="250" rx="15" ry="25" fill="#F5D0C5"/>
  <ellipse cx="380" cy="250" rx="8" ry="15" fill="#E6B9B0"/>

  <!-- Glasses -->
  <g fill="none" stroke="#111111" stroke-width="8">
    <!-- Left Lens Frame -->
    <rect x="140" y="210" width="80" height="60" rx="5" />
    <!-- Right Lens Frame -->
    <rect x="280" y="210" width="80" height="60" rx="5" />
    <!-- Bridge -->
    <path d="M220,240 Q250,230 280,240" />
    <!-- Temple arms -->
    <path d="M140,240 L120,250" />
    <path d="M360,240 L380,250" />
  </g>
  
  <!-- Lens Glare (Pop Art style) -->
  <line x1="150" y1="220" x2="170" y2="260" stroke="white" stroke-width="4" opacity="0.4"/>
  <line x1="290" y1="220" x2="310" y2="260" stroke="white" stroke-width="4" opacity="0.4"/>

  <!-- Eyes -->
  <g>
    <circle cx="180" cy="240" r="8" fill="#111111"/>
    <circle cx="320" cy="240" r="8" fill="#111111"/>
    <!-- Eyebrows -->
    <path d="M150,200 Q180,190 210,200" stroke="#A0A0A0" stroke-width="4" fill="none"/>
    <path d="M290,200 Q320,190 350,200" stroke="#A0A0A0" stroke-width="4" fill="none"/>
  </g>

  <!-- Nose -->
  <path d="M250,250 L240,280 Q250,290 260,280 L250,250" fill="#E6B9B0"/>

  <!-- Mouth (Open, Eating) -->
  <ellipse cx="250" cy="320" rx="25" ry="10" fill="#111111"/>
  <path d="M225,320 Q250,330 275,320" fill="#8B0000"/>

  <!-- Hands holding Burger -->
  <g>
    <!-- Left Hand -->
    <g transform="translate(160, 340)">
      <path d="M0,0 Q-10,30 10,60 L40,60 L40,0 Z" fill="#F5D0C5"/>
      <!-- Fingers -->
      <path d="M10,60 L10,90 L20,90 L20,60" fill="#F5D0C5"/>
      <path d="M25,60 L25,95 L35,95 L35,60" fill="#F5D0C5"/>
    </g>
    
    <!-- Right Hand -->
    <g transform="translate(300, 340) scale(-1,1)">
      <path d="M0,0 Q-10,30 10,60 L40,60 L40,0 Z" fill="#F5D0C5"/>
      <!-- Fingers -->
      <path d="M10,60 L10,90 L20,90 L20,60" fill="#F5D0C5"/>
      <path d="M25,60 L25,95 L35,95 L35,60" fill="#F5D0C5"/>
    </g>
  </g>

  <!-- Hamburger -->
  <g transform="translate(250, 360)">
    <!-- Burger Wrapper (Back) -->
    <path d="M-60,-20 L-50,20 L50,20 L60,-20 Z" fill="#E0E0E0"/>
    
    <!-- Top Bun -->
    <path d="M-55,-10 Q-55,-50 0,-50 Q55,-50 55,-10 Z" fill="#D2691E"/>
    <ellipse cx="0" cy="-45" rx="40" ry="20" fill="#E6A040" opacity="0.5"/>
    <!-- Sesame Seeds -->
    <ellipse cx="-20" cy="-30" rx="4" ry="2" fill="#FFF8DC"/>
    <ellipse cx="15" cy="-35" rx="4" ry="2" fill="#FFF8DC"/>
    <ellipse cx="0" cy="-42" rx="4" ry="2" fill="#FFF8DC"/>
    
    <!-- Burger Patty -->
    <rect x="-50" y="-10" width="100" height="12" fill="#4A2C2A"/>
    <rect x="-50" y="-8" width="100" height="4" fill="#6B3E3E" opacity="0.5"/>
    
    <!-- Lettuce -->
    <path d="M-55,5 Q-30,-5 0,5 Q30,-5 55,5 L55,15 L-55,15 Z" fill="#32CD32"/>
    
    <!-- Tomato -->
    <rect x="-45" y="15" width="90" height="8" fill="#FF6347"/>
    
    <!-- Bottom Bun -->
    <rect x="-50" y="23" width="100" height="15" rx="5" fill="#D2691E"/>
    <rect x="-50" y="23" width="100" height="5" fill="#E6A040" opacity="0.5"/>
    
    <!-- Burger Wrapper (Front fold) -->
    <path d="M-60,-20 L-55,-20 L-55,30 Q0,40 55,30 L55,-20 L60,-20" fill="none" stroke="#BDBDBD" stroke-width="2"/>
  </g>
  
  <!-- Pop Art Graphic Elements -->
  <circle cx="420" cy="80" r="20" fill="#FFF176" opacity="0.8"/>
  <circle cx="80" cy="420" r="15" fill="#FFF176" opacity="0.8"/>
  
</svg>