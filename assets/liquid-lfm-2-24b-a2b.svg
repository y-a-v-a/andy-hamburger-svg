<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- Andy Warhol's Face (in Warhol style) -->
  <circle cx="200" cy="180" r="80" fill="#ffd700" stroke="#000" stroke-width="4"/>
  <circle cx="200" cy="180" r="60" fill="#ffc0cb"/> <!-- Inner highlight -->

  <!-- Eyes -->
  <circle cx="170" cy="160" r="8" fill="#000"/>
  <circle cx="230" cy="160" r="8" fill="#000"/>

  <!-- Mouth (Warhol-style smile) -->
  <path d="M 165 175 Q 200 190 235 175" stroke="#000" stroke-width="4" fill="none"/>

  <!-- Hair (Warhol's signature style) -->
  <polygon points="160,140 180,130 200,140 220,130 240,140" fill="#ffd700"/>
  <polygon points="160,160 180,170 200,160 220,170 240,160" fill="#ffc0cb"/>

  <!-- Body (simplified) -->
  <rect x="180" y="220" width="40" height="30" fill="#ffd700"/>
  <rect x="210" y="220" width="40" height="30" fill="#ffc0cb"/>

  <!-- Hamburger -->
  <rect x="150" y="250" width="100" height="20" fill="#ff0000" rx="10"/> <!-- Bottom bun -->
  <rect x="160" y="270" width="80" height="20" fill="#ffff00" rx="10"/> <!-- Patty -->
  <rect x="170" y="270" width="60" height="20" fill="#000000" rx="10"/> <!-- Sesame seeds -->
  <rect x="185" y="270" width="20" height="20" fill="#ff0000" rx="10"/> <!-- Top bun -->

  <!-- Ketchup -->
  <ellipse cx="200" cy="260" rx="15" ry="10" fill="#ff0000"/>
  <ellipse cx="200" cy="260" rx="12" ry="8" fill="#ffff00"/> <!-- Ketchup blob -->

  <!-- Fork (Warhol-style) -->
  <path d="M 150 280 Q 180 300 210 280" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M 150 285 Q 180 305 210 285" stroke="#000" stroke-width="2" fill="none"/>

  <!-- Note: This is a highly stylized interpretation. For more detail, use graphic design software. -->
</svg>