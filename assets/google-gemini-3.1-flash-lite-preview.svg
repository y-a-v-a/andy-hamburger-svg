<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#ff00ff" />
  
  <!-- Warhol's Silhouette (Iconic hair and glasses) -->
  <g fill="#000000">
    <!-- Hair -->
    <path d="M60,40 Q100,5 140,40 Q150,60 145,80 Q130,70 120,80 Q110,70 100,80 Q90,70 80,80 Q70,70 60,80 Q50,60 60,40" />
    <!-- Glasses -->
    <rect x="75" y="85" width="20" height="15" rx="5" />
    <rect x="105" y="85" width="20" height="15" rx="5" />
    <line x1="95" y1="92" x2="105" y2="92" stroke="#000" stroke-width="2" />
  </g>

  <!-- Hamburger -->
  <g transform="translate(100, 140)">
    <!-- Bottom Bun -->
    <ellipse cx="0" cy="10" rx="30" ry="10" fill="#d2691e" />
    <!-- Patty -->
    <rect x="-25" y="0" width="50" height="10" fill="#4b2e2a" />
    <!-- Lettuce -->
    <path d="M-28,-2 Q0,-5 28,-2" stroke="#228b22" stroke-width="4" fill="none" />
    <!-- Top Bun -->
    <ellipse cx="0" cy="-5" rx="30" ry="15" fill="#f4a460" />
    <!-- Sesame seeds -->
    <circle cx="-10" cy="-10" r="1" fill="#fff" />
    <circle cx="5" cy="-12" r="1" fill="#fff" />
  </g>

  <!-- Warhol's hand holding the burger -->
  <path d="M80,150 L70,160 L90,160 Z" fill="#ffcc99" />
  <path d="M120,150 L130,160 L110,160 Z" fill="#ffcc99" />
</svg>