<svg xmlns="http://www.w3.org/2000/svg"
     width="400" height="460"
     viewBox="0 0 400 460"
     style="background:#fff">

  <!-- Shadow under the whole figure -->
  <ellipse cx="200" cy="445" rx="120" ry="12" fill="#ccc" opacity="0.5"/>

  <!-- === BODY (shirt) === -->
  <rect x="155" y="230" width="90" height="180" rx="10"
        fill="#ff69b4" stroke="#333" stroke-width="2"/>

  <!-- === NECK === -->
  <rect x="185" y="210" width="30" height="30"
        fill="#ffb6c1" stroke="#333" stroke-width="1.5"/>

  <!-- === HEAD === -->
  <ellipse cx="200" cy="180" rx="55" ry="65"
           fill="#fff" stroke="#333" stroke-width="2"/>

  <!-- Hair – wild pop‑art style -->
  <path d="M145 130 Q155 90 170 100 Q180 80 190 95 Q200 70 210 95 Q220 80 230 100 Q245 90 255 130 Z"
        fill="#666" stroke="#333" stroke-width="1.5"/>
  <!-- Short sideburns -->
  <line x1="148" y1="150" x2="155" y2="165" stroke="#333" stroke-width="3"/>
  <line x1="252" y1="150" x2="245" y2="165" stroke="#333" stroke-width="3"/>

  <!-- === EYES (large, pop‑art) === -->
  <!-- Left eye -->
  <ellipse cx="178" cy="175" rx="18" ry="20"
           fill="#000" stroke="#fff" stroke-width="2"/>
  <circle cx="178" cy="175" r="6" fill="#fff"/>
  <!-- Right eye -->
  <ellipse cx="222" cy="175" rx="18" ry="20"
           fill="#000" stroke="#fff" stroke-width="2"/>
  <circle cx="222" cy="175" r="6" fill="#fff"/>

  <!-- Eyebrows -->
  <line x1="160" y1="152" x2="195" y2="150" stroke="#333" stroke-width="3"/>
  <line x1="205" y1="150" x2="240" y2="152" stroke="#333" stroke-width="3"/>

  <!-- Nose -->
  <path d="M200 185 Q195 195 200 200 Q205 195 200 185 Z"
        fill="#ffb6c1" stroke="#333" stroke-width="1.2"/>

  <!-- Mouth – smiling, opening for the burger -->
  <path d="M178 220 Q200 245 222 220"
        fill="#ff4500" stroke="#333" stroke-width="2"/>
  <!-- Upper teeth (optional) -->
  <rect x="182" y="222" width="36" height="8" rx="2"
        fill="#fff" stroke="#333" stroke-width="0.8"/>

  <!-- === HAMBURGER === -->
  <!-- Bun top -->
  <ellipse cx="200" cy="270" rx="45" ry="15"
           fill="#f5deb3" stroke="#8b4513" stroke-width="2"/>
  <ellipse cx="200" cy="268" rx="40" ry="12"
           fill="#ffa500" stroke="none"/> <!-- sesame seeds -->
  <circle cx="185" cy="265" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="200" cy="260" r="3.5" fill="#fff" opacity="0.8"/>
  <circle cx="215" cy="265" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="192" cy="268" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="208" cy="268" r="2.5" fill="#fff" opacity="0.8"/>

  <!-- Lettuce -->
  <path d="M160 270 Q165 280 170 275 Q180 268 190 275 L200 280 L210 275 Q220 268 230 275 Q235 280 240 270 Z"
        fill="#7cfc00" stroke="#333" stroke-width="1"/>

  <!-- Tomato -->
  <ellipse cx="200" cy="290" rx="42" ry="10"
           fill="#ff4500" stroke="#333" stroke-width="1.5"/>

  <!-- Cheese slice -->
  <ellipse cx="200" cy="300" rx="44" ry="8"
           fill="#ffd700" stroke="#daa520" stroke-width="1.5"/>

  <!-- Patty -->
  <ellipse cx="200" cy="315" rx="46" ry="14"
           fill="#5c3317" stroke="#333" stroke-width="1.5"/>
  <!-- Grill marks -->
  <line x1="160" y1="310" x2="240" y2="310" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="320" x2="238" y2="320" stroke="#333" stroke-width="1" opacity="0.5"/>

  <!-- Lettuce (bottom) -->
  <path d="M160 330 Q165 320 170 325 Q180 318 190 325 L200 330 L210 325 Q220 318 230 325 Q235 320 240 330 Z"
        fill="#7cfc00" stroke="#333" stroke-width="1"/>

  <!-- Bun bottom -->
  <ellipse cx="200" cy="345" rx="45" ry="15"
           fill="#f5deb3" stroke="#8b4513" stroke-width="2"/>

  <!-- === ARMS (right hand holding burger) === -->
  <!-- Right arm -->
  <path d="M245 280 Q270 310 260 340"
        fill="none" stroke="#ff69b4" stroke-width="6" stroke-linecap="round"/>
  <!-- Hand -->
  <circle cx="260" cy="340" r="14" fill="#ffb6c1" stroke="#333" stroke-width="1.5"/>
  <!-- Fingers (simplified) -->
  <line x1="255" y1="328" x2="250" y2="315" stroke="#ffb6c1" stroke-width="4" stroke-linecap="round"/>
  <line x1="260" y1="325" x2="255" y2="312" stroke="#ffb6c1" stroke-width="4" stroke-linecap="round"/>
  <line x1="265" y1="328" x2="260" y2="315" stroke="#ffb6c1" stroke-width="4" stroke-linecap="round"/>

  <!-- Left arm (reaching for burger) -->
  <path d="M155 280 Q130 310 140 340"
        fill="none" stroke="#ff69b4" stroke-width="6" stroke-linecap="round"/>
  <circle cx="140" cy="340" r="14" fill="#ffb6c1" stroke="#333" stroke-width="1.5"/>
  <!-- Thumb -->
  <line x1="130" y1="330" x2="122" y2="340" stroke="#ffb6c1" stroke-width="5" stroke-linecap="round"/>

  <!-- === LEGS === -->
  <rect x="170" y="410" width="20" height="40" rx="5"
        fill="#222" stroke="#333" stroke-width="1.5"/>
  <rect x="210" y="410" width="20" height="40" rx="5"
        fill="#222" stroke="#333" stroke-width="1.5"/>

  <!-- Shoes -->
  <ellipse cx="180" cy="455" rx="18" ry="10" fill="#c00" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="220" cy="455" rx="18" ry="10" fill="#c00" stroke="#333" stroke-width="1.5"/>

  <!-- Signature pop‑art text -->
  <text x="200" y="490" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22" fill="#ff69b4" stroke="#333" stroke-width="0.8">
    Warhol Bites
  </text>

</svg>