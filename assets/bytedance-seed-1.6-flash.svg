<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f0f0"/>
  
  <!-- Warhol's Soup Cans (background) -->
  <g id="soup-cans">
    <!-- Red can -->
    <rect x="30" y="280" width="60" height="80" rx="5" fill="#ff0000"/>
    <circle cx="60" cy="320" r="20" fill="#fff"/>
    <text x="60" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000">CAMPBELL'S</text>
    
    <!-- Blue can -->
    <rect x="100" y="290" width="60" height="70" rx="5" fill="#0066ff"/>
    <circle cx="130" cy="325" r="17" fill="#fff"/>
    <text x="130" y="335" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#000">SOUP</text>
    
    <!-- Yellow can -->
    <rect x="170" y="270" width="60" height="90" rx="5" fill="#ffd700"/>
    <circle cx="200" cy="310" r="22" fill="#fff"/>
    <text x="200" y="320" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000">CANS</text>
  </g>
  
  <!-- Andy Warhol Figure -->
  <g id="warhol">
    <!-- Head -->
    <circle cx="250" cy="150" r="70" fill="#ffdab9"/>
    <!-- Hair -->
    <ellipse cx="250" cy="120" rx="50" ry="40" fill="#333"/>
    <!-- Face details -->
    <circle cx="225" cy="140" r="5" fill="#000"/>
    <circle cx="275" cy="140" r="5" fill="#000"/>
    <path d="M220 160 Q250 180 280 160" stroke="#000" stroke-width="2" fill="none"/>
    <!-- Turtleneck -->
    <rect x="200" y="220" width="100" height="80" fill="#000"/>
    <!-- Body -->
    <rect x="220" y="300" width="60" height="50" fill="#663300"/>
  </g>
  
  <!-- Hamburger (held by Warhol) -->
  <g id="hamburger" transform="translate(280 280)">
    <!-- Top bun -->
    <rect x="-40" y="-40" width="80" height="40" rx="10" fill="#ffebcd" stroke="#8b4513" stroke-width="2"/>
    <!-- Sesame seeds -->
    <circle cx="-20" cy="-30" r="1" fill="#d4af37"/>
    <circle cx="-10" cy="-35" r="1" fill="#d4af37"/>
    <circle cx="0" cy="-30" r="1" fill="#d4af37"/>
    <circle cx="10" cy="-35" r="1" fill="#d4af37"/>
    <circle cx="20" cy="-30" r="1" fill="#d4af37"/>
    <circle cx="-25" cy="-20" r="1" fill="#d4af37"/>
    <circle cx="-15" cy="-25" r="1" fill="#d4af37"/>
    <circle cx="-5" cy="-20" r="1" fill="#d4af37"/>
    <circle cx="5" cy="-25" r="1" fill="#d4af37"/>
    <circle cx="15" cy="-20" r="1" fill="#d4af37"/>
    <circle cx="25" cy="-25" r="1" fill="#d4af37"/>
    <!-- Cheese -->
    <rect x="-38" y="-20" width="76" height="20" rx="5" fill="#ffc107"/>
    <!-- Patty -->
    <rect x="-35" y="0" width="70" height="15" rx="3" fill="#8b4513"/>
    <!-- Lettuce -->
    <ellipse cx="0" cy="10" rx="35" ry="6" fill="#228b22"/>
    <!-- Tomato -->
    <rect x="-30" y="5" width="60" height="10" rx="2" fill="#ff6347"/>
    <!-- Onion -->
    <ellipse cx="0" cy="8" rx="30" ry="4" fill="#fff"/>
    <!-- Bottom bun -->
    <rect x="-40" y="10" width="80" height="20" rx="10" fill="#ffebcd" stroke="#8b4513" stroke-width="2"/>
  </g>
  
  <!-- Napkin (simple fold) -->
  <path d="M280 300 L320 290 L310 330 Z" fill="#f8f8ff"/>
</svg>