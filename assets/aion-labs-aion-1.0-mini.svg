<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <title>Andy Warhol Eating a Hamburger</title>
  <style>
    text {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 20px;
      font-weight: bold;
      fill: #333;
    }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="600" height="600" fill="#f0f0f0"/>
  
  <!-- Andy Warhol -->
  <g id="andy">
    <!-- Silver Wig -->
    <ellipse cx="300" cy="180" rx="120" ry="80" fill="#c0c0c0" stroke="#888" stroke-width="2"/>
    <!-- Face -->
    <circle cx="300" cy="220" r="70" fill="#f8e9d0" stroke="#d4b593" stroke-width="3"/>
    <!-- Sunglasses -->
    <rect x="250" y="200" width="100" height="30" rx="5" fill="#111"/>
    <circle cx="270" cy="215" r="20" fill="#222" stroke="#000" stroke-width="2"/>
    <circle cx="330" cy="215" r="20" fill="#222" stroke="#000" stroke-width="2"/>
    <line x1="290" y1="215" x2="310" y2="215" stroke="#000" stroke-width="3"/>
    <!-- Nose -->
    <path d="M 300 230 Q 310 250, 300 250" stroke="#d4b593" stroke-width="3" fill="none"/>
    <!-- Mouth (open for burger) -->
    <ellipse cx="300" cy="280" rx="25" ry="15" fill="#ff9999"/>
    <!-- Hand holding burger -->
    <g id="hand">
      <ellipse cx="380" cy="320" rx="25" ry="15" fill="#f8e9d0" transform="rotate(30 380 320)"/>
      <!-- Fingers -->
      <circle cx="395" cy="310" r="7" fill="#f8e9d0"/>
      <circle cx="400" cy="320" r="7" fill="#f8e9d0"/>
      <circle cx="395" cy="330" r="7" fill="#f8e9d0"/>
    </g>
  </g>
  
  <!-- Hamburger -->
  <g id="burger" transform="translate(350 280)">
    <!-- Bottom Bun -->
    <ellipse cx="0" cy="25" rx="45" ry="20" fill="#e6b87e"/>
    <!-- Patty -->
    <ellipse cx="0" cy="5" rx="40" ry="15" fill="#8b4513"/>
    <!-- Cheese -->
    <rect x="-35" y="-5" width="70" height="10" rx="3" fill="#ffd700"/>
    <!-- Lettuce -->
    <path d="M -40 0 Q -20 -15, 0 -5 Q 20 -15, 40 0" fill="#90ee90" stroke="#228b22" stroke-width="1"/>
    <!-- Tomato -->
    <ellipse cx="0" cy="-15" rx="30" ry="10" fill="#ff6347"/>
    <!-- Top Bun -->
    <ellipse cx="0" cy="-30" rx="45" ry="20" fill="#e6b87e"/>
    <!-- Sesame Seeds -->
    <circle cx="-20" cy="-40" r="3" fill="#fff"/>
    <circle cx="10" cy="-45" r="3" fill="#fff"/>
    <circle cx="25" cy="-35" r="3" fill="#fff"/>
    <circle cx="-30" cy="-30" r="3" fill="#fff"/>
    <circle cx="0" cy="-35" r="3" fill="#fff"/>
    <!-- Bite taken out -->
    <path d="M 30 -25 Q 40 -30, 30 -35" stroke="#f0f0f0" stroke-width="5" fill="none"/>
  </g>
  
  <!-- Pop Art Elements -->
  <circle cx="100" cy="100" r="40" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="500" cy="100" r="40" fill="#4ecdc4" opacity="0.7"/>
  <rect x="100" y="450" width="80" height="80" fill="#ffe66d" opacity="0.7"/>
  <rect x="420" y="450" width="80" height="80" fill="#ffa5a5" opacity="0.7"/>
  
  <!-- Caption -->
  <text x="300" y="520" text-anchor="middle">Andy Warhol Eating a Hamburger</text>
  <text x="300" y="550" text-anchor="middle" font-size="16" fill="#666">Pop Art, 2023</text>
</svg>