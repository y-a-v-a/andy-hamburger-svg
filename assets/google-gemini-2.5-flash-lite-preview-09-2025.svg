<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Define the distinct "Pop Art" color palette -->
    <style>
      .warhol-skin { fill: #FFD1DC; stroke: #000; stroke-width: 2; } /* Pinkish skin tone */
      .hair { fill: #964B00; stroke: #000; stroke-width: 2; } /* Brown hair */
      .shirt { fill: #FFFFFF; stroke: #000; stroke-width: 2; } /* White shirt */
      .hamburger-bun { fill: #E8C19B; stroke: #000; stroke-width: 1.5; }
      .lettuce { fill: #4CAF50; fill-opacity: 0.7; }
      .meat { fill: #A52A2A; }
      .cheese { fill: #FFEB3B; }
    </style>
  </defs>

  <!-- Background for high contrast (optional, but good for pop art look) -->
  <rect width="400" height="400" fill="#FF0055"/>

  <!-- == Andy Warhol Figure == -->

  <!-- Head (Stylized shape) -->
  <ellipse cx="200" cy="150" rx="70" ry="85" class="warhol-skin"/>

  <!-- Hair (Simple, distinct block) -->
  <path d="M 130 80 Q 200 50, 270 80 L 280 130 L 120 130 Z" class="hair"/>

  <!-- Glasses (Iconic element) -->
  <rect x="155" y="135" width="90" height="20" fill="none" stroke="#000" stroke-width="4"/>
  <line x1="155" y1="145" x2="130" y2="155" stroke="#000" stroke-width="3"/>
  <line x1="245" y1="155" x2="270" y2="145" stroke="#000" stroke-width="3"/>
  
  <!-- Mouth/Jaw Area (Simple line for expression) -->
  <line x1="170" y1="205" x2="230" y2="205" stroke="#000" stroke-width="2"/>
  
  <!-- Body/Shirt -->
  <rect x="150" y="200" width="100" height="150" class="shirt"/>
  
  <!-- Simplified Arms reaching for the burger -->
  <line x1="150" y1="250" x2="110" y2="280" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <line x1="250" y1="250" x2="290" y2="280" stroke="#000" stroke-width="8" stroke-linecap="round"/>


  <!-- == The Hamburger == -->
  <g transform="translate(170, 280) scale(1.2)">
    
    <!-- Bottom Bun -->
    <ellipse cx="0" cy="0" rx="40" ry="10" class="hamburger-bun"/>
    
    <!-- Meat Patty -->
    <rect x="-35" y="-5" width="70" height="15" class="meat"/>
    
    <!-- Cheese (Slightly melted over the edges) -->
    <rect x="-36" y="-4" width="72" height="12" class="cheese"/>

    <!-- Lettuce (Ruffled edge simulation) -->
    <path d="M -38 -15 Q -45 -20, -30 -25 Q 0 -30, 30 -25 Q 45 -20, 38 -15 Z" class="lettuce"/>
    
    <!-- Top Bun -->
    <ellipse cx="0" cy="-20" rx="40" ry="10" class="hamburger-bun"/>
    
  </g>
  
</svg>