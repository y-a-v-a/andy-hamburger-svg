<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" style="background:#f0f0f0">
  <!-- Warhol Silhouette (Pop Art Style) -->
  <g transform="translate(400, 300)">
    <!-- Silver Wig (Geometric) -->
    <path d="M-120,-100 C-150,-120 -180,-100 -200,-70 C-220,-40 -210,-10 -190,10 C-170,30 -140,40 -110,35 C-80,30 -60,10 -50,-20 C-40,-50 -20,-80 10,-90 C40,-100 70,-90 90,-70 C110,-50 120,-20 110,10 C100,40 80,70 50,90 C20,110 -10,120 -40,115 C-70,110 -100,90 -120,60 C-140,30 -150,0 -140,-30 Z" 
          fill="#e0e0e0" stroke="#a0a0a0" stroke-width="2"/>
    
    <!-- Face (Simplified) -->
    <circle cx="0" cy="-30" r="60" fill="#ffdfc4"/>
    
    <!-- Warhol's Signature Glasses -->
    <circle cx="-25" cy="-40" r="18" fill="none" stroke="black" stroke-width="3"/>
    <circle cx="25" cy="-40" r="18" fill="none" stroke="black" stroke-width="3"/>
    <line x1="-7" y1="-40" x2="7" y2="-40" stroke="black" stroke-width="3"/>
    
    <!-- Mouth (Eating Hamburger) -->
    <path d="M-15,10 C-5,25 5,25 15,10" fill="none" stroke="#cc0000" stroke-width="3"/>
    
    <!-- The Hamburger (Half-eaten, Pop Art Style) -->
    <g transform="translate(80, -20) rotate(-15)">
      <!-- Top Bun -->
      <path d="M-40,0 C-60,-20 -80,-10 -90,10 C-100,30 -90,50 -70,60 C-50,70 -20,70 0,60 C20,50 40,30 50,10 C60,-10 50,-30 30,-40 C10,-50 -10,-50 -30,-40 Z" 
            fill="#D2B48C" stroke="#8B4513" stroke-width="1.5"/>
      
      <!-- Patty -->
      <rect x="-35" y="-15" width="70" height="25" rx="5" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
      
      <!-- Lettuce -->
      <path d="M-35,-15 C-40,-25 -50,-20 -55,-10 C-60,0 -55,15 -45,20 C-35,25 -20,20 -15,10 C-10,0 -15,-10 -25,-15 Z M25,-15 C30,-25 40,-20 45,-10 C50,0 45,15 35,20 C25,25 10,20 5,10 C0,0 5,-10 15,-15 Z" 
            fill="#8FBC8F"/>
      
      <!-- Tomato -->
      <ellipse cx="-15" cy="-22" rx="10" ry="6" fill="#FF6347" stroke="#E50000" stroke-width="0.5"/>
      <ellipse cx="15" cy="-22" rx="10" ry="6" fill="#FF6347" stroke="#E50000" stroke-width="0.5"/>
      
      <!-- Bottom Bun -->
      <path d="M-40,25 C-60,35 -80,25 -90,35 C-100,45 -90,60 -70,70 C-50,80 -20,80 0,70 C20,60 40,45 50,35 C60,25 50,15 30,10 C10,5 -10,5 -30,10 Z" 
            fill="#D2B48C" stroke="#8B4513" stroke-width="1.5"/>
      
      <!-- Bite Out (Revealing layers) -->
      <path d="M25,25 L40,15 L50,25 Z" fill="#8B4513"/>
      <circle cx="35" cy="20" r="8" fill="#5D4037"/>
    </g>
    
    <!-- Warhol's Hand Holding Burger -->
    <path d="M55,-5 C65,-15 85,-10 95,0 C105,10 100,25 85,30 C70,35 50,30 45,20 C40,10 45,0 55,-5 Z" 
          fill="#ffdfc4" stroke="#d3a892" stroke-width="1"/>
    
    <!-- Pop Art Halftone Effect (Background) -->
    <g opacity="0.15">
      <circle cx="-150" cy="-150" r="12" fill="black"/>
      <circle cx="-100" cy="-180" r="8" fill="black"/>
      <circle cx="-50" cy="-150" r="10" fill="black"/>
      <circle cx="0" cy="-180" r="6" fill="black"/>
      <circle cx="50" cy="-150" r="9" fill="black"/>
      <circle cx="100" cy="-180" r="11" fill="black"/>
      <circle cx="150" cy="-150" r="7" fill="black"/>
    </g>
    
    <!-- Silly Pop Art Label -->
    <text x="0" y="150" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#E4002B" font-weight="bold">
      ANDY'S BURGER
    </text>
    <text x="0" y="180" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#333333">
      Est. 1955 • Eat Like Pop Art
    </text>
    
    <!-- Hidden Easter Egg: Tiny Campbell's Can -->
    <g transform="translate(-150, 50) scale(0.5)">
      <rect x="0" y="0" width="40" height="60" fill="#EF3340" rx="3"/>
      <text x="20" y="30" font-family="Courier" font-size="8" text-anchor="middle" fill="white">S</text>
      <text x="20" y="45" font-family="Courier" font-size="8" text-anchor="middle" fill="white">O</text>
      <text x="20" y="60" font-family="Courier" font-size="8" text-anchor="middle" fill="white">U</text>
      <text x="20" y="75" font-family="Courier" font-size="8" text-anchor="middle" fill="white">P</text>
    </g>
  </g>
</svg>