<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#F5F5DC" />
  
  <!-- Warhol's Body/Torso -->
  <rect x="120" y="200" width="160" height="180" fill="#4169E1" stroke="#000" stroke-width="3" rx="10" />
  
  <!-- Neck -->
  <rect x="175" y="170" width="50" height="40" fill="#FDBCCF" stroke="#000" stroke-width="2" />
  
  <!-- Head (face shape) -->
  <ellipse cx="200" cy="130" rx="70" ry="80" fill="#FDBCCF" stroke="#000" stroke-width="3" />
  
  <!-- Iconic Warhol Wig (White/Platinum Blonde) -->
  <path d="M130,80 Q150,50 200,50 T270,80 Q280,100 270,130 Q250,120 200,120 T150,130 Q140,100 130,80 Z" fill="#FFFFFF" stroke="#000" stroke-width="2" />
  <!-- Wig texture lines -->
  <path d="M145,65 Q180,75 200,70 Q220,75 255,65" fill="none" stroke="#000" stroke-width="1" />
  <path d="M140,80 Q170,90 200,85 Q230,90 260,80" fill="none" stroke="#000" stroke-width="1" />
  <path d="M135,95 Q165,105 200,100 Q235,105 265,95" fill="none" stroke="#000" stroke-width="1" />
  
  <!-- Glasses (Thick black frames) -->
  <rect x="160" y="115" width="30" height="25" rx="5" fill="none" stroke="#000" stroke-width="4" />
  <rect x="210" y="115" width="30" height="25" rx="5" fill="none" stroke="#000" stroke-width="4" />
  <!-- Bridge of glasses -->
  <line x1="190" y1="127" x2="210" y2="127" stroke="#000" stroke-width="4" />
  <!-- Eyes behind glasses -->
  <circle cx="175" cy="127" r="5" fill="#000" />
  <circle cx="225" cy="127" r="5" fill="#000" />
  
  <!-- Nose -->
  <path d="M195,140 Q200,155 205,140" fill="none" stroke="#000" stroke-width="2" />
  
  <!-- Mouth (about to bite) -->
  <path d="M180,165 Q190,175 200,170 Q210,175 220,165" fill="none" stroke="#000" stroke-width="2" />
  <!-- Lips -->
  <path d="M182,165 Q190,180 200,172 Q210,180 218,165" fill="#E75480" stroke="#000" stroke-width="1" />
  
  <!-- The Hamburger -->
  <!-- Bottom Bun -->
  <path d="M150,240 Q200,230 250,240 L240,250 Q200,240 160,250 Z" fill="#DEB887" stroke="#000" stroke-width="2" />
  
  <!-- Patty -->
  <ellipse cx="200" cy="255" rx="45" ry="8" fill="#8B4513" stroke="#000" stroke-width="2" />
  
  <!-- Lettuce -->
  <path d="M155,250 Q175,260 200,250 Q225,260 245,250" fill="none" stroke="#228B22" stroke-width="4" />
  
  <!-- Cheese (Melting) -->
  <path d="M165,255 Q185,270 200,255 Q215,270 235,255" fill="#FFD700" stroke="#000" stroke-width="1" />
  
  <!-- Top Bun -->
  <path d="M160,245 Q200,220 240,245 Q200,235 160,245 Z" fill="#DEB887" stroke="#000" stroke-width="2" />
  <!-- Sesame Seeds on top bun -->
  <circle cx="180" cy="238" r="2" fill="#FFFACD" />
  <circle cx="200" cy="232" r="2" fill="#FFFACD" />
  <circle cx="220" cy="238" r="2" fill="#FFFACD" />
  
  <!-- Hand holding hamburger -->
  <path d="M140,260 Q130,280 145,300 Q160,310 180,305" fill="#FDBCCF" stroke="#000" stroke-width="2" />
  <path d="M260,260 Q270,280 255,300 Q240,310 220,305" fill="#FDBCCF" stroke="#000" stroke-width="2" />
  
  <!-- Pop Art Style Signature/Quote -->
  <text x="30" y="370" font-family="Arial, sans-serif" font-size="20" fill="#000" font-weight="bold">"A Coke is a Coke..."</text>
  <text x="220" y="370" font-family="Arial, sans-serif" font-size="16" fill="#000">– Andy Warhol</text>
  
</svg>