<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#FF0000" />

    <!-- Andy Warhol's face (simplified pop art style) -->
    <circle cx="250" cy="200" r="80" fill="#00FF00" stroke="#000000" stroke-width="3" />
    <circle cx="200" cy="180" r="20" fill="#000000" /> <!-- Left eye -->
    <circle cx="300" cy="180" r="20" fill="#000000" /> <!-- Right eye -->
    <path d="M220 220 Q250 240 280 220" stroke="#000000" stroke-width="3" fill="none" /> <!-- Mouth -->

    <!-- Warhol's wig (simplified) -->
    <path d="M180 100 Q250 50 320 100 L340 150 Q250 180 160 150 Z" fill="#FF00FF" stroke="#000000" stroke-width="2" />

    <!-- Hamburger -->
    <rect x="150" y="300" width="120" height="40" fill="#FFD700" stroke="#000000" stroke-width="2" /> <!-- Bun -->
    <rect x="160" y="320" width="80" height="10" fill="#FF0000" /> <!-- Patty -->
    <rect x="160" y="335" width="80" height="10" fill="#FFFFFF" /> <!-- Cheese -->
    <rect x="160" y="350" width="80" height="10" fill="#0000FF" /> <!-- Lettuce -->
    <rect x="160" y="365" width="80" height="10" fill="#00FF00" /> <!-- Tomato -->

    <!-- Andy holding the hamburger -->
    <line x1="250" y1="280" x2="200" y2="300" stroke="#000000" stroke-width="4" />
    <line x1="250" y1="280" x2="300" y2="300" stroke="#000000" stroke-width="4" />

    <!-- Warhol's signature style (dots) -->
    <circle cx="400" cy="400" r="10" fill="#000000" />
    <circle cx="420" cy="420" r="10" fill="#000000" />
    <circle cx="440" cy="440" r="10" fill="#000000" />
    <circle cx="460" cy="460" r="10" fill="#000000" />
    <circle cx="480" cy="480" r="10" fill="#000000" />

    <!-- Warhol's name (text) -->
    <text x="250" y="450" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">ANDY WARHOL</text>
</svg>