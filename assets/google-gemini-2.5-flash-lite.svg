<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="highlight" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.8);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f0f0"/>

  <!-- Andy Warhol's Head -->
  <g id="warhol-head" transform="translate(170, 120) rotate(-5)">
    <path d="M 0 -80 C -50 -80 -70 -50 -70 0 C -70 50 -50 80 0 80 C 50 80 70 50 70 0 C 70 -50 50 -80 0 -80 Z" fill="#fafafa" stroke="#333" stroke-width="2"/>

    <!-- Hair -->
    <path d="M -60 -70 C -40 -90 -10 -95 15 -85 C 30 -75 20 -60 0 -50 C -20 -40 -30 -50 -60 -70 Z" fill="#e0a0a0" stroke="#333" stroke-width="2"/>
    <path d="M -50 -65 C -30 -80 -5 -85 10 -75 C 25 -65 15 -55 -5 -45 C -25 -35 -35 -45 -50 -65 Z" fill="#e0a0a0" stroke="#333" stroke-width="2"/>

    <!-- Eyes -->
    <circle cx="-25" cy="-25" r="10" fill="#000"/>
    <circle cx="25" cy="-25" r="10" fill="#000"/>
    <circle cx="-27" cy="-27" r="3" fill="#fff" filter="url(#highlight)"/>
    <circle cx="23" cy="-27" r="3" fill="#fff" filter="url(#highlight)"/>

    <!-- Nose -->
    <path d="M 0 -5 C -5 -15 5 -15 0 -5 Z" fill="#ffd0d0" stroke="#333" stroke-width="1"/>

    <!-- Mouth -->
    <path d="M -30 15 C -10 25 10 25 30 15 L 0 10 Z" fill="#ff6666" stroke="#333" stroke-width="2"/>
    <path d="M -30 15 Q -15 20 0 15 Q 15 20 30 15 Z" fill="none" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Hamburger -->
  <g id="hamburger" transform="translate(200, 280) rotate(5)">
    <!-- Bun Bottom -->
    <ellipse cx="0" cy="25" rx="45" ry="15" fill="#e6ccb2" stroke="#333" stroke-width="2"/>
    <path d="M -45 25 Q -30 35 0 40 Q 30 35 45 25 Z" fill="#d4a07c" stroke="#333" stroke-width="2"/>

    <!-- Meat Patty -->
    <ellipse cx="0" cy="10" rx="40" ry="10" fill="#8b4513" stroke="#333" stroke-width="2"/>
    <ellipse cx="0" cy="10" rx="40" ry="10" fill="url(#highlight)" fill-opacity="0.5"/>

    <!-- Lettuce -->
    <path d="M -35 5 L -30 15 L -15 20 L 0 15 L 15 20 L 30 15 L 35 5 Z" fill="#90ee90" stroke="#333" stroke-width="1"/>

    <!-- Cheese -->
    <rect x="-38" y="-3" width="76" height="10" fill="#ffdead" stroke="#333" stroke-width="1"/>
    <path d="M -38 -3 L -30 0 L -38 5 Z" fill="#ffdead" stroke="#333" stroke-width="1"/>
    <path d="M 38 -3 L 30 0 L 38 5 Z" fill="#ffdead" stroke="#333" stroke-width="1"/>

    <!-- Bun Top -->
    <ellipse cx="0" cy="-10" rx="45" ry="15" fill="#e6ccb2" stroke="#333" stroke-width="2"/>
    <path d="M -45 -10 Q -30 -20 0 -35 Q 30 -20 45 -10 Z" fill="#d4a07c" stroke="#333" stroke-width="2"/>
    <circle cx="0" cy="-35" r="4" fill="#f0d0b0" stroke="#333" stroke-width="1"/>
    <circle cx="15" cy="-30" r="3" fill="#f0d0b0" stroke="#333" stroke-width="1"/>
    <circle cx="-15" cy="-30" r="3" fill="#f0d0b0" stroke="#333" stroke-width="1"/>
  </g>

  <!-- Andy's Hand -->
  <g id="warhol-hand" transform="translate(250, 250) rotate(-20)">
      <path d="M 0 0 C 10 -10 20 -20 30 -20 C 40 -20 50 -10 50 0 C 50 10 40 20 30 20 C 20 20 10 10 0 0 Z" fill="#ffd0d0" stroke="#333" stroke-width="2"/>
      <!-- Fingers -->
      <circle cx="10" cy="-15" r="5" fill="#ffd0d0" stroke="#333" stroke-width="1"/>
      <circle cx="0" cy="-20" r="5" fill="#ffd0d0" stroke="#333" stroke-width="1"/>
      <circle cx="-10" cy="-15" r="5" fill="#ffd0d0" stroke="#333" stroke-width="1"/>
      <circle cx="-5" cy="-5" r="5" fill="#ffd0d0" stroke="#333" stroke-width="1"/>
  </g>
</svg>