<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
    <defs>
        <!-- Halftone Pattern -->
        <pattern id="halftone" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <circle cx="9" cy="9" r="5" fill="#D4C000" opacity="0.6"/>
        </pattern>

        <!-- Bite Mask (Removes center of the burger to simulate a big bite) -->
        <mask id="bite-mask">
            <rect width="800" height="800" fill="white" />
            <circle cx="400" cy="500" r="40" fill="black" />
            <circle cx="365" cy="515" r="25" fill="black" />
            <circle cx="435" cy="515" r="25" fill="black" />
        </mask>

        <!-- Base Shapes -->
        <path id="shirt" d="M 100 800 L 250 630 C 350 670 450 670 550 630 L 700 800 Z" />
        <path id="head" d="M 280 650 L 325 500 C 285 450 285 380 315 360 C 300 230 500 230 485 360 C 515 380 515 450 475 500 L 520 650 Z" />
        
        <!-- Classic Wild Hair -->
        <path id="hair" d="M 210 480 C 180 350 250 280 250 280 C 200 200 280 150 280 150 C 250 80 340 100 340 100 C 350 30 420 50 420 50 C 480 30 500 100 500 100 C 580 80 560 180 560 180 C 630 200 580 280 580 280 C 650 350 590 480 590 480 C 550 440 550 360 550 360 C 500 420 510 320 510 320 C 470 380 460 300 460 300 C 410 360 400 280 400 280 C 360 340 330 290 330 290 C 280 350 280 370 280 370 C 250 420 210 480 210 480 Z" />
        
        <!-- Facial Features -->
        <path id="lips" d="M 370 475 C 390 465 410 465 430 475 C 410 490 390 490 370 475 Z" />

        <!-- Glasses -->
        <g id="glasses-frames">
            <rect x="290" y="340" width="100" height="70" rx="15" ry="15" />
            <rect x="410" y="340" width="100" height="70" rx="15" ry="15" />
            <line x1="390" y1="375" x2="410" y2="375" />
            <line x1="260" y1="360" x2="290" y2="360" />
            <line x1="510" y1="360" x2="540" y2="360" />
        </g>
        <g id="glasses-lenses">
            <rect x="290" y="340" width="100" height="70" rx="15" ry="15" />
            <rect x="410" y="340" width="100" height="70" rx="15" ry="15" />
        </g>

        <!-- Burger Layers -->
        <path id="bun-top" d="M 290 505 C 290 435 510 435 510 505 Z" />
        <path id="lettuce" d="M 280 505 L 310 520 L 340 505 L 370 520 L 400 505 L 430 520 L 460 505 L 490 520 L 520 505 L 515 525 L 285 525 Z" />
        <path id="tomato" d="M 287 525 L 513 525 L 513 540 L 287 540 Z" />
        <path id="patty" d="M 290 540 L 510 540 C 520 540 520 560 510 560 L 290 560 C 280 560 280 540 290 540 Z" />
        <path id="cheese" d="M 310 550 L 330 550 L 320 580 Z M 470 550 L 490 550 L 480 580 Z M 380 550 L 400 550 L 390 580 Z" />
        <path id="ketchup" d="M 440 540 C 440 525 470 525 470 540 C 480 565 460 585 450 575 C 440 585 420 565 430 540 Z" />
        <path id="bun-bot" d="M 290 560 L 510 560 C 520 600 280 600 290 560 Z" />

        <!-- Hands -->
        <path id="hand-left" d="M 180 720 L 260 580 C 270 550 310 580 290 610 C 280 630 260 640 240 720 Z" />
        <path id="hand-right" d="M 620 720 L 540 580 C 530 550 490 580 510 610 C 520 630 540 640 560 720 Z" />
    </defs>

    <!-- Background -->
    <rect width="800" height="800" fill="#FFE600" />
    <rect width="800" height="800" fill="url(#halftone)" />

    <!-- SILKSCREEN OFFSET LAYER (Color Fills offset for registration error effect) -->
    <g transform="translate(14, 16)">
        <use href="#shirt" fill="#222222" />
        <use href="#head" fill="#FF66B2" />
        <use href="#hair" fill="#00FFFF" />
        <use href="#lips" fill="#FF0000" />
        
        <!-- Eye tints behind glasses -->
        <circle cx="345" cy="375" r="7" fill="#000000" />
        <circle cx="455" cy="375" r="7" fill="#000000" />

        <!-- Tinted Lenses and Thick Frames -->
        <use href="#glasses-lenses" fill="#9D00FF" opacity="0.6" />
        <use href="#glasses-frames" fill="#FFFFFF" opacity="0.85" />

        <!-- Eaten Burger (Masked Fills) -->
        <g mask="url(#bite-mask)">
            <use href="#bun-top" fill="#FF9900" />
            <use href="#lettuce" fill="#39FF14" />
            <use href="#tomato" fill="#FF0000" />
            <use href="#patty" fill="#5C3A21" />
            <use href="#cheese" fill="#FFE600" />
            <use href="#bun-bot" fill="#FF9900" />
            <use href="#ketchup" fill="#FF0000" />
        </g>

        <!-- Hand Fills -->
        <use href="#hand-left" fill="#FF66B2" />
        <use href="#hand-right" fill="#FF66B2" />
    </g>

    <!-- BASE STRUCTURAL FACIAL FEATURES (Under Glasses) -->
    <g fill="none" stroke="#000000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Eyes -->
        <path d="M 320 375 Q 345 360 370 375 Q 345 390 320 375 Z" />
        <circle cx="345" cy="375" r="4" fill="#000" />
        <path d="M 430 375 Q 455 360 480 375 Q 455 390 430 375 Z" />
        <circle cx="455" cy="375" r="4" fill="#000" />
        
        <!-- Nose Base -->
        <path d="M 400 370 L 400 440 L 380 440" />
        <path d="M 380 440 Q 400 450 420 440" />
        
        <!-- Iconic Hollow Cheekbones -->
        <path d="M 310 440 C 330 460 330 490 320 510" />
        <path d="M 490 440 C 470 460 470 490 480 510" />
    </g>

    <!-- INK OUTLINE LAYER (True Positions, Stroke Heavy) -->
    <g fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <!-- Anatomy & Attire Outlines -->
        <use href="#shirt" />
        <use href="#head" />
        <use href="#hair" />
        <use href="#lips" stroke-width="4" />
        <use href="#glasses-frames" stroke-width="8" />
        
        <!-- Extra Messy Hair Contours -->
        <path d="M 280 250 Q 320 300 310 360" stroke-width="5" />
        <path d="M 480 200 Q 450 280 470 340" stroke-width="5" />
        <path d="M 350 150 L 340 220" stroke-width="5" />

        <!-- Burger Outlines (Masked for Bite Cutout) -->
        <g mask="url(#bite-mask)">
            <use href="#bun-top" />
            <use href="#lettuce" />
            <use href="#tomato" />
            <use href="#patty" />
            <use href="#cheese" />
            <use href="#bun-bot" />
            <use href="#ketchup" />
        </g>
        
        <!-- Hand-drawn Bite Mark Edge Over Burger -->
        <path d="M 345 520 A 25 25 0 0 0 371 537 A 40 40 0 0 0 429 537 A 25 25 0 0 0 455 520" stroke-width="7" />

        <!-- Hand Elements Output Last for Top Layering -->
        <use href="#hand-left" />
        <use href="#hand-right" />
        <!-- Hand Fingers & Details -->
        <path d="M 290 610 C 300 580 280 570 270 590" />
        <path d="M 270 590 C 280 560 260 550 250 570" />
        <path d="M 510 610 C 500 580 520 570 530 590" />
        <path d="M 530 590 C 520 560 540 550 550 570" />
    </g>
</svg>