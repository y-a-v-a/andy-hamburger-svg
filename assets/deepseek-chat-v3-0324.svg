<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background in Warhol's pop-art style -->
  <rect width="500" height="500" fill="#FFD700" />
  
  <!-- Andy Warhol's face (simplified pop-art version) -->
  <circle cx="250" cy="150" r="100" fill="#87CEEB" stroke="black" stroke-width="2" />
  
  <!-- Eyes -->
  <circle cx="220" cy="130" r="10" fill="black" />
  <circle cx="280" cy="130" r="10" fill="black" />
  
  <!-- Glasses (Warhol's signature round glasses) -->
  <circle cx="220" cy="130" r="25" fill="none" stroke="black" stroke-width="3" />
  <circle cx="280" cy="130" r="25" fill="none" stroke="black" stroke-width="3" />
  <line x1="245" y1="130" x2="255" y2="130" stroke="black" stroke-width="2" />
  
  <!-- Hair (silver-blonde, Warhol-style) -->
  <path d="M150,90 Q250,40 350,90" stroke="#FFFFFF" stroke-width="20" fill="none" />
  
  <!-- Mouth -->
  <path d="M220,180 Q250,200 280,180" fill="none" stroke="black" stroke-width="2" />
  
  <!-- Hamburger (raised hand holding it) -->
  <path d="M300,170 Q320,150 340,170" fill="none" stroke="black" stroke-width="2" />
  
  <!-- Hamburger layers -->
  <rect x="340" y="150" width="60" height="10" rx="5" ry="5" fill="#8B4513" /> <!-- Bottom bun -->
  <rect x="340" y="140" width="60" height="10" rx="5" ry="5" fill="#228B22" /> <!-- Lettuce -->
  <rect x="340" y="130" width="60" height="10" rx="5" ry="5" fill="#CD853F" /> <!-- Patty -->
  <rect x="340" y="120" width="60" height="10" rx="5" ry="5" fill="#FF6347" /> <!-- Tomato -->
  <rect x="340" y="110" width="60" height="10" rx="5" ry="5" fill="#FFD700" /> <!-- Top bun -->
  
  <!-- Hand -->
  <path d="M340,170 Q360,160 340,150" fill="#FFD1DC" stroke="black" stroke-width="1" />
</svg>