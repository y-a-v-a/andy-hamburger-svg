<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">

  <!-- Background - Warhol-esque Bright Color -->
  <rect width="100%" height="100%" fill="#FFC300"/> <!-- Bright Yellow -->

  <!-- Andy Warhol's Head (Simplified) -->
  <ellipse cx="300" cy="200" rx="80" ry="90" fill="#F0F0F0" stroke="#000" stroke-width="2"/>
  <circle cx="260" cy="180" r="10" fill="#000"/> <!-- Eye -->
  <circle cx="340" cy="180" r="10" fill="#000"/> <!-- Eye -->
  <path d="M 300 240 L 300 280" stroke="#000" stroke-width="2"/> <!-- Mouth - simple line -->

  <!-- Warhol's Wig (simplified for now) -->
  <ellipse cx="300" cy="120" rx="85" ry="50" fill="#FFFFFF" stroke="#000" stroke-width="1"/>
  <ellipse cx="300" cy="110" rx="80" ry="45" fill="#EEEEEE"/> <!-- Inner Wig Layer -->

  <!-- Hamburger -->
  <circle cx="300" cy="350" r="40" fill="#D2B48C" stroke="#000" stroke-width="2"/> <!-- Bun - Top -->
  <ellipse cx="300" cy="370" rx="35" ry="15" fill="#A0522D" stroke="#000" stroke-width="2"/> <!-- Patty -->
  <ellipse cx="300" cy="390" rx="30" ry="10" fill="#8B4513" stroke="#000" stroke-width="2"/> <!-- Patty 2 -->
  <ellipse cx="300" cy="410" rx="35" ry="15" fill="#A0522D" stroke="#000" stroke-width="2"/> <!-- Cheese -->
  <circle cx="300" cy="430" r="40" fill="#D2B48C" stroke="#000" stroke-width="2"/> <!-- Bun - Bottom -->

  <!-- Hand holding the hamburger - Very simplified -->
  <path d="M 250 340  C 260 330, 280 330, 290 340" stroke="#A0522D" fill="transparent" stroke-width="5"/>
  <path d="M 310 430 C 300 440, 280 440, 270 430" stroke="#A0522D" fill="transparent" stroke-width="5"/>

  <!-- Warhol Signature Style - Duplication/Slight Variation -->
  <!-- Duplicate Hamburger (shifted and slightly different color) -->
  <circle cx="400" cy="355" r="40" fill="#DAB878" stroke="#000" stroke-width="2"/>
  <ellipse cx="400" cy="375" rx="35" ry="15" fill="#B26625" stroke="#000" stroke-width="2"/>
  <ellipse cx="400" cy="395" rx="30" ry="10" fill="#97551A" stroke="#000" stroke-width="2"/>
    <ellipse cx="400" cy="415" rx="35" ry="15" fill="#B26625" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="435" r="40" fill="#DAB878" stroke="#000" stroke-width="2"/>

  <!-- Warhol Style - Color Overlay (Optional) -  Add transparency -->
  <rect width="100%" height="100%" fill="#F0FFF0" opacity="0.1"/>  <!-- Light Green Overlay-->

  <!-- Few additional dots for the Warhol style -->
  <circle cx="100" cy="100" r="5" fill="red" opacity="0.5"/>
  <circle cx="200" cy="200" r="5" fill="blue" opacity="0.5"/>
  <circle cx="400" cy="500" r="5" fill="green" opacity="0.5"/>

</svg>