<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <!-- Background -->
  <rect width="500" height="500" fill="#f5f5dc"/>

  <!-- Andy Warhol's torso -->
  <rect x="150" y="220" width="200" height="220" rx="20" fill="#2c3e50"/>
  <!-- Jacket collar -->
  <polygon points="170,220 250,280 330,220" fill="#1a252f"/>

  <!-- Head -->
  <circle cx="250" cy="160" r="75" fill="#f5d0c5"/>
  
  <!-- Silver/White Hair (Warhol's iconic wig) -->
  <!-- Hair base -->
  <path d="M180 110 Q250 70 320 110 Q320 140 250 145 Q180 140 180 110" fill="#e8e8e8"/>
  <!-- Hair strands -->
  <path d="M190 105 Q200 85 210 105" fill="none" stroke="#d0d0d0" stroke-width="3"/>
  <path d="M230 95 Q240 78 250 95" fill="none" stroke="#d0d0d0" stroke-width="3"/>
  <path d="M270 92 Q280 75 290 92" fill="none" stroke="#d0d0d0" stroke-width="3"/>
  <path d="M310 105 Q315 90 320 110" fill="none" stroke="#d0d0d0" stroke-width="3"/>

  <!-- Black glasses -->
  <!-- Left lens -->
  <rect x="200" y="145" width="45" height="30" rx="5" fill="#111" stroke="#222" stroke-width="2"/>
  <!-- Right lens -->
  <rect x="255" y="145" width="45" height="30" rx="5" fill="#111" stroke="#222" stroke-width="2"/>
  <!-- Bridge -->
  <line x1="245" y1="155" x2="255" y2="155" stroke="#222" stroke-width="4"/>
  <!-- Arms -->
  <line x1="200" y1="155" x2="185" y2="160" stroke="#222" stroke-width="4"/>
  <line x1="300" y1="155" x2="315" y2="160" stroke="#222" stroke-width="4"/>

  <!-- Eyebrows -->
  <line x1="210" y1="140" x2="235" y2="138" stroke="#333" stroke-width="3"/>
  <line x1="265" y1="138" x2="290" y2="140" stroke="#333" stroke-width="3"/>

  <!-- Mouth (slightly open) -->
  <ellipse cx="250" cy="195" rx="18" ry="8" fill="#c0392b"/>

  <!-- Hamburger -->
  <!-- Top bun -->
  <ellipse cx="340" cy="195" rx="45" ry="22" fill="#e67e22"/>
  <!-- Sesame seeds -->
  <circle cx="310" cy="185" r="3" fill="#f5f5dc"/>
  <circle cx="325" cy="180" r="2.5" fill="#f5f5dc"/>
  <circle cx="355" cy="183" r="3" fill="#f5f5dc"/>
  <circle cx="370" cy="190" r="2" fill="#f5f5dc"/>
  
  <!-- Patty -->
  <ellipse cx="340" cy="210" rx="42" ry="12" fill="#8b4513"/>
  
  <!-- Lettuce -->
  <path d="M300 208 Q320 220 340 208 Q360 220 380 210" fill="none" stroke="#27ae60" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Bottom bun -->
  <ellipse cx="340" cy="225" rx="40" ry="15" fill="#d68910"/>

  <!-- Hand holding the burger -->
  <!-- Hand -->
  <ellipse cx="305" cy="215" rx="22" ry="18" fill="#f5d0c5" transform="rotate(-25 305 215)"/>
  <!-- Thumb -->
  <ellipse cx="285" cy="208" rx="8" ry="12" fill="#f5d0c5" transform="rotate(-40 285 208)"/>
  
  <!-- Arm -->
  <path d="M260 250 Q290 230 305 220" fill="none" stroke="#2c3e50" stroke-width="18" stroke-linecap="round"/>

  <!-- Small detail: Warhol-style text (optional) -->
  <text x="250" y="470" font-family="Arial, sans-serif" font-size="18" fill="#555" text-anchor="middle">Andy Warhol × Burger</text>
</svg>