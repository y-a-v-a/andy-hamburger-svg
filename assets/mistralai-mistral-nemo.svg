<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial, sans-serif;">

  <!-- Andy Warhol's face -->
  <circle cx="250" cy="150" r="120" fill="#F2F2F2" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="150" r="100" fill="#FF69B4" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="150" r="80" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="150" r="60" fill="#FF69B4" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="150" r="40" fill="#000000" stroke="#000" stroke-width="2"/>

  <!-- Hair -->
  <path d="M200 100 Q225 75 250 75 Q275 75 290 100" stroke="#000" fill="transparent" stroke-width="2"/>

  <!-- Glasses -->
  <rect x="210" y="120" width="30" height="20" fill="#000" rx="5"/>
  <circle cx="220" cy="130" r="5" fill="#FFF"/>
  <circle cx="240" cy="130" r="5" fill="#FFF"/>

  <!-- Hamburger -->
  <rect x="150" y="250" width="200" height="100" fill="#FFD700" rx="10"/>
  <rect x="160" y="260" width="180" height="80" fill="#8B4513" rx="5"/>
  <circle cx="250" cy="320" r="20" fill="#FFFFFF" stroke="#000" stroke-width="2"/>

</svg>