<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#fff200"/>

  <!-- Hair -->
  <path d="M120 80 Q200 20 280 80 L260 140 Q200 110 140 140 Z" fill="#e6e6e6"/>

  <!-- Face -->
  <ellipse cx="200" cy="180" rx="70" ry="90" fill="#ffd1a4" stroke="#000" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="175" cy="170" r="5" fill="#000"/>
  <circle cx="225" cy="170" r="5" fill="#000"/>

  <!-- Nose -->
  <line x1="200" y1="180" x2="195" y2="205" stroke="#000" stroke-width="2"/>

  <!-- Mouth -->
  <path d="M170 220 Q200 240 230 220" stroke="#000" stroke-width="2" fill="none"/>

  <!-- Hamburger -->
  <g transform="translate(140,240)">
    <ellipse cx="60" cy="20" rx="70" ry="20" fill="#c68642"/>
    <rect x="-10" y="20" width="140" height="20" fill="#6b3e26"/>
    <rect x="-10" y="40" width="140" height="10" fill="#4caf50"/>
    <ellipse cx="60" cy="50" rx="70" ry="20" fill="#c68642"/>
  </g>

  <!-- Hands -->
  <circle cx="140" cy="260" r="15" fill="#ffd1a4"/>
  <circle cx="260" cy="260" r="15" fill="#ffd1a4"/>

  <!-- Pop-art outlines -->
  <rect x="10" y="10" width="380" height="380" fill="none" stroke="#000" stroke-width="4"/>
</svg>