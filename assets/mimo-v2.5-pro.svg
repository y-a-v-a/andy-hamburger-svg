<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <!-- Pop art background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </radialGradient>
    
    <!-- Skin tone -->
    <radialGradient id="skinGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE4C4"/>
      <stop offset="100%" stop-color="#F5DEB3"/>
    </radialGradient>
    
    <!-- Hair gradient (silver/white) -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D3D3D3"/>
    </linearGradient>
    
    <!-- Bun gradient -->
    <radialGradient id="bunTopGrad" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#D4A055"/>
      <stop offset="100%" stop-color="#C68E3E"/>
    </radialGradient>
    
    <!-- Lettuce -->
    <linearGradient id="lettuceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CCD7C"/>
      <stop offset="100%" stop-color="#5CB85C"/>
    </linearGradient>
    
    <!-- Meat patty -->
    <radialGradient id="meatGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </radialGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#00000044"/>
    </filter>
    
    <!-- Pop art halftone dots pattern -->
    <pattern id="halftone" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#FF000033"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="900" fill="url(#bgGrad)"/>
  <rect width="800" height="900" fill="url(#halftone)" opacity="0.3"/>
  
  <!-- Pop art border -->
  <rect x="20" y="20" width="760" height="860" fill="none" stroke="#FF1493" stroke-width="4" rx="10"/>
  <rect x="28" y="28" width="744" height="844" fill="none" stroke="#FFD700" stroke-width="2" rx="8"/>
  
  <!-- Body / Shoulders -->
  <path d="M250 650 Q280 580 350 560 L450 560 Q520 580 550 650 L580 800 L220 800 Z" 
        fill="#1a1a2e" filter="url(#shadow)"/>
  <!-- T-shirt neckline -->
  <path d="M350 560 Q400 590 450 560" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Neck -->
  <rect x="370" y="500" width="60" height="70" fill="url(#skinGrad)" rx="5"/>
  
  <!-- Head shape -->
  <ellipse cx="400" cy="380" rx="110" ry="130" fill="url(#skinGrad)" filter="url(#shadow)"/>
  
  <!-- Ears -->
  <ellipse cx="290" cy="390" rx="18" ry="25" fill="url(#skinGrad)" stroke="#DEB887" stroke-width="1"/>
  <ellipse cx="510" cy="390" rx="18" ry="25" fill="url(#skinGrad)" stroke="#DEB887" stroke-width="1"/>
  
  <!-- Hair (signature silver/white messy hair) -->
  <!-- Hair back volume -->
  <path d="M270 350 Q260 250 310 200 Q350 160 400 155 Q450 160 490 200 Q540 250 530 350 
           Q540 280 520 230 Q480 180 400 170 Q320 180 280 230 Q260 280 270 350 Z" 
        fill="url(#hairGrad)" filter="url(#shadow)"/>
  
  <!-- Hair strands - messy iconic look -->
  <path d="M290 280 Q270 230 300 190 Q310 180 320 200" fill="url(#hairGrad)" stroke="#D3D3D3" stroke-width="1"/>
  <path d="M310 260 Q300 210 330 170 Q340 160 345 185" fill="url(#hairGrad)" stroke="#D3D3D3" stroke-width="1"/>
  <path d="M340 250 Q335 195 360 160 Q370 155 375 175" fill="url(#hairGrad)" stroke="#D3D3D3" stroke-width="1"/>
  <path d="M370 245 Q370 190 395 158 Q405 152 405 175" fill="url(#hairGrad)" stroke="#D3D3D3" stroke-width="1"/>
  <path d="M400 245 Q405 190 425 158 Q435 152 430 175" fill="url(#hairGrad)" stroke="#D3D3D3" stroke-width="1"/>
  <path d="M430 250 Q440 195 455 165 Q465 158 458 180" fill="url(#hairGrad)" stroke="#D3D3D3" stroke-width="1"/>
  <path d="M455 260 Q470 210 480 180 Q490 172 482 200" fill="url(#hairGrad)" stroke="#D3D3D3" stroke-width="1"/>
  <path d="M475 280 Q500 230 505 200 Q510 190 498 220" fill="url(#hairGrad)" stroke="#D3D3D3" stroke-width="1"/>
  
  <!-- Hair top spiky pieces -->
  <path d="M330 200 Q325 170 340 150 Q345 165 335 195" fill="url(#hairGrad)"/>
  <path d="M360 185 Q358 155 370 140 Q375 155 365 180" fill="url(#hairGrad)"/>
  <path d="M390 178 Q392 148 400 135 Q405 150 395 175" fill="url(#hairGrad)"/>
  <path d="M420 180 Q425 150 432 138 Q435 155 425 178" fill="url(#hairGrad)"/>
  <path d="M450 190 Q458 160 462 148 Q465 165 455 188" fill="url(#hairGrad)"/>
  
  <!-- Eyebrows -->
  <path d="M340 340 Q360 330 380 338" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M420 338 Q440 330 460 340" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="360" cy="365" rx="22" ry="18" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="362" cy="365" r="9" fill="#4682B4"/>
  <circle cx="362" cy="365" r="5" fill="#1a1a2e"/>
  <circle cx="358" cy="361" r="2.5" fill="white"/>
  
  <!-- Right eye -->
  <ellipse cx="440" cy="365" rx="22" ry="18" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="442" cy="365" r="9" fill="#4682B4"/>
  <circle cx="442" cy="365" r="5" fill="#1a1a2e"/>
  <circle cx="438" cy="361" r="2.5" fill="white"/>
  
  <!-- Glasses (signature round frames) -->
  <circle cx="360" cy="365" r="30" fill="none" stroke="#222" stroke-width="3.5"/>
  <circle cx="440" cy="365" r="30" fill="none" stroke="#222" stroke-width="3.5"/>
  <!-- Bridge -->
  <path d="M390 365 Q400 355 410 365" fill="none" stroke="#222" stroke-width="3"/>
  <!-- Temple arms -->
  <path d="M330 362 Q310 360 290 365" fill="none" stroke="#222" stroke-width="2.5"/>
  <path d="M470 362 Q490 360 510 365" fill="none" stroke="#222" stroke-width="2.5"/>
  
  <!-- Nose -->
  <path d="M400 385 Q395 410 388 425 Q395 430 400 428 Q405 430 412 425 Q405 410 400 385" 
        fill="none" stroke="#DEB887" stroke-width="1.5"/>
  
  <!-- Mouth (open, biting hamburger) -->
  <path d="M370 455 Q385 470 400 472 Q415 470 430 455" fill="#8B0000" stroke="#5a0000" stroke-width="1"/>
  <path d="M375 458 Q400 468 425 458" fill="white" stroke="none"/>
  <!-- Teeth hint -->
  <rect x="385" y="455" width="8" height="6" fill="white" rx="1"/>
  <rect x="397" y="455" width="8" height="6" fill="white" rx="1"/>
  <rect x="409" y="455" width="8" height="6" fill="white" rx="1"/>
  
  <!-- Lips -->
  <path d="M368 453 Q385 445 400 448 Q415 445 432 453" fill="none" stroke="#CD5C5C" stroke-width="1.5"/>
  <path d="M370 455 Q400 475 430 455" fill="none" stroke="#CD5C5C" stroke-width="1"/>
  
  <!-- Left arm reaching to hamburger -->
  <path d="M280 650 Q250 600 260 540 Q270 500 310 470 Q340 450 370 455" 
        fill="url(#skinGrad)" stroke="#DEB887" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Left hand holding hamburger -->
  <path d="M340 430 Q330 420 335 410 Q345 400 355 410 Q360 415 355 425 Z" 
        fill="url(#skinGrad)" stroke="#DEB887" stroke-width="1"/>
  
  <!-- HAMBURGER -->
  <g transform="translate(320, 370)" filter="url(#shadow)">
    <!-- Bottom bun -->
    <path d="M0 55 Q10 70 70 70 Q130 70 140 55 L138 50 Q70 45 2 50 Z" 
          fill="url(#bunTopGrad)" stroke="#B8860B" stroke-width="1"/>
    
    <!-- Meat patty -->
    <ellipse cx="70" cy="45" rx="65" ry="10" fill="url(#meatGrad)" stroke="#5C3317" stroke-width="0.5"/>
    
    <!-- Cheese (melting over edges) -->
    <path d="M10 42 Q20 38 35 40 Q50 36 70 38 Q90 36 105 40 Q120 38 130 42 
             L132 48 Q128 52 125 48 Q110 44 90 46 Q70 42 50 46 Q30 44 15 48 Q12 52 8 48 Z" 
          fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
    
    <!-- Lettuce -->
    <path d="M5 38 Q15 28 30 35 Q40 25 55 33 Q65 23 80 32 Q90 22 105 30 Q115 25 130 35 Q138 30 135 38 
             Q120 42 100 38 Q80 42 60 38 Q40 42 20 38 Q8 42 5 38 Z" 
          fill="url(#lettuceGrad)" stroke="#4CAF50" stroke-width="0.5"/>
    
    <!-- Tomato slice -->
    <ellipse cx="70" cy="28" rx="55" ry="8" fill="#FF4444" stroke="#CC0000" stroke-width="0.5" opacity="0.9"/>
    
    <!-- Top bun -->
    <path d="M5 25 Q5 -5 70 -5 Q135 -5 135 25 Q120 30 70 30 Q20 30 5 25 Z" 
          fill="url(#bunTopGrad)" stroke="#B8860B" stroke-width="1"/>
    
    <!-- Sesame seeds on top bun -->
    <ellipse cx="45" cy="5" rx="4" ry="2.5" fill="#FFFACD" transform="rotate(-15 45 5)"/>
    <ellipse cx="70" cy="0" rx="4" ry="2.5" fill="#FFFACD" transform="rotate(10 70 0)"/>
    <ellipse cx="95" cy="5" rx="4" ry="2.5" fill="#FFFACD" transform="rotate(20 95 5)"/>
    <ellipse cx="55" cy="-2" rx="3.5" ry="2" fill="#FFFACD" transform="rotate(-5 55 -2)"/>
    <ellipse cx="85" cy="-2" rx="3.5" ry="2" fill="#FFFACD" transform="rotate(5 85 -2)"/>
  </g>
  
  <!-- Right arm / hand with ketchup -->
  <path d="M520 650 Q550 600 540 540 Q530 500 500 480 Q475 465 450 470" 
        fill="url(#skinGrad)" stroke="#DEB887" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Right hand holding ketchup bottle -->
  <path d="M455 465 Q465 455 475 460 Q480 470 470 478 Q460 475 455 465 Z" 
        fill="url(#skinGrad)" stroke="#DEB887" stroke-width="1"/>
  
  <!-- Ketchup bottle -->
  <g transform="translate(458, 430)">
    <rect x="0" y="15" width="20" height="40" rx="3" fill="#CC0000" stroke="#990000" stroke-width="1"/>
    <rect x="5" y="0" width="10" height="18" rx="2" fill="#CC0000" stroke="#990000" stroke-width="1"/>
    <rect x="7" y="-5" width="6" height="8" rx="1" fill="#990000"/>
    <!-- Label -->
    <rect x="3" y="22" width="14" height="18" rx="1" fill="white" opacity="0.9"/>
    <text x="10" y="33" font-size="5" text-anchor="middle" fill="#CC0000" font-weight="bold">K</text>
  </g>
  
  <!-- Wrapping paper (Burger King style) -->
  <g transform="translate(250, 500)" opacity="0.8">
    <path d="M0 20 Q5 0 30 5 Q60 -5 90 5 Q115 0 120 20 L115 55 Q60 50 5 55 Z" 
          fill="#1a1a2e" stroke="#FFD700" stroke-width="1"/>
    <text x="60" y="35" font-size="12" text-anchor="middle" fill="#FFD700" font-family="Arial" font-weight="bold">BK</text>
  </g>
  
  <!-- Pop art comic-style speech element -->
  <g transform="translate(550, 250)">
    <path d="M0 0 Q-10 -30 15 -45 Q30 -55 55 -50 Q80 -45 85 -20 Q90 5 70 15 Q50 20 40 15 
             L25 35 L20 15 Q5 20 -5 10 Q-15 0 0 0 Z" 
          fill="white" stroke="#222" stroke-width="2.5"/>
    <text x="40" y="-18" font-size="11" text-anchor="middle" fill="#222" font-family="Arial" font-weight="bold">
      <tspan x="40" dy="0">My name is</tspan>
      <tspan x="40" dy="15">Andy Warhol</tspan>
    </text>
  </g>
  
  <!-- Pop art color burst elements -->
  <circle cx="100" cy="150" r="30" fill="#FF1493" opacity="0.3"/>
  <circle cx="700" cy="200" r="25" fill="#00CED1" opacity="0.3"/>
  <circle cx="150" cy="750" r="35" fill="#FF6347" opacity="0.25"/>
  <circle cx="680" cy="700" r="28" fill="#9370DB" opacity="0.25"/>
  
  <!-- Stars / pop art decorations -->
  <polygon points="120,100 125,115 140,115 128,125 133,140 120,130 107,140 112,125 100,115 115,115" 
           fill="#FFD700" opacity="0.6"/>
  <polygon points="680,130 684,142 697,142 687,150 691,162 680,154 669,162 673,150 663,142 676,142" 
           fill="#FF1493" opacity="0.5"/>
  <polygon points="100,680 105,695 120,695 108,705 113,720 100,710 87,720 92,705 80,695 95,695" 
           fill="#00CED1" opacity="0.5"/>
  
  <!-- Signature -->
  <text x="650" y="850" font-size="18" fill="#222" font-family="Georgia, serif" font-style="italic">
    Andy Warhol
  </text>
  <text x="650" y="870" font-size="11" fill="#555" font-family="Arial">
    "I just finished eating a hamburger"
  </text>
  
  <!-- Year stamp -->
  <text x="80" y="860" font-size="14" fill="#888" font-family="Arial">
    1982
  </text>
</svg>