<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-labelledby="title desc">
  <title id="title">Andy Warhol Eating a Hamburger</title>
  <desc id="desc">A stylized pop-art SVG portrait of Andy Warhol with silver hair, glasses, and a hamburger near his mouth.</desc>

  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4" fill="#ffea00" opacity="0.85"/>
      <circle cx="21" cy="21" r="4" fill="#00d4ff" opacity="0.85"/>
    </pattern>

    <linearGradient id="burgerBun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8c46a"/>
      <stop offset="100%" stop-color="#d9892f"/>
    </linearGradient>

    <linearGradient id="hairSilver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d7d7d7"/>
      <stop offset="100%" stop-color="#8f8f8f"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Pop-art background -->
  <rect width="800" height="600" fill="#ff2e9a"/>
  <rect x="0" y="0" width="400" height="300" fill="#17e9e0"/>
  <rect x="400" y="300" width="400" height="300" fill="#ffe600"/>
  <rect x="0" y="300" width="400" height="300" fill="#7b2cff"/>
  <rect width="800" height="600" fill="url(#dots)" opacity="0.35"/>

  <!-- Comic burst -->
  <g transform="translate(610 110)">
    <polygon points="0,-80 20,-25 80,-45 35,0 85,35 25,25 15,85 -15,30 -80,55 -35,5 -90,-30 -25,-25"
             fill="#ffffff" stroke="#111" stroke-width="5"/>
    <text x="0" y="10" text-anchor="middle"
          font-family="Arial Black, Impact, sans-serif"
          font-size="32" fill="#111">YUM!</text>
  </g>

  <!-- Body -->
  <g filter="url(#shadow)">
    <path d="M270 520 C285 405 340 360 405 360 C475 360 535 410 555 520 Z"
          fill="#111"/>
    <path d="M330 520 L370 390 L430 390 L485 520 Z" fill="#222"/>
    <path d="M382 390 L408 390 L415 520 L372 520 Z" fill="#f3f3f3" opacity="0.12"/>
  </g>

  <!-- Neck -->
  <path d="M365 330 C365 365 375 385 405 385 C435 385 448 362 447 330 Z"
        fill="#ffd6c9" stroke="#111" stroke-width="3"/>

  <!-- Hair silhouette -->
  <g filter="url(#shadow)">
    <path d="M285 215
             C260 165 290 95 355 80
             C390 35 470 45 500 90
             C560 105 575 175 545 225
             C570 285 525 345 465 352
             C410 390 320 360 302 300
             C270 285 265 245 285 215 Z"
          fill="url(#hairSilver)" stroke="#111" stroke-width="5"/>

    <!-- Hair wisps -->
    <path d="M320 150 C345 105 390 108 410 130" fill="none" stroke="#777" stroke-width="4"/>
    <path d="M430 105 C475 105 505 135 507 178" fill="none" stroke="#777" stroke-width="4"/>
    <path d="M300 230 C325 205 350 205 368 225" fill="none" stroke="#777" stroke-width="4"/>
    <path d="M480 220 C510 205 535 215 548 240" fill="none" stroke="#777" stroke-width="4"/>
  </g>

  <!-- Face -->
  <ellipse cx="410" cy="230" rx="104" ry="126"
           fill="#ffd6c9" stroke="#111" stroke-width="5"/>

  <!-- Ears -->
  <ellipse cx="300" cy="235" rx="22" ry="38" fill="#ffc4b4" stroke="#111" stroke-width="4"/>
  <ellipse cx="520" cy="235" rx="22" ry="38" fill="#ffc4b4" stroke="#111" stroke-width="4"/>

  <!-- Glasses -->
  <g fill="none" stroke="#111" stroke-width="6">
    <circle cx="370" cy="215" r="35"/>
    <circle cx="450" cy="215" r="35"/>
    <path d="M405 215 L415 215"/>
    <path d="M335 210 C318 205 310 210 300 220"/>
    <path d="M485 210 C504 205 512 210 522 220"/>
  </g>

  <!-- Eyes -->
  <circle cx="370" cy="218" r="5" fill="#111"/>
  <circle cx="450" cy="218" r="5" fill="#111"/>

  <!-- Nose -->
  <path d="M410 225 C398 255 400 275 418 278" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <path d="M395 285 C408 292 422 290 432 282" fill="none" stroke="#111" stroke-width="3" opacity="0.5"/>

  <!-- Mouth eating -->
  <path d="M372 315 C395 337 430 337 453 315"
        fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="413" cy="315" rx="32" ry="13" fill="#5b1111" opacity="0.9"/>
  <path d="M390 308 C404 316 422 316 438 308" fill="none" stroke="#fff0e8" stroke-width="4" stroke-linecap="round"/>

  <!-- Cheek marks -->
  <path d="M330 265 C350 258 362 260 375 272" fill="none" stroke="#e88d8d" stroke-width="4" stroke-linecap="round"/>
  <path d="M445 272 C462 258 478 258 495 266" fill="none" stroke="#e88d8d" stroke-width="4" stroke-linecap="round"/>

  <!-- Arm and hand -->
  <path d="M515 415 C570 385 615 345 650 298"
        fill="none" stroke="#111" stroke-width="46" stroke-linecap="round"/>
  <path d="M515 415 C570 385 615 345 650 298"
        fill="none" stroke="#ffd6c9" stroke-width="34" stroke-linecap="round"/>

  <g transform="translate(640 292) rotate(-18)">
    <ellipse cx="0" cy="0" rx="35" ry="25" fill="#ffd6c9" stroke="#111" stroke-width="4"/>
    <path d="M-25 -5 C-45 -18 -53 -2 -38 12" fill="#ffd6c9" stroke="#111" stroke-width="4"/>
    <path d="M-8 -22 C-20 -44 -2 -50 8 -28" fill="#ffd6c9" stroke="#111" stroke-width="4"/>
  </g>

  <!-- Hamburger near mouth -->
  <g transform="translate(594 255) rotate(-12)" filter="url(#shadow)">
    <!-- top bun with bite -->
    <path d="M-78 2
             C-68 -50 65 -55 86 0
             L50 10
             C42 -4 27 -6 19 3
             C10 14 -4 13 -13 4
             C-25 -8 -40 -6 -48 8
             Z"
          fill="url(#burgerBun)" stroke="#111" stroke-width="4"/>
    <!-- sesame seeds -->
    <g fill="#fff8d6">
      <ellipse cx="-45" cy="-22" rx="6" ry="3" transform="rotate(20 -45 -22)"/>
      <ellipse cx="-10" cy="-32" rx="6" ry="3" transform="rotate(-15 -10 -32)"/>
      <ellipse cx="25" cy="-24" rx="6" ry="3" transform="rotate(18 25 -24)"/>
      <ellipse cx="55" cy="-10" rx="6" ry="3" transform="rotate(-20 55 -10)"/>
    </g>

    <!-- lettuce -->
    <path d="M-80 9 C-62 25 -52 -2 -34 13 C-18 28 -5 0 12 15 C30 32 43 2 60 16 C72 27 82 15 88 10"
          fill="none" stroke="#38c64a" stroke-width="12" stroke-linecap="round"/>

    <!-- cheese -->
    <path d="M-78 18 L83 18 L63 45 L35 30 L10 50 L-15 30 L-42 47 Z"
          fill="#ffd92e" stroke="#111" stroke-width="3"/>

    <!-- patty -->
    <rect x="-82" y="35" width="170" height="30" rx="12" fill="#5b2b16" stroke="#111" stroke-width="4"/>

    <!-- bottom bun -->
    <path d="M-75 61 C-45 93 47 93 83 60 Z"
          fill="#d9892f" stroke="#111" stroke-width="4"/>
  </g>

  <!-- Caption -->
  <text x="400" y="565" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="42"
        fill="#111"
        stroke="#fff"
        stroke-width="3"
        paint-order="stroke">
    ANDY + BURGER
  </text>
</svg>