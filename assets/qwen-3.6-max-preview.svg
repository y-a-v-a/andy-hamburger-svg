<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="500" fill="#FF6B6B"/>
  
  <!-- Pop art color blocks -->
  <polygon points="0,0 400,0 400,180 0,250" fill="#FFD166" opacity="0.25"/>
  <polygon points="0,320 400,280 400,500 0,500" fill="#06D6A0" opacity="0.2"/>
  
  <!-- Neck -->
  <rect x="165" y="250" width="30" height="45" fill="#F5D0C5" stroke="#000" stroke-width="3"/>
  
  <!-- Shirt -->
  <path d="M110 285 L250 285 L270 360 L90 360 Z" fill="#118AB2" stroke="#000" stroke-width="3"/>
  <line x1="180" y1="285" x2="180" y2="360" stroke="#000" stroke-width="2"/>
  
  <!-- Head -->
  <ellipse cx="180" cy="170" rx="75" ry="95" fill="#F5D0C5" stroke="#000" stroke-width="3"/>
  
  <!-- Iconic Wig/Hair -->
  <path d="M105 155 Q110 85 180 80 Q250 85 255 155 Q260 175 240 185 L120 185 Q100 175 105 155 Z" fill="#E8D6A8" stroke="#000" stroke-width="3"/>
  <path d="M115 165 Q120 100 180 95 Q240 100 245 165" fill="none" stroke="#000" stroke-width="2" opacity="0.3"/>
  
  <!-- Glasses -->
  <circle cx="145" cy="165" r="28" fill="#A8DADC" stroke="#000" stroke-width="3"/>
  <circle cx="215" cy="165" r="28" fill="#A8DADC" stroke="#000" stroke-width="3"/>
  <line x1="173" y1="165" x2="187" y2="165" stroke="#000" stroke-width="3"/>
  <line x1="117" y1="165" x2="95" y2="155" stroke="#000" stroke-width="3"/>
  <line x1="243" y1="165" x2="265" y2="155" stroke="#000" stroke-width="3"/>
  
  <!-- Eyes -->
  <circle cx="145" cy="165" r="4" fill="#000"/>
  <circle cx="215" cy="165" r="4" fill="#000"/>
  
  <!-- Nose -->
  <path d="M180 185 L175 205 L185 205 Z" fill="#E8B4A8" stroke="#000" stroke-width="2"/>
  
  <!-- Mouth -->
  <path d="M165 225 Q180 240 195 225" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Arm -->
  <path d="M250 310 Q290 330 310 290 Q320 270 300 260 Q280 250 270 280 Z" fill="#F5D0C5" stroke="#000" stroke-width="3"/>
  
  <!-- Hamburger Group -->
  <g transform="translate(285, 245)">
    <!-- Bottom Bun -->
    <path d="M-35 15 Q-35 30 0 30 Q35 30 35 15 L35 5 L-35 5 Z" fill="#D4A373" stroke="#000" stroke-width="2"/>
    <!-- Patty -->
    <rect x="-32" y="-8" width="64" height="13" rx="4" fill="#5C3A21" stroke="#000" stroke-width="2"/>
    <!-- Lettuce -->
    <path d="M-36 -8 Q-18 -18 0 -8 Q18 -18 36 -8 L36 -3 L-36 -3 Z" fill="#4A7C59" stroke="#000" stroke-width="2"/>
    <!-- Top Bun -->
    <path d="M-35 -12 Q-35 -28 0 -28 Q35 -28 35 -12 L35 -7 L-35 -7 Z" fill="#D4A373" stroke="#000" stroke-width="2"/>
    <!-- Sesame Seeds -->
    <ellipse cx="-15" cy="-18" rx="3" ry="2" fill="#F5E6CA" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="5" cy="-22" rx="3" ry="2" fill="#F5E6CA" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="20" cy="-16" rx="3" ry="2" fill="#F5E6CA" stroke="#000" stroke-width="1.5"/>
    <!-- Bite Mark (matches background to simulate missing piece) -->
    <path d="M-10 -24 Q0 -28 8 -20 Q12 -12 6 -6 L-12 -6 Z" fill="#FF6B6B" stroke="none"/>
  </g>
  
  <!-- Screen-print misregistration effect (Warhol style) -->
  <ellipse cx="183" cy="173" rx="75" ry="95" fill="#FFD166" opacity="0.15" stroke="none"/>
  <circle cx="148" cy="168" r="28" fill="#FF6B6B" opacity="0.12" stroke="none"/>
  <circle cx="218" cy="168" r="28" fill="#06D6A0" opacity="0.12" stroke="none"/>
  
  <!-- Pop Art Title -->
  <text x="200" y="475" font-family="Impact, Arial, sans-serif" font-size="22" font-weight="bold" fill="#000" text-anchor="middle" opacity="0.9">ANDY EATS</text>
</svg>