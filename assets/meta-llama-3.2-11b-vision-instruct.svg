<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="400" fill="#fcf8f8" rx="10" />

  <!-- Andy Warhol -->
  <g id="andy">
    <circle cx="200" cy="200" r="50" fill="#fff" />
    <path d="M 180 170 C 190 180 210 180 220 170" stroke="#333" fill="#333" stroke-width="2" />
    <ellipse cx="220" cy="180" rx="20" ry="30" fill="#333" />
    <path d="M 220 210 C 220 230 200 230 200 240" stroke="#333" fill="#333" stroke-width="2" />
  </g>

  <!-- Hamburger -->
  <g id="hamburger">
    <rect x="100" y="150" width="40" height="30" fill="#333" rx="2" />
    <rect x="140" y="160" width="30" height="20" fill="#fff" rx="2" />
    <rect x="140" y="200" width="30" height="20" fill="#333" rx="2" />
    <circle cx="168" cy="160" r="2" fill="#333" />
    <path d="M 168 184 C 168 206 148 206 148 184" stroke="#333" fill="#333" stroke-width="2" />
  </g>

  <!-- Eating motion -->
  <g id="eating">
    <path d="M 220 210 C 220 230 250 230 250 240" stroke="#333" fill="#333" stroke-width="2" />
  </g>
</svg>