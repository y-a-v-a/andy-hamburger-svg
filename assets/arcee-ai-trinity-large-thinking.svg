<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f0f0"/>
  
  <!-- Table -->
  <rect x="20" y="120" width="160" height="60" fill="#8b4513" rx="5"/>
  
  <!-- Hamburger -->
  <g transform="translate(100, 130)">
    <!-- Top bun -->
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="#ffd59e"/>
    <!-- Sesame seeds -->
    <circle cx="-30" cy="-5" r="2" fill="#fff"/>
    <circle cx="-15" cy="-8" r="2" fill="#fff"/>
    <circle cx="0" cy="-6" r="2" fill="#fff"/>
    <circle cx="15" cy="-8" r="2" fill="#fff"/>
    <circle cx="30" cy="-5" r="2" fill="#fff"/>
    <!-- Lettuce -->
    <ellipse cx="0" cy="10" rx="45" ry="5" fill="#7cfc00" transform="rotate(-10)"/>
    <!-- Patty -->
    <ellipse cx="0" cy="22" rx="40" ry="8" fill="#8b4513"/>
    <!-- Cheese -->
    <ellipse cx="0" cy="30" rx="42" ry="5" fill="#ffd700"/>
    <!-- Bottom bun -->
    <ellipse cx="0" cy="40" rx="40" ry="12" fill="#ffd59e"/>
  </g>
  
  <!-- Andy Warhol -->
  <g transform="translate(70, 80)">
    <!-- Face shape -->
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="#ffe0bd"/>
    
    <!-- Hair (white shock) -->
    <path d="M-35 -20 Q-30 -50 0 -40 Q30 -50 35 -20" fill="#f5f5f5"/>
    
    <!-- Glasses -->
    <circle cx="-15" cy="10" r="12" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="15" cy="10" r="12" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="-3" y1="10" x2="3" y2="10" stroke="#333" stroke-width="2"/>
    
    <!-- Eyes -->
    <circle cx="-15" cy="10" r="4" fill="#333"/>
    <circle cx="15" cy="10" r="4" fill="#333"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="25" rx="5" ry="8" fill="#ffe0bd"/>
    
    <!-- Mouth (eating) -->
    <ellipse cx="0" cy="40" rx="15" ry="4" fill="#ff6b6b"/>
    
    <!-- Hand holding burger -->
    <ellipse cx="45" cy="30" rx="15" ry="10" fill="#ffe0bd"/>
    <ellipse cx="55" cy="35" rx="12" ry="8" fill="#ffe0bd"/>
    <rect x="30" y="20" width="30" height="20" fill="#8b4513" rx="5"/>
  </g>
  
  <!-- Thought bubble (Campbell's soup can reference) -->
  <ellipse cx="150" cy="40" rx="30" ry="20" fill="none" stroke="#333" stroke-width="2" transform="rotate(-20, 150, 40)"/>
  <text x="150" y="43" font-family="Arial" font-size="10" text-anchor="middle" fill="#333" transform="rotate(-20, 150, 43)">SOUP</text>
</svg>