<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background in Warhol's vibrant style -->
  <rect width="600" height="600" fill="#FF6B8B"/>
  
  <!-- Warhol's iconic white hair -->
  <path d="M200,100 C150,50 100,80 150,150 C100,200 180,220 250,180 C320,220 400,200 350,150 C400,80 350,50 300,100 C250,50 200,80 200,100 Z" fill="#FFFFFF"/>
  
  <!-- Face -->
  <ellipse cx="300" cy="250" rx="100" ry="120" fill="#F8D0A8"/>
  
  <!-- Sunglasses -->
  <rect x="230" y="240" width="140" height="50" rx="5" fill="#1a1a1a"/>
  <ellipse cx="270" cy="265" rx="40" ry="25" fill="#1a1a1a"/>
  <ellipse cx="330" cy="265" rx="40" ry="25" fill="#1a1a1a"/>
  <rect x="310" y="265" width="40" height="25" fill="#1a1a1a"/>
  
  <!-- Sunglass reflection -->
  <ellipse cx="260" cy="260" rx="15" ry="10" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="320" cy="260" rx="15" ry="10" fill="#ffffff" opacity="0.6"/>
  
  <!-- Nose -->
  <path d="M300 280 L290 310 L310 310 Z" fill="#E8B890"/>
  
  <!-- Mouth with hamburger bite -->
  <g transform="translate(280, 340)">
    <!-- Open mouth -->
    <ellipse cx="20" cy="0" rx="25" ry="15" fill="#5C4033"/>
    
    <!-- Hamburger being eaten -->
    <g transform="translate(40, -5)">
      <!-- Top bun -->
      <ellipse cx="0" cy="-20" rx="40" ry="15" fill="#F0B27A"/>
      <rect x="-40" y="-15" width="80" height="10" fill="#F0B27A"/>
      
      <!-- Patty -->
      <rect x="-35" y="-5" width="70" height="12" fill="#8B4513"/>
      
      <!-- Cheese -->
      <path d="M-35 7 L35 7 L30 15 L-30 15 Z" fill="#FFD700"/>
      
      <!-- Lettuce -->
      <path d="M-35 19 Q-20 25 0 27 Q20 25 35 19 L30 27 Q20 33 0 35 Q-20 33 -30 27 Z" fill="#90EE90"/>
      
      <!-- Bottom bun -->
      <ellipse cx="0" cy="40" rx="40" ry="15" fill="#F0B27A"/>
      <rect x="-40" y="30" width="80" height="10" fill="#F0B27A"/>
      
      <!-- Bite taken out -->
      <path d="M-30 -25 Q-20 -35 0 -37 Q20 -35 30 -25 L25 -20 Q15 -30 0 -32 Q-15 -30 -25 -20 Z" fill="#FF6B8B"/>
    </g>
  </g>
  
  <!-- Warhol's collar -->
  <path d="M250 380 L350 380 L380 420 L220 420 Z" fill="#FF0000"/>
  
  <!-- Campbell's Soup can reference -->
  <rect x="100" y="450" width="80" height="120" fill="#FF0000"/>
  <rect x="105" y="455" width="70" height="110" fill="#FFFFFF"/>
  <text x="140" y="520" font-family="Arial" font-size="14" fill="#FF0000" text-anchor="middle">CAMPBELL'S</text>
  
  <!-- Brillo Box reference -->
  <rect x="420" y="450" width="80" height="120" fill="#FFFF00"/>
  <rect x="425" y="455" width="70" height="110" fill="#FFFFFF"/>
  <text x="460" y="520" font-family="Arial" font-size="14" fill="#000000" text-anchor="middle">BRILLO</text>
  
  <!-- Pop art dots background -->
  <circle cx="100" cy="100" r="15" fill="#00FFFF" opacity="0.3"/>
  <circle cx="500" cy="100" r="15" fill="#00FF00" opacity="0.3"/>
  <circle cx="100" cy="500" r="15" fill="#FFFF00" opacity="0.3"/>
  <circle cx="500" cy="500" r="15" fill="#FF00FF" opacity="0.3"/>
  
  <!-- Signature style text -->
  <text x="300" y="580" font-family="'Courier New', monospace" font-size="24" fill="#000000" text-anchor="middle" font-weight="bold">WARHOL</text>
  
  <!-- Speech bubble with pop art quote -->
  <path d="M400 200 Q450 180 500 200 Q520 220 480 240 Q460 260 400 250 Q420 230 400 200 Z" fill="#FFFFFF"/>
  <text x="450" y="225" font-family="Arial" font-size="12" fill="#000000" text-anchor="middle">"Mmm... Art!"</text>
  
  <!-- Camera reference (Warhol was always photographing) -->
  <rect x="50" y="200" width="60" height="40" fill="#333333"/>
  <circle cx="80" cy="220" r="15" fill="#000000"/>
  <circle cx="80" cy="220" r="8" fill="#666666"/>
  <rect x="85" y="215" width="20" height="10" fill="#333333"/>
</svg>
