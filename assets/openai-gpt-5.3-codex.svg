<svg width="900" height="900" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pop-art background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4fd8"/>
      <stop offset="50%" stop-color="#7a5cff"/>
      <stop offset="100%" stop-color="#21d4fd"/>
    </linearGradient>

    <!-- Skin tone -->
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd9b3"/>
      <stop offset="100%" stop-color="#ffbf8a"/>
    </linearGradient>

    <!-- Hair/silver wig gradient -->
    <linearGradient id="wigGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f2f2f2"/>
      <stop offset="50%" stop-color="#cfcfcf"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Bun gradients -->
    <linearGradient id="bunTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcd77"/>
      <stop offset="100%" stop-color="#e89d3c"/>
    </linearGradient>
    <linearGradient id="bunBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7b55d"/>
      <stop offset="100%" stop-color="#d6892f"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="900" fill="url(#bgGrad)"/>

  <!-- Pop-art dots -->
  <g opacity="0.18" fill="#fff">
    <circle cx="90" cy="110" r="10"/><circle cx="160" cy="90" r="8"/><circle cx="230" cy="120" r="12"/>
    <circle cx="740" cy="140" r="10"/><circle cx="800" cy="110" r="8"/><circle cx="860" cy="150" r="12"/>
    <circle cx="100" cy="760" r="10"/><circle cx="180" cy="790" r="8"/><circle cx="260" cy="760" r="12"/>
    <circle cx="700" cy="760" r="10"/><circle cx="780" cy="790" r="8"/><circle cx="860" cy="760" r="12"/>
  </g>

  <!-- Framed panel -->
  <rect x="90" y="90" width="720" height="720" rx="24" fill="#111" opacity="0.2"/>
  <rect x="105" y="105" width="690" height="690" rx="20" fill="#ffe94a" filter="url(#softShadow)"/>

  <!-- Shoulders / shirt -->
  <path d="M230 700 Q450 560 670 700 L670 795 L230 795 Z" fill="#101820"/>
  <path d="M310 700 Q450 610 590 700 L590 795 L310 795 Z" fill="#f92c85"/>

  <!-- Neck -->
  <rect x="405" y="560" width="90" height="90" rx="24" fill="url(#skinGrad)"/>

  <!-- Face -->
  <ellipse cx="450" cy="470" rx="155" ry="180" fill="url(#skinGrad)" stroke="#1b1b1b" stroke-width="5"/>

  <!-- Wig (iconic silver hair) -->
  <path d="
    M295 440
    Q300 295 420 265
    Q450 225 495 255
    Q620 280 605 450
    Q580 410 545 400
    Q520 340 470 350
    Q430 315 385 355
    Q340 360 315 420 Z"
    fill="url(#wigGrad)" stroke="#111" stroke-width="5"/>

  <!-- Hair spikes -->
  <path d="M355 305 L340 250 L385 290 Z" fill="#ececec" stroke="#111" stroke-width="4"/>
  <path d="M430 275 L420 220 L470 270 Z" fill="#f8f8f8" stroke="#111" stroke-width="4"/>
  <path d="M510 285 L540 230 L550 295 Z" fill="#e7e7e7" stroke="#111" stroke-width="4"/>

  <!-- Sunglasses -->
  <rect x="350" y="430" width="95" height="55" rx="12" fill="#121212" stroke="#000" stroke-width="4"/>
  <rect x="455" y="430" width="95" height="55" rx="12" fill="#121212" stroke="#000" stroke-width="4"/>
  <rect x="445" y="450" width="20" height="10" rx="4" fill="#000"/>
  <g opacity="0.35" fill="#5ee2ff">
    <rect x="362" y="440" width="30" height="10" rx="4"/>
    <rect x="467" y="440" width="30" height="10" rx="4"/>
  </g>

  <!-- Nose -->
  <path d="M450 500 Q440 530 455 545" fill="none" stroke="#8f5f3f" stroke-width="4" stroke-linecap="round"/>

  <!-- Mouth open (about to bite) -->
  <path d="M395 585 Q450 620 520 575 Q458 640 395 585 Z" fill="#92204a" stroke="#111" stroke-width="4"/>
  <path d="M400 585 Q450 602 505 575" fill="none" stroke="#ff8db5" stroke-width="4" stroke-linecap="round"/>

  <!-- Hamburger near mouth -->
  <g transform="translate(505,560) rotate(-8)" filter="url(#softShadow)">
    <!-- Top bun -->
    <ellipse cx="95" cy="40" rx="110" ry="52" fill="url(#bunTop)" stroke="#7a4a1f" stroke-width="4"/>
    <!-- Sesame seeds -->
    <g fill="#ffeabf">
      <ellipse cx="45" cy="25" rx="6" ry="3"/><ellipse cx="70" cy="18" rx="6" ry="3"/>
      <ellipse cx="95" cy="22" rx="6" ry="3"/><ellipse cx="120" cy="18" rx="6" ry="3"/>
      <ellipse cx="145" cy="26" rx="6" ry="3"/><ellipse cx="85" cy="32" rx="6" ry="3"/>
    </g>
    <!-- Lettuce -->
    <path d="M-5 65 Q20 55 40 65 Q60 75 80 65 Q100 55 120 65 Q140 75 165 65 L165 82 L-5 82 Z"
          fill="#63c94f" stroke="#2e7d20" stroke-width="3"/>
    <!-- Cheese -->
    <path d="M10 78 L158 78 L145 98 L80 98 L65 110 L50 98 L10 98 Z"
          fill="#ffd84d" stroke="#b8860b" stroke-width="3"/>
    <!-- Patty -->
    <rect x="-2" y="88" width="170" height="28" rx="10" fill="#6b3d22" stroke="#3f2514" stroke-width="4"/>
    <!-- Bottom bun -->
    <ellipse cx="82" cy="130" rx="92" ry="28" fill="url(#bunBottom)" stroke="#7a4a1f" stroke-width="4"/>
    <!-- Bite mark -->
    <circle cx="10" cy="38" r="18" fill="#ffe94a"/>
    <circle cx="25" cy="28" r="14" fill="#ffe94a"/>
  </g>

  <!-- Hand holding burger -->
  <g transform="translate(470,635) rotate(-8)">
    <path d="M40 20 Q10 30 8 58 Q8 80 24 88 L90 96 Q112 93 117 78 Q122 62 106 52 L74 42 Z"
          fill="#ffbf8a" stroke="#8f5f3f" stroke-width="4"/>
    <rect x="52" y="34" width="18" height="48" rx="9" fill="#ffbf8a" stroke="#8f5f3f" stroke-width="3"/>
    <rect x="69" y="36" width="18" height="48" rx="9" fill="#ffbf8a" stroke="#8f5f3f" stroke-width="3"/>
    <rect x="86" y="38" width="18" height="45" rx="9" fill="#ffbf8a" stroke="#8f5f3f" stroke-width="3"/>
  </g>

  <!-- Caption -->
  <text x="450" y="170" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="42" fill="#111" letter-spacing="2">
    POP LUNCH
  </text>
  <text x="450" y="205" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="18" fill="#111" opacity="0.8">
    stylized homage
  </text>
</svg>