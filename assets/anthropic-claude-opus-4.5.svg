<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Background - Warhol pop art style -->
  <rect width="400" height="500" fill="#FF1493"/>
  
  <!-- Hair - Warhol's iconic white/silver wild hair -->
  <ellipse cx="200" cy="120" rx="95" ry="80" fill="#E8E8E8"/>
  <ellipse cx="130" cy="100" rx="40" ry="50" fill="#E8E8E8"/>
  <ellipse cx="270" cy="100" rx="40" ry="50" fill="#E8E8E8"/>
  <ellipse cx="150" cy="70" rx="35" ry="40" fill="#E8E8E8"/>
  <ellipse cx="250" cy="70" rx="35" ry="40" fill="#E8E8E8"/>
  <ellipse cx="200" cy="60" rx="50" ry="35" fill="#E8E8E8"/>
  
  <!-- Face -->
  <ellipse cx="200" cy="180" rx="70" ry="85" fill="#FDBCB4"/>
  
  <!-- Glasses - Warhol's signature glasses -->
  <ellipse cx="165" cy="160" rx="30" ry="25" fill="none" stroke="#000" stroke-width="4"/>
  <ellipse cx="235" cy="160" rx="30" ry="25" fill="none" stroke="#000" stroke-width="4"/>
  <line x1="195" y1="160" x2="205" y2="160" stroke="#000" stroke-width="4"/>
  <line x1="135" y1="155" x2="120" y2="145" stroke="#000" stroke-width="3"/>
  <line x1="265" y1="155" x2="280" y2="145" stroke="#000" stroke-width="3"/>
  
  <!-- Eyes behind glasses -->
  <ellipse cx="165" cy="162" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="235" cy="162" rx="8" ry="10" fill="#fff"/>
  <circle cx="165" cy="164" r="5" fill="#4A3728"/>
  <circle cx="235" cy="164" r="5" fill="#4A3728"/>
  <circle cx="165" cy="163" r="2" fill="#000"/>
  <circle cx="235" cy="163" r="2" fill="#000"/>
  
  <!-- Eyebrows -->
  <path d="M140 140 Q165 130 190 140" fill="none" stroke="#8B7355" stroke-width="3"/>
  <path d="M210 140 Q235 130 260 140" fill="none" stroke="#8B7355" stroke-width="3"/>
  
  <!-- Nose -->
  <path d="M200 170 L195 200 Q200 208 205 200 L200 170" fill="#E8A090" stroke="#D4968A" stroke-width="1"/>
  
  <!-- Mouth - open, about to eat -->
  <ellipse cx="200" cy="235" rx="25" ry="20" fill="#8B0000"/>
  <path d="M175 235 Q200 225 225 235" fill="none" stroke="#FFB6C1" stroke-width="2"/>
  
  <!-- Teeth -->
  <rect x="182" y="220" width="8" height="8" fill="#fff"/>
  <rect x="192" y="220" width="8" height="8" fill="#fff"/>
  <rect x="202" y="220" width="8" height="8" fill="#fff"/>
  
  <!-- Ears -->
  <ellipse cx="130" cy="180" rx="15" ry="25" fill="#FDBCB4"/>
  <ellipse cx="270" cy="180" rx="15" ry="25" fill="#FDBCB4"/>
  
  <!-- Neck -->
  <rect x="175" y="255" width="50" height="40" fill="#FDBCB4"/>
  
  <!-- Shirt/Collar - black turtleneck Warhol style -->
  <path d="M120 290 Q200 270 280 290 L300 400 L100 400 Z" fill="#000"/>
  <ellipse cx="200" cy="290" rx="50" ry="15" fill="#1a1a1a"/>
  
  <!-- Arms -->
  <path d="M120 320 Q80 350 100 400 L140 420 Q150 380 140 340 Z" fill="#000"/>
  <path d="M280 320 Q320 350 300 400 L260 420 Q250 380 260 340 Z" fill="#000"/>
  
  <!-- Hands -->
  <ellipse cx="140" cy="380" rx="25" ry="20" fill="#FDBCB4"/>
  <ellipse cx="260" cy="380" rx="25" ry="20" fill="#FDBCB4"/>
  
  <!-- Fingers holding burger -->
  <ellipse cx="125" cy="370" rx="8" ry="15" fill="#FDBCB4"/>
  <ellipse cx="140" cy="365" rx="7" ry="18" fill="#FDBCB4"/>
  <ellipse cx="155" cy="370" rx="8" ry="15" fill="#FDBCB4"/>
  <ellipse cx="245" cy="370" rx="8" ry="15" fill="#FDBCB4"/>
  <ellipse cx="260" cy="365" rx="7" ry="18" fill="#FDBCB4"/>
  <ellipse cx="275" cy="370" rx="8" ry="15" fill="#FDBCB4"/>
  
  <!-- Hamburger -->
  <!-- Bottom bun -->
  <ellipse cx="200" cy="340" rx="55" ry="15" fill="#D2691E"/>
  <rect x="145" y="325" width="110" height="15" fill="#D2691E"/>
  
  <!-- Patty -->
  <ellipse cx="200" cy="320" rx="50" ry="12" fill="#4A2C2A"/>
  <ellipse cx="200" cy="318" rx="48" ry="10" fill="#5D3A38"/>
  
  <!-- Cheese -->
  <path d="M145 315 L150 325 L170 315 L190 325 L210 315 L230 325 L250 315 L255 320 L255 310 L145 310 Z" fill="#FFD700"/>
  
  <!-- Lettuce -->
  <path d="M140 308 Q160 315 180 305 Q200 315 220 305 Q240 315 260 308 L260 300 L140 300 Z" fill="#32CD32"/>
  
  <!-- Tomato -->
  <ellipse cx="200" cy="298" rx="45" ry="8" fill="#FF6347"/>
  <ellipse cx="200" cy="296" rx="42" ry="6" fill="#FF4500"/>
  
  <!-- Top bun -->
  <ellipse cx="200" cy="285" rx="55" ry="25" fill="#D2691E"/>
  <ellipse cx="200" cy="280" rx="50" ry="20" fill="#DEB887"/>
  
  <!-- Sesame seeds -->
  <ellipse cx="180" cy="270" rx="4" ry="2" fill="#FFF8DC"/>
  <ellipse cx="200" cy="265" rx="4" ry="2" fill="#FFF8DC"/>
  <ellipse cx="220" cy="270" rx="4" ry="2" fill="#FFF8DC"/>
  <ellipse cx="190" cy="280" rx="4" ry="2" fill="#FFF8DC"/>
  <ellipse cx="210" cy="278" rx="4" ry="2" fill="#FFF8DC"/>
  <ellipse cx="170" cy="278" rx="4" ry="2" fill="#FFF8DC"/>
  <ellipse cx="230" cy="275" rx="4" ry="2" fill="#FFF8DC"/>
  
  <!-- Pop art style border -->
  <rect x="5" y="5" width="390" height="490" fill="none" stroke="#FFFF00" stroke-width="10"/>
  
  <!-- Signature Warhol dots pattern in corner -->
  <circle cx="350" cy="450" r="8" fill="#00FFFF"/>
  <circle cx="370" cy="450" r="8" fill="#FFFF00"/>
  <circle cx="350" cy="470" r="8" fill="#FF00FF"/>
  <circle cx="370" cy="470" r="8" fill="#00FF00"/>
</svg>