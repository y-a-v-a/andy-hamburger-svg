<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#FFB6C1"/>
  
  <!-- Andy's head -->
  <ellipse cx="200" cy="150" rx="70" ry="85" fill="#FDBCB4"/>
  
  <!-- Hair (signature silver/white wig) -->
  <path d="M 130 100 Q 120 80, 140 70 Q 160 60, 180 65 Q 200 50, 220 65 Q 240 60, 260 70 Q 280 80, 270 100" fill="#E5E4E2" stroke="none"/>
  <path d="M 135 110 Q 125 90, 130 100 Q 140 85, 150 90" fill="#D3D3D3" stroke="none"/>
  <path d="M 265 110 Q 275 90, 270 100 Q 260 85, 250 90" fill="#D3D3D3" stroke="none"/>
  
  <!-- Glasses -->
  <circle cx="170" cy="145" r="20" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="230" cy="145" r="20" fill="none" stroke="black" stroke-width="3"/>
  <line x1="190" y1="145" x2="210" y2="145" stroke="black" stroke-width="3"/>
  
  <!-- Eyes -->
  <circle cx="170" cy="145" r="5" fill="black"/>
  <circle cx="230" cy="145" r="5" fill="black"/>
  
  <!-- Nose -->
  <path d="M 200 155 L 195 170 L 205 170 Z" fill="#F4A460"/>
  
  <!-- Mouth (open, eating) -->
  <ellipse cx="200" cy="185" rx="20" ry="15" fill="#8B0000"/>
  
  <!-- Body -->
  <rect x="140" y="230" width="120" height="100" fill="#000000" rx="10"/>
  
  <!-- Arms -->
  <rect x="100" y="250" width="40" height="80" fill="#FDBCB4" rx="20" transform="rotate(-30 120 290)"/>
  <rect x="260" y="250" width="40" height="80" fill="#FDBCB4" rx="20" transform="rotate(30 280 290)"/>
  
  <!-- Hands -->
  <circle cx="150" cy="220" r="20" fill="#FDBCB4"/>
  <circle cx="250" cy="220" r="20" fill="#FDBCB4"/>
  
  <!-- Hamburger -->
  <g transform="translate(200, 210)">
    <!-- Top bun -->
    <ellipse cx="0" cy="-10" rx="30" ry="15" fill="#D2691E"/>
    <circle cx="-10" cy="-15" r="2" fill="#F5DEB3"/>
    <circle cx="5" cy="-12" r="2" fill="#F5DEB3"/>
    <circle cx="10" cy="-18" r="2" fill="#F5DEB3"/>
    
    <!-- Lettuce -->
    <path d="M -30 -5 Q -20 -8, -10 -5 Q 0 -8, 10 -5 Q 20 -8, 30 -5" fill="#90EE90" stroke="none"/>
    
    <!-- Patty -->
    <ellipse cx="0" cy="0" rx="28" ry="8" fill="#8B4513"/>
    
    <!-- Cheese -->
    <rect x="-25" y="2" width="50" height="5" fill="#FFD700"/>
    
    <!-- Bottom bun -->
    <ellipse cx="0" cy="10" rx="30" ry="10" fill="#D2691E"/>
  </g>
  
  <!-- Bite mark in hamburger -->
  <ellipse cx="220" cy="200" rx="15" ry="10" fill="#FFB6C1"/>
  
  <!-- Artist signature style -->
  <text x="320" y="380" font-family="Arial" font-size="20" fill="#FF1493">AW</text>
</svg>