<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f0f0"/>
  
  <!-- Warhol portrait (repeated pattern) -->
  <g transform="translate(100,100)">
    <!-- Face -->
    <circle cx="0" cy="0" r="50" fill="#ffcccc"/>
    
    <!-- Eyes -->
    <circle cx="-15" cy="-10" r="8" fill="#000"/>
    <circle cx="15" cy="-10" r="8" fill="#000"/>
    
    <!-- Mouth -->
    <path d="M -20 20 Q 0 30 20 20" stroke="#000" stroke-width="2" fill="none"/>
    
    <!-- Hair -->
    <rect x="-30" y="-40" width="60" height="15" fill="#ff9900"/>
    
    <!-- Warhol signature text -->
    <text x="0" y="70" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">ANDY WARHOL</text>
  </g>
  
  <!-- Hamburger -->
  <g transform="translate(250,180)">
    <!-- Bun top -->
    <rect x="-30" y="-40" width="60" height="10" fill="#d2b48c" rx="5"/>
    
    <!-- Lettuce -->
    <rect x="-25" y="-30" width="50" height="8" fill="#90ee90" rx="3"/>
    
    <!-- Cheese -->
    <rect x="-25" y="-22" width="50" height="8" fill="#ffd700" rx="3"/>
    
    <!-- Patty -->
    <rect x="-25" y="-14" width="50" height="10" fill="#8b4513" rx="3"/>
    
    <!-- Bun bottom -->
    <rect x="-30" y="0" width="60" height="10" fill="#d2b48c" rx="5"/>
    
    <!-- Pickle -->
    <rect x="-10" y="-10" width="5" height="15" fill="#32cd32" rx="2"/>
  </g>
  
  <!-- Pop Art grid effect -->
  <g stroke="#000" stroke-opacity="0.1" stroke-width="1">
    <line x1="0" y1="0" x2="400" y2="0"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="400" x2="400" y2="400"/>
    <line x1="0" y1="0" x2="0" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
  </g>
  
  <!-- Warhol-style color blocks -->
  <rect x="50" y="50" width="30" height="30" fill="#ff0000" opacity="0.3"/>
  <rect x="150" y="50" width="30" height="30" fill="#00ff00" opacity="0.3"/>
  <rect x="250" y="50" width="30" height="30" fill="#0000ff" opacity="0.3"/>
  <rect x="50" y="150" width="30" height="30" fill="#ffff00" opacity="0.3"/>
  <rect x="150" y="150" width="30" height="30" fill="#ff00ff" opacity="0.3"/>
  <rect x="250" y="150" width="30" height="30" fill="#00ffff" opacity="0.3"/>
</svg>