<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>

  <!-- Andy Warhol's head (stylized cube) -->
  <rect x="50" y="20" width="100" height="120" fill="#ff0000"/>

  <!-- Hair (orange) -->
  <rect x="40" y="10" width="120" height="30" fill="#ffcc00"/>

  <!-- Face -->
  <rect x="50" y="25" width="100" height="100" fill="#ffccaa"/>

  <!-- Eye (left) -->
  <rect x="80" y="50" width="10" height="10" fill="#000000"/>

  <!-- Eye (right) -->
  <rect x="110" y="50" width="10" height="10" fill="#000000"/>

  <!-- Mouth (smile) -->
  <path d="M 80 70 Q 100 80 120 70" stroke="#000000" stroke-width="3" fill="none"/>

  <!-- Hamburger (simplistic) -->
  <circle cx="140" cy="160" r="15" fill="#ffcc00"/> <!-- Top bun -->
  <circle cx="140" cy="160" r="12" fill="#ffffff"/> <!-- Meat/Patty -->
  <circle cx="140" cy="160" r="10" fill="#ffcc00"/> <!-- Bottom bun -->
</svg>