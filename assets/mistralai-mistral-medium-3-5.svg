<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background (Warhol's factory-like gradient) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" />
      <stop offset="50%" stop-color="#4ecdc4" />
      <stop offset="100%" stop-color="#ffe66d" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgGradient)" />

  <!-- Andy Warhol's Face -->
  <g transform="translate(300, 200)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="120" ry="150" fill="#f8f1ff" stroke="#000" stroke-width="3" />

    <!-- Blonde Wig (Warhol's iconic hair) -->
    <path d="M -100,-50 Q -80,-100 -50,-120 Q -20,-140 0,-150 Q 20,-140 50,-120 Q 80,-100 100,-50 Q 120,0 100,50 Q 80,100 50,120 Q 20,140 0,150 Q -20,140 -50,120 Q -80,100 -100,50 Q -120,0 -100,-50 Z"
          fill="#ffd700" stroke="#000" stroke-width="2" />

    <!-- Glasses -->
    <rect x="-60" y="-20" width="50" height="30" rx="5" fill="none" stroke="#000" stroke-width="4" />
    <rect x="10" y="-20" width="50" height="30" rx="5" fill="none" stroke="#000" stroke-width="4" />
    <line x1="-35" y1="-20" x2="-15" y2="-20" stroke="#000" stroke-width="4" />
    <line x1="35" y1="-20" x2="55" y2="-20" stroke="#000" stroke-width="4" />

    <!-- Eyes -->
    <ellipse cx="-40" cy="-20" rx="10" ry="8" fill="#000" />
    <ellipse cx="40" cy="-20" rx="10" ry="8" fill="#000" />

    <!-- Nose -->
    <path d="M 0,-10 L 0,20" stroke="#000" stroke-width="3" fill="none" />
    <ellipse cx="0" cy="20" rx="15" ry="10" fill="#f8d7da" stroke="#000" stroke-width="2" />

    <!-- Mouth (open, eating a burger) -->
    <path d="M -30,60 Q 0,80 30,60" stroke="#000" stroke-width="3" fill="none" />
    <ellipse cx="0" cy="60" rx="25" ry="15" fill="#ff6b6b" />
  </g>

  <!-- Hamburger -->
  <g transform="translate(400, 350)">
    <!-- Bun (top) -->
    <ellipse cx="0" cy="-60" rx="80" ry="30" fill="#f5c842" stroke="#000" stroke-width="2" />

    <!-- Cheese -->
    <ellipse cx="0" cy="-40" rx="70" ry="15" fill="#ffd700" stroke="#000" stroke-width="1" />

    <!-- Patty -->
    <ellipse cx="0" cy="-20" rx="65" ry="12" fill="#8b4513" stroke="#000" stroke-width="1" />

    <!-- Lettuce -->
    <path d="M -50,-5 Q 0,-20 50,-5 Q 0,10 -50,-5" fill="#228b22" stroke="#000" stroke-width="1" />

    <!-- Tomato -->
    <ellipse cx="0" cy="5" rx="40" ry="8" fill="#ff6347" stroke="#000" stroke-width="1" />

    <!-- Bun (bottom) -->
    <ellipse cx="0" cy="20" rx="80" ry="25" fill="#f5c842" stroke="#000" stroke-width="2" />

    <!-- Sesame seeds on top bun -->
    <circle cx="-30" cy="-65" r="2" fill="#fff" />
    <circle cx="-10" cy="-70" r="2" fill="#fff" />
    <circle cx="10" cy="-68" r="2" fill="#fff" />
    <circle cx="30" cy="-65" r="2" fill="#fff" />
    <circle cx="0" cy="-72" r="2" fill="#fff" />
  </g>

  <!-- Hand holding the burger -->
  <g transform="translate(250, 350)">
    <ellipse cx="0" cy="0" rx="20" ry="40" fill="#ffd700" stroke="#000" stroke-width="2" />
    <rect x="-40" y="40" width="80" height="100" rx="10" fill="#ffd700" stroke="#000" stroke-width="2" />
    <circle cx="-30" cy="140" r="15" fill="#ffd700" stroke="#000" stroke-width="2" />
    <circle cx="30" cy="140" r="15" fill="#ffd700" stroke="#000" stroke-width="2" />
  </g>

  <!-- Pop art halftone dots (for effect) -->
  <circle cx="100" cy="100" r="10" fill="#ff6b6b" opacity="0.7" />
  <circle cx="700" cy="500" r="15" fill="#4ecdc4" opacity="0.7" />
  <circle cx="200" cy="500" r="12" fill="#ffe66d" opacity="0.7" />
  <circle cx="600" cy="200" r="8" fill="#ff6b6b" opacity="0.7" />

  <!-- Text (optional) -->
  <text x="50" y="550" font-family="Arial, sans-serif" font-size="24" fill="#000" font-weight="bold">
    Andy Warhol Eats a Burger
  </text>
</svg>