<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f9f9f9" />

  <!-- Andy Warhol's head (simplified, stylized) -->
  <g transform="translate(150, 150)">
    <!-- Face -->
    <circle cx="0" cy="0" r="80" fill="#fff" stroke="#000" stroke-width="4"/>
    
    <!-- Hair (wig) -->
    <path d="M-60,20 Q -100,40 -60,60 Q -20,80 0,60 Q 20,40 60,60 Q 100,80 60,100 Q 20,120 0,100 Q -20,80 -60,60 Z" fill="#ffcc00" stroke="#000" stroke-width="2"/>
    
    <!-- Eyes (two dots) -->
    <circle cx="-30" cy="-30" r="10" fill="#000"/>
    <circle cx="30" cy="-30" r="10" fill="#000"/>
    
    <!-- Eyebrows -->
    <path d="M-40,-25 Q -60,-20 -40,-15" stroke="#000" stroke-width="3" fill="none"/>
    <path d="M30,-25 Q 50,-20 30,-15" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Nose -->
    <path d="M0,-10 L 0,0 L 0,-20" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Mouth (smile) -->
    <path d="M-25,0 Q 0,15 25,0" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Chin -->
    <path d="M-20,20 Q 0,30 20,20" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Hat (like Warhol's) -->
    <path d="M-50,40 Q -100,60 -50,80 Q 0,100 50,80 Q 100,60 50,40 Z" fill="#000" stroke="#000" stroke-width="2"/>
    
    <!-- Warhol's iconic glasses -->
    <path d="M-40,-20 Q -60,-25 -40,-30 Q -20,-35 0,-30 Q 20,-25 40,-20 Z" fill="#000" stroke="#000" stroke-width="2"/>
    <path d="M-30,-25 Q -10,-30 10,-25 Q 30,-20 40,-25 Z" fill="#000" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Hamburger -->
  <g transform="translate(250, 200)">
    <!-- Bottom bun -->
    <rect x="-30" y="-10" width="60" height="20" fill="#e0b000" stroke="#000" stroke-width="2"/>
    
    <!-- Patty -->
    <rect x="-25" y="0" width="50" height="20" fill="#8b0000" stroke="#000" stroke-width="2"/>
    
    <!-- Cheese slice -->
    <rect x="-25" y="10" width="50" height="10" fill="#ffff00" stroke="#000" stroke-width="1"/>
    
    <!-- Top bun -->
    <rect x="-30" y="20" width="60" height="20" fill="#e0b000" stroke="#000" stroke-width="2"/>
    
    <!-- Lettuce -->
    <path d="M-25,10 Q -20,15 -15,10" fill="#00cc00" stroke="#000" stroke-width="1"/>
    <path d="M-20,15 Q -15,20 -10,15" fill="#00cc00" stroke="#000" stroke-width="1"/>
    <path d="M-15,10 Q -10,15 -5,10" fill="#00cc00" stroke="#000" stroke-width="1"/>
    <path d="M-10,15 Q -5,20 0,15" fill="#00cc00" stroke="#000" stroke-width="1"/>
    
    <!-- Tomato -->
    <circle cx="-10" cy="15" r="5" fill="#ff0000" stroke="#000" stroke-width="1"/>
    
    <!-- Pickle -->
    <path d="M-20,18 Q -15,25 -10,18" fill="#008000" stroke="#000" stroke-width="1"/>
  </g>

  <!-- Andy Warhol's hand holding the burger -->
  <g transform="translate(220, 230)">
    <!-- Hand -->
    <path d="M-30,0 Q -40,10 -30,20 Q -20,30 0,20 Q 20,10 30,0 Z" fill="#fff" stroke="#000" stroke-width="2"/>
    <path d="M-30,0 Q -40,10 -30,20 Q -20,30 0,20 Q 20,10 30,0 Z" fill="#000" stroke="#000" stroke-width="1"/>
    <path d="M-20,20 Q -10,25 0,20 Q 10,15 20,20" stroke="#000" stroke-width="3" fill="none"/>
    <path d="M-20,20 Q -10,25 0,20 Q 10,15 20,20" stroke="#000" stroke-width="3" fill="none"/>
    <path d="M-20,20 Q -10,25 0,20 Q 10,15 20,20" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Fingers -->
    <path d="M-25,10 Q -30,15 -25,20" stroke="#000" stroke-width="3" fill="none"/>
    <path d="M-15,10 Q -20,15 -15,20" stroke="#000" stroke-width="3" fill="none"/>
    <path d="M-5,10 Q -10,15 -5,20" stroke="#000" stroke-width="3" fill="none"/>
    <path d="M5,10 Q 10,15 5,20" stroke="#000" stroke-width="3" fill="none"/>
    
    <!-- Hand holding burger -->
    <path d="M-25,20 Q -30,25 -25,30 Q -20,35 -15,30 Q -10,25 -5,30 Q 0,35 5,30 Q 10,25 15,30 Q 20,35 25,30 Q 30,25 35,30" stroke="#000" stroke-width="3" fill="none"/>
  </g>

  <!-- Text (optional, Warhol-style) -->
  <text x="250" y="450" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#000" text-anchor="middle">
    Andy Warhol
  </text>
  <text x="250" y="480" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#000" text-anchor="middle">
    Eating a Hamburger
  </text>
</svg>