<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f0f0"/>
  
  <!-- Warhol's face (simplified) -->
  <circle cx="200" cy="150" r="60" fill="#ffcc99"/>
  
  <!-- Eyes -->
  <circle cx="170" cy="130" r="8" fill="#000"/>
  <circle cx="230" cy="130" r="8" fill="#000"/>
  <circle cx="170" cy="130" r="4" fill="#fff"/>
  <circle cx="230" cy="130" r="4" fill="#fff"/>
  
  <!-- Mouth -->
  <path d="M180,180 Q200,200 220,180" stroke="#000" stroke-width="2" fill="none"/>
  
  <!-- Hamburger -->
  <g transform="translate(250, 170)">
    <!-- Bottom bun -->
    <rect x="-25" y="-10" width="50" height="8" fill="#d2b48c" rx="3"/>
    
    <!-- Lettuce -->
    <rect x="-20" y="-2" width="40" height="3" fill="#90ee90" rx="1"/>
    
    <!-- Cheese -->
    <rect x="-22" y="1" width="44" height="4" fill="#ffd700" rx="2"/>
    
    <!-- Meat patty -->
    <rect x="-24" y="5" width="48" height="5" fill="#a52a2a" rx="2"/>
    
    <!-- Top bun -->
    <rect x="-25" y="10" width="50" height="8" fill="#d2b48c" rx="3"/>
  </g>
  
  <!-- Warhol's signature style - repeated elements -->
  <g opacity="0.3">
    <rect x="10" y="10" width="50" height="50" fill="#ff0000"/>
    <rect x="80" y="10" width="50" height="50" fill="#00ff00"/>
    <rect x="150" y="10" width="50" height="50" fill="#0000ff"/>
  </g>
  
  <!-- Title text -->
  <text x="200" y="350" text-anchor="middle" font-family="Arial" font-size="16" fill="#000">
    ANDY WARHOL EATING HAMBURGER
  </text>
</svg>