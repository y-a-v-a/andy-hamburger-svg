<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="480"
    height="480"
    viewBox="0 0 480 480"
    role="img"
>
  <title>Stylised Andy Warhol eating a hamburger</title>
  <desc>
    A flat, colourful illustration: pale-yellow background; Warhol’s
    distinctive silver hair, sunglasses and black jacket; a hamburger
    held up to his mouth in classic pop-art style.
  </desc>

  <!-- Background -->
  <rect width="480" height="480" fill="#fef9d9"/>

  <!-- Group everything so it can be moved/scaled easily later -->
  <g id="warhol" transform="translate(80,40)">

    <!-- Neck -->
    <rect x="155" y="210" width="70" height="60" fill="#ffdbac"/>

    <!-- Jacket -->
    <path
      d="M120 260
         c-15 130  60 130  60 130
         h80
         c60 0   60-130  45-130
         z"
      fill="#151515"
    />

    <!-- Shirt collar -->
    <path
      d="M180 260 l40 0 l-20 25z"
      fill="#ffffff"
    />

    <!-- Head -->
    <circle cx="190" cy="170" r="80" fill="#ffdbac" stroke="#d3ae8f" stroke-width="2"/>

    <!-- Hair (stylised spikes) -->
    <path
      d="M120 140
         l20 -50 25 25 15 -40 30 30 30 -35 15 40 25 -25 20 50
         q-19  5 -35  0
         q-11 -4 -20 -8
         q-12  5 -25  2
         q-14  5 -28  0
         q-10  4 -20  7
         q-13 -2 -22 -6
         z"
      fill="#d8d8d8"
      stroke="#a0a0a0"
      stroke-width="2"
    />

    <!-- Sunglasses -->
    <g fill="#000000">
      <rect x="145" y="160" width="60" height="30" rx="6"/>
      <rect x="215" y="160" width="60" height="30" rx="6"/>
      <rect x="205" y="165" width="10" height="8"/>
    </g>

    <!-- Mouth (hidden behind burger, small hint) -->
    <path d="M185 205 q10 8 20 0" stroke="#a24a2b" stroke-width="4" fill="none"/>

    <!-- Burger group -->
    <g id="burger" transform="translate(155,195) rotate(-8)">
      <!-- Bottom bun -->
      <ellipse cx="0" cy="40" rx="55" ry="18" fill="#d59a4c"/>
      <!-- Patty -->
      <rect x="-45" y="20" width="90" height="18" rx="8" fill="#6b3b24"/>
      <!-- Lettuce -->
      <path d="M-48 20 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0" fill="#4faf50"/>
      <!-- Top bun -->
      <ellipse cx="0" cy="0" rx="55" ry="18" fill="#e3a858"/>
      <!-- Sesame seeds -->
      <g fill="#fffcea">
        <ellipse cx="-30" cy="-3" rx="3" ry="2"/>
        <ellipse cx="-8"  cy="-6" rx="3" ry="2"/>
        <ellipse cx="20"  cy="-2" rx="3" ry="2"/>
        <ellipse cx="35"  cy="-7" rx="3" ry="2"/>
        <ellipse cx="-18" cy="-10" rx="3" ry="2"/>
        <ellipse cx="5"   cy="-12" rx="3" ry="2"/>
      </g>
    </g>

    <!-- Hand holding burger -->
    <g id="hand" transform="translate(115,225) rotate(-8)">
      <!-- Palm -->
      <rect x="0" y="0" width="65" height="35" rx="12" fill="#ffdbac"/>
      <!-- Thumb -->
      <rect x="60" y="-10" width="20" height="40" rx="10" fill="#ffdbac"/>
      <!-- Fingers -->
      <g>
        <rect x="5"  y="33" width="12" height="28" rx="6" fill="#ffdbac"/>
        <rect x="20" y="35" width="12" height="28" rx="6" fill="#ffdbac"/>
        <rect x="35" y="37" width="12" height="28" rx="6" fill="#ffdbac"/>
        <rect x="50" y="39" width="12" height="28" rx="6" fill="#ffdbac"/>
      </g>
    </g>

  </g>
</svg>