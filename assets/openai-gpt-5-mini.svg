<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Pop-art style portrait of Andy Warhol eating a hamburger</title>
  <desc id="desc">A stylized vector illustration: silver hair, glasses, and a person taking a bite of a hamburger, rendered in bold pop-art colors.</desc>

  <!-- Background: bold pop-art color with halftone pattern -->
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffef6e"/>
      <stop offset="1" stop-color="#ffd1e0"/>
    </linearGradient>

    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="transparent"/>
      <circle cx="6" cy="6" r="2.5" fill="#ffffff" opacity="0.16"/>
      <circle cx="14" cy="14" r="2.5" fill="#ffffff" opacity="0.16"/>
    </pattern>

    <linearGradient id="hairGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f7f8"/>
      <stop offset="1" stop-color="#dcdfe3"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  <rect width="100%" height="100%" fill="url(#dots)" opacity="0.65"/>

  <!-- Framed pop-art colored border -->
  <rect x="30" y="30" width="740" height="740" rx="18" ry="18" fill="none" stroke="#ff4f79" stroke-width="10"/>

  <!-- Shoulders / clothing block (pop-art color block) -->
  <g transform="translate(0,120)">
    <rect x="140" y="420" width="520" height="220" rx="20" fill="#2b78b9" filter="url(#soft)"/>
    <rect x="160" y="440" width="480" height="180" rx="18" fill="#ffed6b"/>
  </g>

  <!-- Head -->
  <g id="portrait" transform="translate(0,70)">
    <!-- neck -->
    <rect x="350" y="350" width="100" height="60" rx="18" fill="#f6d7b0" stroke="#b07b55" stroke-width="2"/>

    <!-- head oval -->
    <ellipse cx="400" cy="260" rx="140" ry="160" fill="#f6d7b0" stroke="#b07b55" stroke-width="3"/>

    <!-- hair cap -->
    <path d="M240 220 C230 110, 320 60, 400 80 C480 60, 570 110, 560 220 C540 210, 520 200, 500 198 C480 195, 470 210, 440 210 C410 210, 392 200, 370 200 C338 200, 310 220, 240 220 Z"
          fill="url(#hairGrad)" stroke="#cfd3d7" stroke-width="2"/>

    <!-- fringe -->
    <path d="M260 240 C300 220, 340 240, 380 230 C420 220, 450 245, 500 240 C475 255, 435 250, 400 250 C360 250, 320 260, 280 250 Z"
          fill="#e9ecef" stroke="#cfd3d7" stroke-width="1"/>

    <!-- glasses -->
    <g transform="translate(0,10)">
      <rect x="290" y="230" width="120" height="66" rx="14" fill="#111" />
      <rect x="390" y="230" width="120" height="66" rx="14" fill="#111" />
      <rect x="380" y="256" width="40" height="8" fill="#111" rx="3"/>
      <!-- lenses -->
      <rect x="300" y="242" width="100" height="40" rx="10" fill="#97e6ff" opacity="0.9"/>
      <rect x="400" y="242" width="100" height="40" rx="10" fill="#97e6ff" opacity="0.9"/>
      <!-- glare -->
      <path d="M320 255 q10 -12 30 -6" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.25"/>
      <path d="M420 255 q10 -12 30 -6" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.25"/>
    </g>

    <!-- nose -->
    <path d="M402 300 q10 18 -6 30" stroke="#b07b55" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- mouth open taking a bite -->
    <g>
      <!-- hand brings burger in front, so mouth is partially hidden -->
      <path d="M355 340 q25 26 90 8 q-8 14 -40 20 q-50 6 -50 -28 z" fill="#9a2b2b" stroke="#6b1b1b" stroke-width="2" opacity="0.95"/>
      <path d="M365 338 q18 14 72 6" stroke="#541515" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
    </g>

    <!-- hamburger held by hand -->
    <g transform="translate(-10,0)">
      <!-- hand -->
      <path d="M480 350 q40 10 52 34 q6 10 -4 20 q-46 12 -86 -6 q-12-6 -16-18 q6 -28 54 -30 z"
            fill="#f6d7b0" stroke="#b07b55" stroke-width="2"/>

      <!-- fingers (stylized) -->
      <ellipse cx="520" cy="384" rx="8" ry="14" fill="#f6d7b0" stroke="#b07b55" stroke-width="1.5"/>
      <ellipse cx="505" cy="395" rx="8" ry="11" fill="#f6d7b0" stroke="#b07b55" stroke-width="1.5"/>
      <ellipse cx="490" cy="402" rx="9" ry="12" fill="#f6d7b0" stroke="#b07b55" stroke-width="1.5"/>

      <!-- hamburger stack -->
      <!-- top bun -->
      <ellipse cx="475" cy="348" rx="56" ry="28" fill="#f4a460" stroke="#b36b2b" stroke-width="2"/>
      <!-- sesame seeds -->
      <g fill="#fff5e6">
        <ellipse cx="455" cy="340" rx="3" ry="1.6" transform="rotate(-20 455 340)"/>
        <ellipse cx="470" cy="332" rx="3" ry="1.6" transform="rotate(10 470 332)"/>
        <ellipse cx="480" cy="342" rx="3" ry="1.6" transform="rotate(-10 480 342)"/>
        <ellipse cx="495" cy="335" rx="3" ry="1.6" transform="rotate(20 495 335)"/>
      </g>

      <!-- lettuce -->
      <path d="M421 362 q20 -18 54 -12 q28 4 40 12 q6 8 -10 18 q-22 12 -82 -18 z"
            fill="#7bdc6a" stroke="#4aa244" stroke-width="1.5"/>

      <!-- tomato -->
      <ellipse cx="470" cy="376" rx="44" ry="12" fill="#ff5b6b" stroke="#c8444f" stroke-width="1.5"/>

      <!-- patty -->
      <ellipse cx="470" cy="392" rx="46" ry="16" fill="#6b4026" stroke="#4d2b1b" stroke-width="1.5"/>

      <!-- bottom bun -->
      <ellipse cx="474" cy="412" rx="58" ry="18" fill="#f0a56a" stroke="#b36b2b" stroke-width="2"/>

      <!-- bite crumb -->
      <circle cx="428" cy="359" r="3" fill="#f4a460" opacity="0.9"/>
      <circle cx="430" cy="372" r="2" fill="#f4a460" opacity="0.9"/>
    </g>

    <!-- stylized shading on face -->
    <path d="M330 220 q20 50 40 70 q20 22 46 28" stroke="#e0b190" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.25"/>

    <!-- signature pop-art color blot behind head (echoing Warhol's silk-screen blocks) -->
    <g transform="translate(20,10)" opacity="0.22">
      <rect x="120" y="90" width="560" height="200" fill="#ff4f79" rx="12"/>
      <rect x="140" y="130" width="520" height="200" fill="#6cf0d8" rx="12"/>
    </g>

    <!-- small caption (not an actual signature) -->
    <text x="420" y="700" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle" opacity="0.9">POP PORTRAIT</text>
  </g>

  <!-- subtle overall shadow -->
  <ellipse cx="400" cy="770" rx="220" ry="22" fill="#000" opacity="0.06"/>

</svg>