<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Defs for gradients (Warhol-esque silver hair) -->
  <defs>
    <linearGradient id="silverHair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0" />
      <stop offset="100%" stop-color="#E0E0E0" />
    </linearGradient>
  </defs>

  <!-- Bold Pop Art Background -->
  <rect x="0" y="0" width="400" height="500" fill="#0099FF" stroke="#000000" stroke-width="2" />

  <!-- Warhol's Signature Striped Shirt -->
  <rect x="150" y="250" width="100" height="150" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
  <rect x="150" y="270" width="100" height="5" fill="#000000" />
  <rect x="150" y="290" width="100" height="5" fill="#000000" />
  <rect x="150" y="310" width="100" height="5" fill="#000000" />
  <rect x="150" y="330" width="100" height="5" fill="#000000" />
  <rect x="150" y="350" width="100" height="5" fill="#000000" />
  <rect x="150" y="370" width="100" height="5" fill="#000000" />
  <rect x="150" y="390" width="100" height="5" fill="#000000" />

  <!-- Warhol's Head (Pale Skin) -->
  <circle cx="200" cy="150" r="75" fill="#F5F5F5" stroke="#000000" stroke-width="2" />

  <!-- Iconic Silver Hair -->
  <ellipse cx="200" cy="100" rx="80" ry="40" fill="url(#silverHair)" stroke="#000000" stroke-width="2" />

  <!-- Thick Black Glasses -->
  <ellipse cx="170" cy="145" rx="20" ry="15" fill="#333333" stroke="#000000" stroke-width="2" />
  <ellipse cx="230" cy="145" rx="20" ry="15" fill="#333333" stroke="#000000" stroke-width="2" />
  <rect x="190" y="145" width="20" height="5" fill="#333333" stroke="#000000" stroke-width="2" />
  <rect x="150" y="140" width="20" height="3" fill="#333333" stroke="#000000" stroke-width="2" />
  <rect x="250" y="140" width="20" height="3" fill="#333333" stroke="#000000" stroke-width="2" />

  <!-- Facial Features -->
  <path d="M200 160 L195 175 L205 175 Z" fill="#E0E0E0" stroke="#000000" stroke-width="1" /> <!-- Nose -->
  <path d="M185 190 Q200 200 215 190" fill="none" stroke="#000000" stroke-width="2" /> <!-- Open Mouth Curve -->
  <rect x="185" y="190" width="30" height="5" fill="#FF0000" stroke="#000000" stroke-width="1" /> <!-- Lip Color -->

  <!-- Hamburger (Warhol's Favorite Comfort Food) -->
  <rect x="180" y="180" width="60" height="20" rx="5" fill="#D2B48C" stroke="#000000" stroke-width="2" /> <!-- Top Bun -->
  <circle cx="188" cy="185" r="1" fill="#FFFFCC" /> <!-- Sesame Seeds -->
  <circle cx="195" cy="182" r="1" fill="#FFFFCC" />
  <circle cx="202" cy="185" r="1" fill="#FFFFCC" />
  <circle cx="209" cy="182" r="1" fill="#FFFFCC" />
  <circle cx="216" cy="185" r="1" fill="#FFFFCC" />
  <rect x="185" y="198" width="50" height="5" rx="2" fill="#FFD700" stroke="#000000" stroke-width="1" /> <!-- Cheese -->
  <rect x="185" y="203" width="50" height="5" rx="2" fill="#32CD32" stroke="#000000" stroke-width="1" /> <!-- Lettuce -->
  <rect x="185" y="208" width="50" height="8" rx="2" fill="#8B4513" stroke="#000000" stroke-width="1" /> <!-- Patty -->
  <rect x="180" y="216" width="60" height="15" rx="5" fill="#D2B48C" stroke="#000000" stroke-width="2" /> <!-- Bottom Bun -->
  <circle cx="200" cy="205" r="3" fill="#FF0000" stroke="#000000" stroke-width="1" /> <!-- Ketchup Blob -->

  <!-- Hands Holding Hamburger -->
  <rect x="170" y="210" width="10" height="20" fill="#F5F5F5" stroke="#000000" stroke-width="2" />
  <rect x="240" y="210" width="10" height="20" fill="#F5F5F5" stroke="#000000" stroke-width="2" />

  <!-- Warhol-Style Signature -->
  <text x="200" y="480" font-family="Arial" font-size="12" text-anchor="middle" fill="#000000" font-weight="bold">ANDY WARHOL</text>
</svg>