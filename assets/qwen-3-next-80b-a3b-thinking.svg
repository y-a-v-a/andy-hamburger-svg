<svg width="400" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (warhol-style color grid) -->
  <rect width="100%" height="100%" fill="#ffe1c2"/>
  <rect x="0" y="0" width="100" height="70" fill="#ff70a6"/>
  <rect x="100" y="0" width="100" height="70" fill="#70ff92"/>
  <rect x="200" y="0" width="100" height="70" fill="#59a3ff"/>
  <rect x="300" y="0" width="100" height="70" fill="#ffdf80"/>
  <rect x="0" y="70" width="100" height="70" fill="#c080ff"/>
  <rect x="100" y="70" width="100" height="70" fill="#ff5959"/>
  <rect x="200" y="70" width="100" height="70" fill="#80bffb"/>
  <rect x="300" y="70" width="100" height="70" fill="#bfe0ff"/>
  <rect x="0" y="140" width="100" height="70" fill="#ff9966"/>
  <rect x="100" y="140" width="100" height="70" fill="#80ff80"/>
  <rect x="200" y="140" width="100" height="70" fill="#ffd600"/>
  <rect x="300" y="140" width="100" height="70" fill="#ff8080"/>
  <rect x="0" y="210" width="100" height="70" fill="#ffffff" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="100" y="210" width="100" height="70" fill="#ffffff" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="200" y="210" width="100" height="70" fill="#ffffff" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="300" y="210" width="100" height="70" fill="#ffffff" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Andy Warhol -->
  <circle cx="200" cy="180" r="55" fill="#fff" stroke="#000" stroke-width="1"/>
  <circle cx="170" cy="165" r="10" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="230" cy="165" r="10" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="195" y="165" width="10" height="2" fill="#000"/>
  <path d="M160 195 Q200 215 240 195" fill="none" stroke="#000" stroke-width="2"/>
  <text x="200" y="260" font-family="Arial" font-size="16" text-anchor="middle" fill="#000">Andy Warhol</text>
  <text x="200" y="280" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">POP ART EDITION</text>

  <!-- Hamburger (with warhol-style color blocks) -->
  <rect x="150" y="220" width="100" height="15" fill="#f5d38b"/>
  <rect x="160" y="210" width="80" height="25" fill="#8B4513"/>
  <rect x="170" y="205" width="60" height="5" fill="#8BC242"/>
  <rect x="180" y="200" width="40" height="5" fill="#FF0000"/>
  <rect x="150" y="195" width="100" height="15" fill="#f5d38b"/>
  <rect x="170" y="185" width="60" height="10" fill="#f5d38b" stroke="#000" stroke-dasharray="5,5"/>
  <circle cx="165" cy="228" r="2" fill="#fff" stroke="#000"/>
  <circle cx="185" cy="228" r="2" fill="#fff" stroke="#000"/>
  <circle cx="205" cy="228" r="2" fill="#fff" stroke="#000"/>
  <circle cx="225" cy="228" r="2" fill="#fff" stroke="#000"/>

  <!-- Warhol signature elements -->
  <circle cx="250" cy="100" r="15" fill="#FF0000"/>
  <text x="250" y="105" font-family="Arial" font-size="10" text-anchor="middle" fill="#fff">CAMPBELL'S</text>
  <rect x="100" y="50" width="100" height="60" fill="#FF0000" opacity="0.6"/>
  <text x="150" y="85" font-family="Arial" font-size="12" text-anchor="middle" fill="#fff">SOU-POW!</text>
  <line x1="50" y1="250" x2="350" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="3,3"/>
</svg>