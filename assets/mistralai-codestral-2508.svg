<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background (black) -->
  <rect width="100%" height="100%" fill="#000000" />

  <!-- Andy Warhol's head (circle with face) -->
  <circle cx="200" cy="150" r="80" fill="#FFD700" stroke="#FFFFFF" stroke-width="5" />

  <!-- Eyes -->
  <circle cx="170" cy="130" r="10" fill="#000000" />
  <circle cx="230" cy="130" r="10" fill="#000000" />

  <!-- Mouth (smiling) -->
  <path d="M170 170 Q200 190 230 170" stroke="#000000" stroke-width="5" fill="none" />

  <!-- Hamburger -->
  <rect x="150" y="250" width="100" height="60" rx="10" fill="#FFC0CB" stroke="#000000" stroke-width="3" />

  <!-- Top bun -->
  <path d="M150 250 Q200 200 250 250" fill="#FFC0CB" stroke="#000000" stroke-width="3" />

  <!-- Bottom bun -->
  <path d="M150 310 Q200 360 250 310" fill="#FFC0CB" stroke="#000000" stroke-width="3" />

  <!-- Patty -->
  <rect x="160" y="260" width="80" height="20" rx="5" fill="#8B4513" stroke="#000000" stroke-width="2" />

  <!-- Lettuce -->
  <path d="M160 260 Q200 240 240 260" fill="#7CFC00" stroke="#000000" stroke-width="2" />

  <!-- Tomato slices -->
  <path d="M160 270 Q200 250 240 270" fill="#FF6347" stroke="#000000" stroke-width="2" />

  <!-- Cheese slices -->
  <path d="M160 280 Q200 260 240 280" fill="#FFD700" stroke="#000000" stroke-width="2" />

  <!-- Text (optional) -->
  <text x="200" y="40" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle">Andy Warhol Eating a Hamburger</text>
</svg>