<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <style>
      .skin { fill: #f8d3a3; }
      .hair { fill: #f8f6e0; }
      .bg-yellow { fill: #f8d3a3; }
      .bg-pink { fill: #f8a9b0; }
      .bg-blue { fill: #7abaf2; }
      .bg-green { fill: #77c585; }
      .glasses { fill: none; stroke: #1a1a1a; stroke-width: 3; }
      .burger-fill { fill: #8B4513; }
      .burger-meat { fill: #C19A6B; }
      .cheese { fill: #FFD700; }
      .veggie { fill: #32CD32; }
      .hijack { fill: url(#hijack-pattern); }
    </style>
    
    <!-- Pop Art Background Patterns -->
    <pattern id="bg-pattern" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="20" height="20" fill="#f8a9b0"/>
      <rect x="20" y="20" width="20" height="20" fill="#f8a9b0"/>
      <rect x="20" width="20" height="20" fill="#7abaf2"/>
      <rect y="20" width="20" height="20" fill="#7abaf2"/>
    </pattern>
    
    <pattern id="hijack-pattern" patternUnits="userSpaceOnUse" width="25" height="25">
      <circle cx="5" cy="5" r="4" fill="#f00"/>
      <circle cx="15" cy="5" r="4" fill="#0f0"/>
      <circle cx="5" cy="15" r="4" fill="#00f"/>
      <circle cx="15" cy="15" r="4" fill="#ff0"/>
    </pattern>
    
    <filter id="halftone" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="bw-noise"/>
      <feComponentTransfer>
        <feFuncR type="identity"/>
        <feFuncG type="identity"/>
        <feFuncB type="identity"/>
        <feFuncA type="linear" slope="5"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="bw-noise" operator="in"/>
    </filter>
  </defs>
  
  <!-- Background (Pop Art Grid) -->
  <rect width="100%" height="100%" fill="url(#bg-pattern)" />
  
  <!-- Main Composition Container -->
  <g transform="translate(60, 40)">
    <!-- Warhol portrait style frame -->
    <g fill="white" filter="url(#halftone)" clip-path="url(#portrait-clip)">
      <rect x="0" y="0" width="280" height="420"/>
    </g>
    
    <clipPath id="portrait-clip">
      <rect x="0" y="0" width="280" height="420"/>
    </clipPath>
    
    <!-- Hijacked background elements -->
    <rect x="0" y="0" width="280" height="420" class="hijack"/>
    
    <!-- Head with distinctive hair -->
    <circle cx="140" cy="140" r="80" class="skin"/>
    <path d="M60,130 Q40,30 90,40 Q110,20 140,25 Q170,20 190,40 Q220,30 220,80 Q240,90 240,130 Z" class="hair"/>
    
    <!-- Facial features -->
    <ellipse cx="110" cy="130" rx="15" ry="20" fill="#e0b780"/>
    <ellipse cx="170" cy="130" rx="15" ry="20" fill="#e0b780"/>
    <path d="M115,135 A5,5 0 0 1 125,135 M175,135 A5,5 0 0 1 185,135" stroke="#a07040" stroke-width="2" fill="none"/>
    <path d="M130,160 L150,155 L150,165 Z" fill="#a07040"/>
    
    <!-- Iconic glasses -->
    <circle cx="115" cy="125" r="25" class="glasses"/>
    <circle cx="165" cy="125" r="25" class="glasses"/>
    <line x1="90" y1="125" x2="140" y2="125" class="glasses"/>
    <line x1="140" y1="100" x2="140" y2="150" class="glasses"/>
    
    <!-- Hand and Burger -->
    <path d="M200,200 C260,180 280,160 280,200 C270,250 220,280 200,270 Z" class="skin"/>
    
    <!-- Hamburger -->
    <g transform="translate(260,220) rotate(-10)">
      <rect x="-30" y="-10" width="60" height="8" class="burger-fill"/>
      <rect x="-30" y="-2" width="60" height="10" class="burger-meat"/>
      <rect x="-30" y="8" width="60" height="5" class="cheese"/>
      <rect x="-30" y="13" width="60" height="8" class="veggie"/>
      <rect x="-30" y="21" width="60" height="8" class="burger-fill"/>
    </g>
    
    <!-- Warhol signature style elements -->
    <text x="10" y="400" font-family="Arial" font-size="14" fill="#333">Andy Warhol</text>
    <text x="10" y="420" font-family="Arial" font-size="14" fill="#333">*Eat Pop*</text>
    <rect x="5" y="390" width="100" height="40" fill="none" stroke="black" stroke-width="1"/>
  </g>
</svg>