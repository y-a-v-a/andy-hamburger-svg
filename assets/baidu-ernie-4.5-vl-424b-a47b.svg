<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f0f0"/>
  
  <!-- Andy Warhol's head (simplified circle) -->
  <circle cx="200" cy="150" r="50" fill="#ffcc99" stroke="#000" stroke-width="2"/>
  
  <!-- Hair (stylized block) -->
  <rect x="150" y="100" width="100" height="40" fill="#000" />
  
  <!-- Eye (left) -->
  <circle cx="170" cy="140" r="5" fill="#000"/>
  
  <!-- Eye (right) -->
  <circle cx="230" cy="140" r="5" fill="#000"/>
  
  <!-- Mouth (simple line) -->
  <path d="M160,180 Q200,210 240,180" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Hamburger (simplified) -->
  <!-- Bun top -->
  <ellipse cx="200" cy="250" rx="40" ry="10" fill="#d4a76a"/>
  
  <!-- Patty -->
  <rect x="160" y="240" width="80" height="20" fill="#654321"/>
  
  <!-- Bun bottom -->
  <ellipse cx="200" cy="290" rx="40" ry="10" fill="#d4a76a"/>
  
  <!-- Andy's hand holding burger -->
  <!-- Hand (simplified shape) -->
  <path d="M180,260 Q170,280 180,300 L200,300 Q210,280 200,260 Z" fill="#ffcc99" stroke="#000" stroke-width="1"/>
  
  <!-- Add a caption (optional) -->
  <text x="200" y="360" font-family="Arial" font-size="20" text-anchor="middle" fill="#000">Warhol Eats a Burger</text>
</svg>