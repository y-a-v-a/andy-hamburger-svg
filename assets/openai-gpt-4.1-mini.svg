<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: bright pop art color -->
  <rect width="300" height="300" fill="#ffcc00" />

  <!-- Head shape -->
  <circle cx="150" cy="120" r="60" fill="#f0c987" stroke="#333" stroke-width="3" />

  <!-- Hair (stylized) -->
  <path d="M90,80 Q150,0 210,80 Q190,90 110,90 Z" fill="#00aaff" />

  <!-- Eyes -->
  <circle cx="120" cy="110" r="10" fill="#fff" />
  <circle cx="180" cy="110" r="10" fill="#fff" />
  <circle cx="120" cy="110" r="5" fill="#000" />
  <circle cx="180" cy="110" r="5" fill="#000" />

  <!-- Nose -->
  <line x1="150" y1="120" x2="150" y2="140" stroke="#333" stroke-width="2" />

  <!-- Mouth (open, about to eat hamburger) -->
  <ellipse cx="150" cy="160" rx="40" ry="20" fill="#e94e1b" stroke="#333" stroke-width="3" />

  <!-- Hamburger (in front of mouth) -->
  <g transform="translate(150,170)">
    <!-- Bun top -->
    <ellipse cx="0" cy="0" rx="40" ry="20" fill="#deb887" stroke="#8b5a2b" stroke-width="2" />
    <!-- Lettuce -->
    <ellipse cx="0" cy="8" rx="38" ry="10" fill="#4caf50" />
    <!-- Patty -->
    <ellipse cx="0" cy="18" rx="38" ry="12" fill="#4e342e" />
    <!-- Bun bottom -->
    <ellipse cx="0" cy="28" rx="40" ry="15" fill="#deb887" stroke="#8b5a2b" stroke-width="2" />
  </g>

  <!-- Collar / shirt -->
  <path d="M90,180 Q150,230 210,180 L210,250 L90,250 Z" fill="#ff4081" stroke="#880e4f" stroke-width="3" />
</svg>