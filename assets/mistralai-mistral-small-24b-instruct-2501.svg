<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Andy Warhol's Head -->
  <circle cx="200" cy="150" r="50" fill="pink" stroke="black" stroke-width="2"/>

  <!-- Hamburger -->
  <rect x="150" y="200" width="100" height="20" fill="brown" stroke="black" stroke-width="2"/>
  <circle cx="175" cy="220" r="10" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="225" cy="220" r="10" fill="white" stroke="black" stroke-width="2"/>
  <rect x="160" y="240" width="80" height="10" fill="green" stroke="black" stroke-width="2"/>

  <!-- Andy Warhol's Eyes -->
  <circle cx="180" cy="140" r="5" fill="black"/>
  <circle cx="220" cy="140" r="5" fill="black"/>

  <!-- Andy Warhol's Mouth -->
  <path d="M180 160 Q190 170 200 160" stroke="black" stroke-width="2" fill="transparent"/>
</svg>