<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Bright pop art background (Warhol's signature bold cyan) -->
  <rect width="400" height="500" fill="#00FFFF"/>

  <!-- Warhol's iconic white messy hair -->
  <path d="M 120 100 Q 90 50 150 40 Q 200 20 250 40 Q 310 50 280 100 Q 290 150 270 160 Q 130 160 130 100 Z" 
        fill="white" stroke="black" stroke-width="4"/>

  <!-- Pale Warhol face -->
  <ellipse cx="200" cy="200" rx="100" ry="110" fill="#FFF8F0" stroke="black" stroke-width="4"/>

  <!-- Round signature glasses -->
  <circle cx="160" cy="170" r="25" fill="white" stroke="black" stroke-width="4"/>
  <circle cx="240" cy="170" r="25" fill="white" stroke="black" stroke-width="4"/>
  <line x1="185" y1="170" x2="215" y2="170" stroke="black" stroke-width="4"/>

  <!-- Open mouth mid-bite -->
  <path d="M 175 250 Q 200 270 225 250" fill="none" stroke="black" stroke-width="3"/>

  <!-- Classic black Warhol turtleneck -->
  <path d="M 100 300 L 300 300 L 320 500 L 80 500 Z" fill="black"/>
  <path d="M 130 295 Q 200 310 270 295" stroke="black" stroke-width="3" fill="none"/>

  <!-- Hand holding hamburger -->
  <path d="M 120 320 Q 100 380 140 420 Q 180 430 200 400 L 220 350 Q 200 310 150 315 Z" 
        fill="#FFF8F0" stroke="black" stroke-width="4"/>

  <!-- Hamburger -->
  <!-- Top bun with sesame seeds -->
  <ellipse cx="200" cy="260" rx="60" ry="25" fill="#F4A460" stroke="black" stroke-width="3"/>
  <circle cx="180" cy="255" r="3" fill="white"/>
  <circle cx="210" cy="252" r="3" fill="white"/>
  <circle cx="195" cy="262" r="3" fill="white"/>
  <circle cx="220" cy="258" r="3" fill="white"/>
  <!-- Lettuce layer -->
  <path d="M 145 280 Q 155 295 140 305 Q 200 310 260 305 Q 250 290 255 280 Z" 
        fill="#32CD32" stroke="black" stroke-width="2"/>
  <!-- Beef patty -->
  <rect x="145" y="305" width="110" height="20" fill="#8B4513" stroke="black" stroke-width="2" rx="5"/>
  <!-- Bottom bun -->
  <ellipse cx="200" cy="330" rx="58" ry="20" fill="#F4A460" stroke="black" stroke-width="3"/>
</svg>