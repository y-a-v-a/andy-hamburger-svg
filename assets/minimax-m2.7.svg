<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Background in Warhol's signature style -->
  <rect width="400" height="500" fill="#FF69B4"/>
  
  <!-- Warhol-style portrait -->
  <!-- Face -->
  <rect x="100" y="80" width="200" height="250" fill="#FFCC99"/>
  
  <!-- Hair (signature silver wig in Warhol style) -->
  <rect x="95" y="70" width="210" height="60" fill="#C0C0C0"/>
  <rect x="90" y="100" width="40" height="40" fill="#C0C0C0"/>
  <rect x="270" y="100" width="40" height="40" fill="#C0C0C0"/>
  
  <!-- Eyes -->
  <ellipse cx="170" cy="160" rx="25" ry="15" fill="#FFF"/>
  <circle cx="170" cy="160" r="10" fill="#00BFFF"/>
  <circle cx="170" cy="160" r="5" fill="#000"/>
  
  <ellipse cx="230" cy="160" rx="25" ry="15" fill="#FFF"/>
  <circle cx="230" cy="160" r="10" fill="#00BFFF"/>
  <circle cx="230" cy="160" r="5" fill="#000"/>
  
  <!-- Nose -->
  <path d="M195 180 L200 210 L210 180" fill="none" stroke="#D4A574" stroke-width="3"/>
  
  <!-- Mouth (open, eating burger) -->
  <ellipse cx="200" cy="250" rx="35" ry="20" fill="#8B0000"/>
  <ellipse cx="200" cy="260" rx="25" ry="10" fill="#FF6B6B"/>
  
  <!-- Hands holding hamburger -->
  <!-- Left hand -->
  <rect x="80" y="300" width="60" height="30" rx="5" fill="#FFCC99"/>
  <!-- Right hand -->
  <rect x="260" y="300" width="60" height="30" rx="5" fill="#FFCC99"/>
  
  <!-- Hamburger -->
  <!-- Top bun -->
  <ellipse cx="200" cy="290" rx="80" ry="25" fill="#DAA520"/>
  <ellipse cx="200" cy="285" rx="70" ry="20" fill="#F4A460"/>
  
  <!-- Lettuce -->
  <path d="M130 305 Q150 295 170 305 Q190 295 210 305 Q230 295 250 305 Q270 295 275 305 L275 315 Q260 305 240 315 Q220 305 200 315 Q180 305 160 315 Q140 305 125 315 L130 305" fill="#228B22"/>
  
  <!-- Cheese -->
  <polygon points="125,315 145,330 165,315 185,335 205,315 225,335 245,315 265,330 275,315 275,325 260,320 240,325 220,318 200,325 180,318 160,325 140,320 125,325" fill="#FFD700"/>
  
  <!-- Patty -->
  <ellipse cx="200" cy="335" rx="75" ry="15" fill="#8B4513"/>
  
  <!-- Bottom bun -->
  <ellipse cx="200" cy="350" rx="75" ry="20" fill="#DAA520"/>
  <rect x="130" y="335" width="140" height="20" fill="#DAA520"/>
  
  <!-- Warhol-style halftone dots decoration -->
  <circle cx="50" cy="450" r="8" fill="#FFFF00"/>
  <circle cx="80" cy="460" r="6" fill="#FFFF00"/>
  <circle cx="110" cy="465" r="7" fill="#FFFF00"/>
  
  <circle cx="290" cy="450" r="8" fill="#00FF00"/>
  <circle cx="320" cy="460" r="6" fill="#00FF00"/>
  <circle cx="350" cy="465" r="7" fill="#00FF00"/>
  
  <circle cx="350" cy="50" r="15" fill="#00FFFF"/>
  <circle cx="380" cy="80" r="10" fill="#00FFFF"/>
  
  <circle cx="50" cy="50" r="15" fill="#FF0000"/>
  <circle cx="20" cy="80" r="10" fill="#FF0000"/>
  
  <!-- Text in Warhol style -->
  <text x="200" y="480" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFF00" text-anchor="middle">ANDY WARHOL</text>
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000" text-anchor="middle">HAMBURGER</text>
</svg>