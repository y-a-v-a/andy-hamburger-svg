<?xml version="1.0" encoding="UTF-8"?>
<!--  Andy Warhol‑style “Eating a Hamburger” illustration
      Original artwork, inspired by pop‑art aesthetics.
      Save as .svg and view in a browser or edit in a vector editor.  -->
<svg width="600" height="600"
     viewBox="0 0 600 600"
     xmlns="http://www.w3.org/2000/svg"
     style="background:#fff5e6">

  <!-- ==== Background halftone (four Warhol‑style color blocks) ==== -->
  <defs>
    <!-- Simple halftone dot pattern for the four background squares -->
    <pattern id="dotPattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="5" fill="#ff7f50"/>
    </pattern>
  </defs>

  <!-- Four bold Warhol‑style squares -->
  <rect x="50"  y="50"  width="175" height="175" fill="#ff6f61" stroke="#000" stroke-width="2"/>
  <rect x="260" y="50"  width="175" height="175" fill="#6b5b95" stroke="#000" stroke-width="2"/>
  <rect x="50"  y="260" width="175" height="175" fill="#88b04b" stroke="#000" stroke-width="2"/>
  <rect x="260" y="260" width="175" height="175" fill="#f7cac9" stroke="#000" stroke-width="2"/>

  <!-- Fill each square with the halftone pattern (optional – gives a pop‑art texture) -->
  <rect x="50"  y="50"  width="175" height="175" fill="url(#dotPattern)" opacity="0.3"/>
  <rect x="260" y="50"  width="175" height="175" fill="url(#dotPattern)" opacity="0.3"/>
  <rect x="50"  y="260" width="175" height="175" fill="url(#dotPattern)" opacity="0.3"/>
  <rect x="260" y="260" width="175" height="175" fill="url(#dotPattern)" opacity="0.3"/>

  <!-- ==== Central pop‑art portrait of “Andy” ==== -->
  <!-- Head (flat pink) -->
  <circle cx="300" cy="180" r="80" fill="#ffb6c1"/>

  <!-- Hair – stylized “pump” hair in bright blue -->
  <path d="M220,130 Q260,70 300,130" fill="none" stroke="#4a90e2" stroke-width="12" stroke-linecap="round"/>
  <path d="M380,130 Q340,70 300,130" fill="none" stroke="#4a90e2" stroke-width="12" stroke-linecap="round"/>

  <!-- Eyes – white with black pupils -->
  <circle cx="270" cy="155" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="330" cy="155" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="270" cy="155" r="4" fill="#000"/>
  <circle cx="330" cy="155" r="4" fill="#000"/>

  <!-- Mouth – a bold, smiling line -->
  <path d="M260,190 Q300,210 340,190" fill="none" stroke="#000" stroke-width="6" stroke-linecap="round"/>

  <!-- Nose – tiny orange dot -->
  <circle cx="300" cy="175" r="4" fill="#ff9500"/>

  <!-- ==== Hamburger held in hand ==== -->
  <!-- Hand (flat teal) -->
  <rect x="260" y="340" width="80" height="140" fill="#00b3a4"/>

  <!-- Hamburger bun top – bright yellow -->
  <ellipse cx="290" cy="320" rx="35" ry="20" fill="#ffeb3b" stroke="#704c2e" stroke-width="2"/>

  <!-- Hamburger patty (red ketchup circle) – flat orange -->
  <circle cx="290" cy="380" r="30" fill="#ff7043"/>

  <!-- Lettuce – green leaf shape -->
  <path d="M290,410 C310,390 310,430 290,410 Z" fill="#8bc34a"/>

  <!-- Cheese slice – semi‑transparent orange -->
  <path d="M280,380 L300,360 L320,380 Z" fill="#ffe082" opacity="0.6"/>

  <!-- Bottom bun – light brown -->
  <rect x="255" y="425" width="90" height="25" fill="#a1887f" stroke="#704c2e" stroke-width="2"/>

  <!-- ==== Ground (optional) ==== -->
  <rect x="0" y="540" width="600" height="60" fill="#f0f0f0"/>

</svg>
