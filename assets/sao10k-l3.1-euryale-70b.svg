<svg xmlns="http://www.w3.org/2000/svg" width="300" height="350">
    <rect x="0" y="0" width="300" height="350" fill="#D2FFFC" />
    
    <!-- Andy Warhol -->
    <g id="andy-warhol">
        <circle cx="150" cy="100" r="50" fill="#C9C9C9" />
        <circle cx="150" cy="100" r="5" fill="#000000" />
        <circle cx="120" cy="110" r="5" fill="#000000" />
        <path d="M 175,120 C 180,130 155,140 170,140 C 190,140 180,130 185,120 Z" fill="#000000" />
        <rect x="110" y="140" width="80" height="70" rx="20" fill="#ераль|#White" />
        <path d="M 155,195 L 145,205 L 155,215 Z" fill="#000000" />
        <path d="M 155,210 L 165,200 L 155,215 Z" fill="#000000" />
    </g>
    
    <!-- Burger -->
    <g id="burger" transform="translate(160,220)">
        <rect x="-30" y="-20" width="50" height="30" fill="#F7DC6F" rx="10" />
        <rect x="-25" y="-35" width="40" height="20" fill="#8BC34A" rx="10" />
        <rect x="-20" y="-50" width="40" height="20" fill="#8BC34A" rx="10" />
        <rect x="-20" y="-65" width="40" height="20" fill="#964B00" rx="10" />
        <circle cx="0" cy="-40" r="5" fill="#8BC34A" />
        <circle cx="15" cy="-40" r="5" fill="#8BC34A" />
        <circle cx="-15" cy="-40" r="5" fill="#8BC34A" />
        <circle cx="0" cy="-60" r="5" fill="#964B00" />
        <circle cx="15" cy="-60" r="5" fill="#964B00" />
        <circle cx="-15" cy="-60" r="5" fill="#964B00" />
    </g>
    
    <!-- Rest of the scene -->
    <rect x="0" y="300" width="300" height="50" fill="# Rubio|grey" />
    <circle cx="150" cy="340" r="10" fill="# Rubio|grey" />
    <circle cx="150" cy="340" r="5" fill="# Rubio|grey" />
</svg>