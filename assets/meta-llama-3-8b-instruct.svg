<svg width="100%" height="100%" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background (Color) -->
    <rect x="0" y="0" width="100%" height="100%" fill="#F7F7F7" rx="10" />

    <!-- Andy Warhol -->
    <g transform="translate(200, 150)">
        <!-- Face -->
        <rect x="50" y="50" width="100" height="100" fill="#F5F5F5" rx="5" />
        <!-- Hair -->
        <polygon points="100 50 100 150 120 150 120 50" fill="#F5F5F5" />
        <!-- Sunglasses -->
        <rect x="70" y="70" width="20" height="20" fill="#000000" rx="2" />
        <!-- Hamburger -->
        <rect x="50" y="170" width="60" height="20" fill="#FFC080" rx="2" />
    </g>

    <!-- Text (Styling) -->
    <text x="300" y="250" text-anchor="middle" font-family="Arial" font-size="24" fill="#666666"> Andy Warhol </text>
</svg>