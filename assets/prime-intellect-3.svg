<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#F5F5F5"/>
  
  <!-- Andy Warhol -->
  <!-- Head -->
  <circle cx="150" cy="120" r="50" fill="#FDBCB4" stroke="none"/>
  
  <!-- Hair -->
  <rect x="100" y="70" width="100" height="30" fill="#000000"/>
  <rect x="90" y="100" width="120" height="15" fill="#000000"/>
  
  <!-- Glasses -->
  <circle cx="125" cy="120" r="18" fill="none" stroke="#000000" stroke-width="3"/>
  <circle cx="175" cy="120" r="18" fill="none" stroke="#000000" stroke-width="3"/>
  <line x1="143" y1="120" x2="157" y2="120" stroke="#000000" stroke-width="3"/>
  
  <!-- Body -->
  <rect x="120" y="170" width="60" height="80" fill="#9B30FF" rx="10"/>
  
  <!-- Arm holding hamburger -->
  <rect x="180" y="180" width="70" height="20" fill="#FDBCB4" transform="rotate(30 180 190)"/>
  
  <!-- Hamburger -->
  <g transform="translate(220, 160) rotate(15)">
    <!-- Top bun -->
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="#F5DEB3"/>
    <!-- Sesame seeds -->
    <circle cx="-8" cy="-3" r="2" fill="#FFFFFF"/>
    <circle cx="5" cy="-5" r="2" fill="#FFFFFF"/>
    <circle cx="10" cy="-2" r="2" fill="#FFFFFF"/>
    
    <!-- Lettuce -->
    <path d="M -20,5 Q -10,0 0,5 Q 10,0 20,5 L 20,10 Q 10,15 0,10 Q -10,15 -20,10 Z" fill="#7CFC00"/>
    
    <!-- Patty -->
    <ellipse cx="0" cy="20" rx="22" ry="8" fill="#8B4513"/>
    <!-- Grill marks -->
    <line x1="-15" y1="17" x2="-15" y2="23" stroke="#5D2F0F" stroke-width="1"/>
    <line x1="-5" y1="17" x2="-5" y2="23" stroke="#5D2F0F" stroke-width="1"/>
    <line x1="5" y1="17" x2="5" y2="23" stroke="#5D2F0F" stroke-width="1"/>
    <line x1="15" y1="17" x2="15" y2="23" stroke="#5D2F0F" stroke-width="1"/>
    
    <!-- Cheese -->
    <rect x="-20" y="28" width="40" height="5" fill="#FFD700"/>
    
    <!-- Bottom bun -->
    <ellipse cx="0" cy="38" rx="25" ry="10" fill="#F5DEB3"/>
  </g>
  
  <!-- Hand near mouth -->
  <circle cx="170" cy="140" r="12" fill="#FDBCB4"/>
  
  <!-- Pop Art Elements -->
  <!-- Color blocks -->
  <rect x="20" y="20" width="60" height="40" fill="#FF4500" opacity="0.7"/>
  <rect x="300" y="50" width="80" height="30" fill="#00FF7F" opacity="0.7"/>
  <rect x="250" y="300" width="70" height="50" fill="#1E90FF" opacity="0.7"/>
  
  <!-- Text -->
  <text x="30" y="320" font-family="Arial" font-size="24" fill="#000000">Burger</text>
  <text x="280" y="100" font-family="Arial" font-size="20" fill="#000000" transform="rotate(-20 280 100)">POP</text>
</svg>